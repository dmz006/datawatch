# Default values for datawatch parent.
# Override at install time:
#   helm install dw ./charts/datawatch -f my-values.yaml
#   helm install dw ./charts/datawatch --set image.tag=v2.5.0

image:
  # Registry + image name. NO DEFAULT — set this to your own registry
  # before installing. Examples:
  #   ghcr.io/your-org/datawatch
  #   harbor.example.com/datawatch
  #   registry.gitlab.com/your-group/datawatch
  #   localhost:5000/datawatch    (`make registry-up` for local dev)
  # Pre-flight: helm install will work but the Pod will ImagePullBackOff
  # until this points at a registry that holds your image.
  registry: ""
  repository: agent-base
  tag: ""              # empty → falls back to .Chart.appVersion
  pullPolicy: IfNotPresent

# Pull-secret for private registry. Create the Secret out-of-band
# (`kubectl create secret docker-registry harbor-creds …`) and put
# its name here. Empty = no pull secret (assumes public registry or
# pre-pulled image).
imagePullSecret: ""

replicas: 1            # HA pinned to 1 for v1 — see README

# F10 sprint 4 — when running in-cluster, this URL is what spawned
# worker Pods dial home to. Defaults to the Service ClusterIP+port,
# which is fine for in-cluster spawns; set to a routable
# Ingress/LoadBalancer URL when spawning into other clusters.
publicURL: ""

# datawatch.config.yaml is rendered into a ConfigMap and mounted at
# /var/lib/datawatch/config.yaml. The agents block here is the
# common F10 knob set; see internal/config/config.go for the full
# schema.
config:
  server:
    enabled: true
    host: "0.0.0.0"
    port: 8080
    tls_enabled: false  # set true and provide tls.* below for HTTPS
    tls_port: 8443
  agents:
    image_prefix: ""    # falls back to .image.registry at runtime
    image_tag: ""       # falls back to .Chart.appVersion
    docker_bin: ""      # docker driver — usually unused in-cluster
    kubectl_bin: ""     # k8s driver — defaults to "kubectl"
    bootstrap_token_ttl_seconds: 300
    worker_bootstrap_deadline_seconds: 60

# TLS — when enabled, supplied as a Secret of type kubernetes.io/tls
# and mounted at /etc/datawatch/tls/. The chart's deployment passes
# the paths to datawatch via config.
tls:
  enabled: false
  # Inline cert + key (PEM). Don't commit prod secrets — use a
  # SealedSecret / ExternalSecret and point existingSecret at it.
  cert: ""
  key: ""
  existingSecret: ""   # if set, ignores cert/key above

# Bearer token for the API. Empty = no auth (dev only).
# Two ways to supply it:
#   apiToken:               inline value (chart renders a Secret)
#   apiTokenExistingSecret: name of an existing Secret created
#                           out-of-band (preferred; pairs with
#                           SealedSecret / ExternalSecret / Vault).
#                           Key inside the Secret must be
#                           DATAWATCH_API_TOKEN.
apiToken: ""
apiTokenExistingSecret: ""

# Service: ClusterIP for in-cluster only; switch to LoadBalancer or
# add an Ingress separately for external exposure.
service:
  type: ClusterIP
  port: 8080
  tlsPort: 8443

# Persistent state for the daemon (sessions.json, profiles, memory.db,
# alerts, etc). When persistence.enabled=false we use an emptyDir —
# fine for ephemeral dev clusters but loses state on Pod restart.
persistence:
  enabled: false
  storageClass: ""     # empty → cluster default
  size: 10Gi
  accessMode: ReadWriteOnce

# RBAC — when running in-cluster the parent's K8sDriver shells out to
# kubectl using the projected ServiceAccount token. The default Role
# below grants it pod create/get/list/delete in the *same* namespace
# only. Cross-namespace spawns require a ClusterRole; point
# rbac.create=false and provide your own.
rbac:
  create: true
  serviceAccountName: ""  # empty → "<release>-datawatch"

# Resource requests/limits for the parent Pod itself (NOT the spawned
# workers — those are governed per-cluster-profile in agent config).
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 1Gi

nodeSelector: {}
tolerations: []
affinity: {}

# Optional Postgres for episodic memory + future state. Empty =
# defaults to embedded SQLite at $DATA_DIR/memory.db.
#
# Same dual-supply pattern as apiToken:
#   url:               inline value (chart renders a Secret)
#   existingSecret +   reference to a pre-created Secret holding
#   existingSecretKey  the connection string at the supplied key
postgres:
  url: ""
  existingSecret: ""
  existingSecretKey: "DATAWATCH_POSTGRES_URL"

# BL113 — git provider token used by the parent's TokenBroker to
# mint short-lived per-spawn worker tokens (gh / glab CLI fronting).
# When `apiTokenExistingSecret` etc. are insufficient, project this
# Secret into the parent Pod via env so the token broker resolves
# without needing the operator's home dir on the parent host.
gitToken:
  existingSecret: ""
  existingSecretKey: "DATAWATCH_GIT_TOKEN"

# BL113 — kubeconfig projection for cross-cluster spawns. When the
# parent runs in cluster A but spawns Pods into clusters B + C, it
# needs a kubeconfig that knows about all three. Project a Secret
# named here at /etc/datawatch/kubeconfig and the K8sDriver picks
# it up via $KUBECONFIG. Default empty = parent uses the in-cluster
# ServiceAccount (single-cluster spawns only).
kubeconfig:
  existingSecret: ""
  existingSecretKey: "config"
