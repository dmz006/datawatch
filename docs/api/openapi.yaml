openapi: 3.0.3
info:
  title: Datawatch API
  description: |
    REST and WebSocket API for the datawatch daemon.

    ## Authentication
    If a token is configured, pass it as:
    - `Authorization: Bearer <token>` header, OR
    - `?token=<token>` query parameter

    ## Network Access
    The API is designed to be accessed over Tailscale (encrypted overlay network).
    TLS is optional — Tailscale provides transport encryption.
  version: 0.4.0
  license:
    name: Polyform Noncommercial 1.0.0
    url: https://github.com/dmz006/datawatch/blob/main/LICENSE
  contact:
    url: https://github.com/dmz006/datawatch

servers:
  - url: http://localhost:8080
    description: Local development
  - url: http://{tailscale_ip}:8080
    description: Tailscale access
    variables:
      tailscale_ip:
        default: "100.x.x.x"
        description: Your machine's Tailscale IP

security:
  - BearerToken: []
  - QueryToken: []
  - NoAuth: []

paths:
  /api/sessions:
    get:
      summary: List all sessions
      description: Returns all sessions managed by this host, including completed ones.
      operationId: listSessions
      tags: [Sessions]
      responses:
        "200":
          description: Array of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/output:
    get:
      summary: Get session output
      description: Returns the last N lines of a session's log output.
      operationId: getSessionOutput
      tags: [Sessions]
      parameters:
        - name: id
          in: query
          required: true
          description: Session ID (short 4-char or full hostname-id)
          schema:
            type: string
            example: "a3f2"
        - name: n
          in: query
          required: false
          description: Number of lines to return (default 50)
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 1000
      responses:
        "200":
          description: Plain text output
          content:
            text/plain:
              schema:
                type: string
        "404":
          description: Session not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/command:
    post:
      summary: Execute a command
      description: |
        Execute any command using the same syntax as the Signal interface.

        Available commands:
        - `new: <task>` — start a new session
        - `list` — list sessions
        - `status <id>` — get recent output
        - `send <id>: <text>` — send input to waiting session
        - `kill <id>` — terminate session
        - `tail <id> [n]` — last N lines
        - `attach <id>` — get tmux attach command
        - `help` — show help
      operationId: executeCommand
      tags: [Commands]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommandRequest"
            examples:
              new_session:
                summary: Start a new session
                value:
                  text: "new: write a fibonacci function in Go"
              list_sessions:
                summary: List sessions
                value:
                  text: "list"
              send_input:
                summary: Send input to waiting session
                value:
                  text: "send a3f2: yes, proceed"
      responses:
        "200":
          description: Command result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResponse"
        "400":
          description: Bad request
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/link/start:
    post:
      summary: Start Signal device linking
      description: |
        Starts the signal-cli device linking process. Returns a stream ID.
        Use `/api/link/stream?id=<stream_id>` to receive the QR URI via SSE.

        The QR code should be scanned from Signal on your phone:
        Settings → Linked Devices → Link New Device
      operationId: startLinking
      tags: [Setup]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                device_name:
                  type: string
                  description: Name for this linked device
                  example: "hal9000"
      responses:
        "200":
          description: Linking started
          content:
            application/json:
              schema:
                type: object
                properties:
                  stream_id:
                    type: string
                    description: Use this with /api/link/stream
        "409":
          description: Already linked
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/link/stream:
    get:
      summary: Stream linking status via SSE
      description: |
        Server-Sent Events stream for the linking process.
        Events:
        - `qr`: QR URI string (sgnl://...) — render as QR code
        - `linked`: linking complete
        - `error`: error message
      operationId: streamLinking
      tags: [Setup]
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
        "404":
          description: Stream ID not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/link/status:
    get:
      summary: Check linking status
      operationId: getLinkStatus
      tags: [Setup]
      responses:
        "200":
          description: Linking status
          content:
            application/json:
              schema:
                type: object
                properties:
                  linked:
                    type: boolean
                  account_number:
                    type: string
                  device_name:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/backends:
    get:
      summary: List LLM backends
      description: Returns the list of registered LLM backends and which one is active.
      operationId: listBackends
      tags: [System]
      responses:
        "200":
          description: Backend list
          content:
            application/json:
              schema:
                type: object
                properties:
                  llm:
                    type: array
                    items:
                      type: string
                    description: Registered LLM backend names
                    example: ["claude-code", "aider"]
                  active:
                    type: string
                    description: Currently active backend name
                    example: "claude-code"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/files:
    get:
      summary: Browse directory
      description: |
        Returns the contents of a directory for use in the PWA directory picker.
        Entries are sorted: directories first, then files, both alphabetically.
      operationId: listFiles
      tags: [System]
      parameters:
        - name: path
          in: query
          required: false
          description: Absolute path to browse (default: user home directory)
          schema:
            type: string
            example: "/home/user/projects"
      responses:
        "200":
          description: Directory entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  path:
                    type: string
                    description: The resolved path that was listed
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        is_dir:
                          type: boolean
                        path:
                          type: string
                          description: Full absolute path (use for next request)
        "400":
          description: Path is not a directory or cannot be read
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/sessions/start:
    post:
      summary: Start a new session
      description: |
        Start a new AI coding session with optional name, project directory, and backend override.
        This endpoint provides more control than the command-based `/api/command` endpoint.
      operationId: startSession
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartSessionRequest"
            examples:
              basic:
                summary: Basic session
                value:
                  task: "refactor the auth module"
              named:
                summary: Named session with backend
                value:
                  task: "refactor the auth module"
                  name: "auth refactor"
                  project_dir: "/home/user/projects/myapp"
                  backend: "aider"
      responses:
        "200":
          description: Session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          description: Bad request (missing task, backend not found, etc.)
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/sessions/restart:
    post:
      summary: Restart a session in-place
      description: |
        Restart a completed, failed, or killed session using the same session ID,
        tmux session, and tracking directory. If the backend supports resume, the
        LLM conversation is resumed via the deterministic session UUID.
      operationId: restartSession
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  description: Session ID (short or full)
                  example: "a3f2"
      responses:
        "200":
          description: Session restarted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          description: Bad request
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          description: Session not found or not in a terminal state

  /api/sessions/rename:
    post:
      summary: Rename a session
      description: Set or update the human-readable name for a session.
      operationId: renameSession
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, name]
              properties:
                id:
                  type: string
                  description: Session ID (short or full)
                  example: "a3f2"
                name:
                  type: string
                  description: New human-readable name
                  example: "auth refactor"
      responses:
        "200":
          description: Renamed successfully
        "404":
          description: Session not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/config:
    get:
      summary: Get configuration
      description: |
        Returns the current daemon configuration with sensitive fields masked.
        Token, password, and secret fields are replaced with `"***"` when non-empty.
      operationId: getConfig
      tags: [System]
      responses:
        "200":
          description: Masked configuration object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      summary: Update configuration
      description: |
        Apply one or more configuration changes using dot-path keys.
        Changes are written to the config file immediately.

        Supported keys: `telegram.enabled`, `discord.enabled`, `slack.enabled`,
        `matrix.enabled`, `twilio.enabled`, `ntfy.enabled`, `email.enabled`,
        `webhook.enabled`, `github_webhook.enabled`, `server.enabled`,
        `server.host`, `server.port`, `server.token`, `server.tls_enabled`.
      operationId: updateConfig
      tags: [System]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              example:
                telegram.enabled: true
                server.port: 9090
      responses:
        "200":
          description: Changes applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
        "400":
          description: Invalid request body
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/health:
    get:
      summary: Health check
      description: Returns 200 if the daemon is running. No auth required.
      operationId: healthCheck
      tags: [System]
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/info:
    get:
      summary: System information
      operationId: getInfo
      tags: [System]
      responses:
        "200":
          description: System info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InfoResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/schedule:
    get:
      summary: List scheduled commands
      description: Returns all scheduled (recurring/one-shot) commands for this host.
      operationId: listSchedule
      tags: [Schedule]
      responses:
        "200":
          description: Array of scheduled command entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduledCommand"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Add a scheduled command
      description: Schedule a new recurring or one-shot command.
      operationId: addScheduledCommand
      tags: [Schedule]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduledCommand"
      responses:
        "200":
          description: Scheduled command added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduledCommand"
        "400":
          description: Invalid schedule expression or missing fields
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      summary: Cancel a scheduled command
      description: Remove a scheduled command by ID.
      operationId: deleteScheduledCommand
      tags: [Schedule]
      parameters:
        - name: id
          in: query
          required: true
          description: Scheduled command ID
          schema:
            type: string
      responses:
        "200":
          description: Cancelled
        "404":
          description: Not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/servers:
    get:
      summary: List remote servers
      description: Returns the list of configured remote datawatch server connections.
      operationId: listServers
      tags: [System]
      responses:
        "200":
          description: Array of remote server entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RemoteServer"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/commands:
    get:
      summary: List saved commands
      description: Returns all named commands in the command library.
      operationId: listCommands
      tags: [Commands]
      responses:
        "200":
          description: Array of saved commands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedCommand"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Add a saved command
      description: Save a new named command to the command library.
      operationId: addCommand
      tags: [Commands]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedCommand"
            example:
              name: "approve"
              command: "yes"
      responses:
        "200":
          description: Command saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedCommand"
        "400":
          description: Missing name or command
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      summary: Delete a saved command
      description: Remove a named command from the command library by name.
      operationId: deleteCommand
      tags: [Commands]
      parameters:
        - name: name
          in: query
          required: true
          description: Command name to delete
          schema:
            type: string
            example: "approve"
      responses:
        "200":
          description: Deleted
        "404":
          description: Not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/filters:
    get:
      summary: List output filters
      description: Returns all configured output filter patterns.
      operationId: listFilters
      tags: [Filters]
      responses:
        "200":
          description: Array of filter patterns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FilterPattern"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Add an output filter
      description: Add a new regex-based output filter pattern.
      operationId: addFilter
      tags: [Filters]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FilterPattern"
      responses:
        "200":
          description: Filter added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilterPattern"
        "400":
          description: Invalid regex or missing fields
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      summary: Enable or disable a filter
      description: Toggle a filter pattern on or off by ID.
      operationId: patchFilter
      tags: [Filters]
      parameters:
        - name: id
          in: query
          required: true
          description: Filter ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
      responses:
        "200":
          description: Updated
        "404":
          description: Not found
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      summary: Delete an output filter
      description: Remove a filter pattern by ID.
      operationId: deleteFilter
      tags: [Filters]
      parameters:
        - name: id
          in: query
          required: true
          description: Filter ID
          schema:
            type: string
      responses:
        "200":
          description: Deleted
        "404":
          description: Not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/alerts:
    get:
      summary: List alerts
      description: Returns all system alerts and the count of unread alerts.
      operationId: listAlerts
      tags: [Alerts]
      responses:
        "200":
          description: Alerts list with unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  alerts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Alert"
                  unread_count:
                    type: integer
                    description: Number of unread alerts
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Mark alerts as read
      description: Mark one or all alerts as read.
      operationId: markAlertsRead
      tags: [Alerts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: Alert ID to mark read. Omit to mark all alerts as read.
                all:
                  type: boolean
                  description: Set true to mark all alerts as read.
      responses:
        "200":
          description: Marked as read
        "404":
          description: Alert not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /ws:
    get:
      summary: WebSocket connection
      description: |
        Upgrade to WebSocket for real-time bidirectional communication.

        ### Server to Client messages

        | type | description |
        |------|-------------|
        | `sessions` | Full session list (sent on connect and on any change) |
        | `session_state` | One session's state changed |
        | `output` | New output lines from a session |
        | `needs_input` | Session is waiting for user input |
        | `notification` | General text notification |
        | `alert` | New system alert pushed to Web UI clients |

        ### Client to Server messages

        | type | description |
        |------|-------------|
        | `command` | `{"text": "new: my task"}` — any command string |
        | `new_session` | `{"task": "...", "name": "...", "project_dir": "...", "backend": "..."}` |
        | `send_input` | `{"session_id": "a3f2", "text": "yes"}` |
        | `subscribe` | `{"session_id": "a3f2"}` — stream output for session |
        | `ping` | keepalive |

        All messages are JSON-wrapped in `{"type":"...", "data":{...}, "ts":"..."}`.
      operationId: connectWebSocket
      tags: [WebSocket]
      responses:
        "101":
          description: Switching Protocols

components:
  securitySchemes:
    BearerToken:
      type: http
      scheme: bearer
    QueryToken:
      type: apiKey
      in: query
      name: token
    NoAuth:
      type: http
      scheme: basic
      description: No authentication (when token is not configured)

  responses:
    Unauthorized:
      description: Authentication required
      content:
        text/plain:
          schema:
            type: string
            example: "unauthorized"

  schemas:
    Session:
      type: object
      properties:
        id:
          type: string
          description: Short 4-character hex ID
          example: "a3f2"
        full_id:
          type: string
          description: Full hostname-prefixed ID
          example: "hal9000-a3f2"
        name:
          type: string
          description: Optional human-readable name (set at creation or via rename)
          example: "auth refactor"
        task:
          type: string
          description: Original task description
          example: "write a fibonacci function in Go"
        llm_backend:
          type: string
          description: LLM backend used for this session
          example: "claude-code"
        tmux_session:
          type: string
          description: tmux session name
          example: "cs-hal9000-a3f2"
        log_file:
          type: string
          description: Path to the session's output log
          example: "/home/user/.datawatch/logs/hal9000-a3f2.log"
        state:
          $ref: "#/components/schemas/SessionState"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        hostname:
          type: string
          example: "hal9000"
        group_id:
          type: string
          description: Signal group ID this session was created from
        pending_input:
          type: string
          description: Set when waiting for user input
        last_prompt:
          type: string
          description: The prompt text that triggered waiting_input state

    SessionState:
      type: string
      enum: [running, waiting_input, complete, failed, killed]
      description: |
        - `running`: claude-code is actively running
        - `waiting_input`: claude-code is waiting for user response
        - `complete`: claude-code exited successfully
        - `failed`: claude-code exited with error
        - `killed`: session was manually terminated

    StartSessionRequest:
      type: object
      required: [task]
      properties:
        task:
          type: string
          description: Task description passed to the LLM
          example: "refactor the auth module"
        name:
          type: string
          description: Optional human-readable name for the session
          example: "auth refactor"
        project_dir:
          type: string
          description: |
            Absolute path to the project directory. The LLM will be constrained to this tree.
            Defaults to session.default_project_dir from config.
          example: "/home/user/projects/myapp"
        backend:
          type: string
          description: |
            LLM backend to use for this session. Must match a registered backend name.
            Defaults to the active backend from config.
          example: "aider"

    CommandRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          description: Command string in Signal command format
          example: "new: build a REST API in Go"

    CommandResponse:
      type: object
      properties:
        result:
          type: string
          description: Human-readable result message

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: "ok"
        hostname:
          type: string
        version:
          type: string
        uptime_seconds:
          type: integer

    ConfigResponse:
      type: object
      description: Masked configuration. Sensitive fields (tokens, passwords, secrets) are replaced with "***".
      properties:
        telegram:
          type: object
          properties:
            enabled: { type: boolean }
            token: { type: string, example: "***" }
            chat_id: { type: string }
        discord:
          type: object
          properties:
            enabled: { type: boolean }
            token: { type: string, example: "***" }
            channel_id: { type: string }
        slack:
          type: object
          properties:
            enabled: { type: boolean }
            token: { type: string, example: "***" }
            channel_id: { type: string }
        matrix:
          type: object
          properties:
            enabled: { type: boolean }
            homeserver: { type: string }
            user_id: { type: string }
            access_token: { type: string, example: "***" }
            room_id: { type: string }
        twilio:
          type: object
          properties:
            enabled: { type: boolean }
            account_sid: { type: string }
            auth_token: { type: string, example: "***" }
            from_number: { type: string }
            to_number: { type: string }
        ntfy:
          type: object
          properties:
            enabled: { type: boolean }
            server_url: { type: string }
            topic: { type: string }
            token: { type: string, example: "***" }
        email:
          type: object
          properties:
            enabled: { type: boolean }
            host: { type: string }
            port: { type: integer }
            username: { type: string }
            from: { type: string }
            to: { type: string }
        webhook:
          type: object
          properties:
            enabled: { type: boolean }
            addr: { type: string }
        github_webhook:
          type: object
          properties:
            enabled: { type: boolean }
            addr: { type: string }
        server:
          type: object
          properties:
            enabled: { type: boolean }
            host: { type: string }
            port: { type: integer }
            tls_enabled: { type: boolean }
            token: { type: string, example: "***" }

    InfoResponse:
      type: object
      properties:
        hostname:
          type: string
        version:
          type: string
        llm_backend:
          type: string
          example: "claude-code"
        messaging_backend:
          type: string
          example: "signal"
        session_count:
          type: integer
        server:
          type: object
          properties:
            host:
              type: string
            port:
              type: integer

    ScheduledCommand:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for this scheduled entry
        task:
          type: string
          description: Task description to start as a new session
          example: "run nightly tests"
        cron:
          type: string
          description: Cron expression (5-field standard format)
          example: "0 2 * * *"
        enabled:
          type: boolean
          default: true
        created_at:
          type: string
          format: date-time

    RemoteServer:
      type: object
      properties:
        name:
          type: string
          description: Short identifier used with --server flag
          example: "nas"
        url:
          type: string
          description: Base URL of the remote datawatch instance
          example: "http://192.168.1.10:8080"
        token:
          type: string
          description: Bearer token (masked as *** when non-empty)
          example: "***"
        enabled:
          type: boolean

    SavedCommand:
      type: object
      required: [name, command]
      properties:
        name:
          type: string
          description: Short name for the command
          example: "approve"
        command:
          type: string
          description: The command text to send
          example: "yes"

    FilterPattern:
      type: object
      properties:
        id:
          type: string
          description: Unique filter identifier
        pattern:
          type: string
          description: Regular expression to match against session output lines
          example: "^\\s*$"
        action:
          type: string
          description: Action to take on matching lines
          enum: [drop, highlight, alert]
          example: "drop"
        enabled:
          type: boolean
          default: true
        description:
          type: string
          description: Human-readable description of what this filter does
          example: "Drop blank lines"

    Alert:
      type: object
      properties:
        id:
          type: string
          description: Unique alert identifier
        message:
          type: string
          description: Alert message text
        level:
          type: string
          enum: [info, warning, error]
          example: "warning"
        read:
          type: boolean
          default: false
        created_at:
          type: string
          format: date-time
