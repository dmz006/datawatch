openapi: 3.0.3
info:
  title: Datawatch API
  description: |
    REST and WebSocket API for the datawatch daemon.

    ## Authentication
    If a token is configured, pass it as:
    - `Authorization: Bearer <token>` header, OR
    - `?token=<token>` query parameter

    ## Network Access
    The API is designed to be accessed over Tailscale (encrypted overlay network).
    TLS is optional — Tailscale provides transport encryption.
  version: 0.4.0
  license:
    name: Polyform Noncommercial 1.0.0
    url: https://github.com/dmz006/datawatch/blob/main/LICENSE
  contact:
    url: https://github.com/dmz006/datawatch

servers:
  - url: http://localhost:8080
    description: Local development
  - url: http://{tailscale_ip}:8080
    description: Tailscale access
    variables:
      tailscale_ip:
        default: "100.x.x.x"
        description: Your machine's Tailscale IP

security:
  - BearerToken: []
  - QueryToken: []
  - NoAuth: []

paths:
  /api/sessions:
    get:
      summary: List all sessions
      description: Returns all sessions managed by this host, including completed ones.
      operationId: listSessions
      tags: [Sessions]
      responses:
        "200":
          description: Array of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/output:
    get:
      summary: Get session output
      description: Returns the last N lines of a session's log output.
      operationId: getSessionOutput
      tags: [Sessions]
      parameters:
        - name: id
          in: query
          required: true
          description: Session ID (short 4-char or full hostname-id)
          schema:
            type: string
            example: "a3f2"
        - name: n
          in: query
          required: false
          description: Number of lines to return (default 50)
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 1000
      responses:
        "200":
          description: Plain text output
          content:
            text/plain:
              schema:
                type: string
        "404":
          description: Session not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/command:
    post:
      summary: Execute a command
      description: |
        Execute any command using the same syntax as the Signal interface.

        Available commands:
        - `new: <task>` — start a new session
        - `list` — list sessions
        - `status <id>` — get recent output
        - `send <id>: <text>` — send input to waiting session
        - `kill <id>` — terminate session
        - `tail <id> [n]` — last N lines
        - `attach <id>` — get tmux attach command
        - `help` — show help
      operationId: executeCommand
      tags: [Commands]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommandRequest"
            examples:
              new_session:
                summary: Start a new session
                value:
                  text: "new: write a fibonacci function in Go"
              list_sessions:
                summary: List sessions
                value:
                  text: "list"
              send_input:
                summary: Send input to waiting session
                value:
                  text: "send a3f2: yes, proceed"
      responses:
        "200":
          description: Command result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResponse"
        "400":
          description: Bad request
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/link/start:
    post:
      summary: Start Signal device linking
      description: |
        Starts the signal-cli device linking process. Returns a stream ID.
        Use `/api/link/stream?id=<stream_id>` to receive the QR URI via SSE.

        The QR code should be scanned from Signal on your phone:
        Settings → Linked Devices → Link New Device
      operationId: startLinking
      tags: [Setup]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                device_name:
                  type: string
                  description: Name for this linked device
                  example: "hal9000"
      responses:
        "200":
          description: Linking started
          content:
            application/json:
              schema:
                type: object
                properties:
                  stream_id:
                    type: string
                    description: Use this with /api/link/stream
        "409":
          description: Already linked
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/link/stream:
    get:
      summary: Stream linking status via SSE
      description: |
        Server-Sent Events stream for the linking process.
        Events:
        - `qr`: QR URI string (sgnl://...) — render as QR code
        - `linked`: linking complete
        - `error`: error message
      operationId: streamLinking
      tags: [Setup]
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
        "404":
          description: Stream ID not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/link/status:
    get:
      summary: Check linking status
      operationId: getLinkStatus
      tags: [Setup]
      responses:
        "200":
          description: Linking status
          content:
            application/json:
              schema:
                type: object
                properties:
                  linked:
                    type: boolean
                  account_number:
                    type: string
                  device_name:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/backends:
    get:
      summary: List LLM backends
      description: Returns the list of registered LLM backends and which one is active.
      operationId: listBackends
      tags: [System]
      responses:
        "200":
          description: Backend list
          content:
            application/json:
              schema:
                type: object
                properties:
                  llm:
                    type: array
                    items:
                      type: string
                    description: Registered LLM backend names
                    example: ["claude-code", "aider"]
                  active:
                    type: string
                    description: Currently active backend name
                    example: "claude-code"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/files:
    get:
      summary: Browse directory
      description: |
        Returns the contents of a directory for use in the PWA directory picker.
        Entries are sorted: directories first, then files, both alphabetically.
      operationId: listFiles
      tags: [System]
      parameters:
        - name: path
          in: query
          required: false
          description: "Absolute path to browse (default: user home directory)"
          schema:
            type: string
            example: "/home/user/projects"
      responses:
        "200":
          description: Directory entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  path:
                    type: string
                    description: The resolved path that was listed
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        is_dir:
                          type: boolean
                        path:
                          type: string
                          description: Full absolute path (use for next request)
        "400":
          description: Path is not a directory or cannot be read
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/sessions/start:
    post:
      summary: Start a new session
      description: |
        Start a new AI coding session with optional name, project directory, and backend override.
        This endpoint provides more control than the command-based `/api/command` endpoint.
      operationId: startSession
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartSessionRequest"
            examples:
              basic:
                summary: Basic session
                value:
                  task: "refactor the auth module"
              named:
                summary: Named session with backend
                value:
                  task: "refactor the auth module"
                  name: "auth refactor"
                  project_dir: "/home/user/projects/myapp"
                  backend: "aider"
      responses:
        "200":
          description: Session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          description: Bad request (missing task, backend not found, etc.)
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/sessions/restart:
    post:
      summary: Restart a session in-place
      description: |
        Restart a completed, failed, or killed session using the same session ID,
        tmux session, and tracking directory. If the backend supports resume, the
        LLM conversation is resumed via the deterministic session UUID.
      operationId: restartSession
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  description: Session ID (short or full)
                  example: "a3f2"
      responses:
        "200":
          description: Session restarted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          description: Bad request
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          description: Session not found or not in a terminal state

  /api/sessions/rename:
    post:
      summary: Rename a session
      description: Set or update the human-readable name for a session.
      operationId: renameSession
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, name]
              properties:
                id:
                  type: string
                  description: Session ID (short or full)
                  example: "a3f2"
                name:
                  type: string
                  description: New human-readable name
                  example: "auth refactor"
      responses:
        "200":
          description: Renamed successfully
        "404":
          description: Session not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/config:
    get:
      summary: Get configuration
      description: |
        Returns the current daemon configuration with sensitive fields masked.
        Token, password, and secret fields are replaced with `"***"` when non-empty.
      operationId: getConfig
      tags: [System]
      responses:
        "200":
          description: Masked configuration object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      summary: Update configuration
      description: |
        Apply one or more configuration changes using dot-path keys.
        Changes are written to the config file immediately.

        Supported keys: `telegram.enabled`, `discord.enabled`, `slack.enabled`,
        `matrix.enabled`, `twilio.enabled`, `ntfy.enabled`, `email.enabled`,
        `webhook.enabled`, `github_webhook.enabled`, `server.enabled`,
        `server.host`, `server.port`, `server.token`, `server.tls_enabled`.
      operationId: updateConfig
      tags: [System]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              example:
                telegram.enabled: true
                server.port: 9090
      responses:
        "200":
          description: Changes applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
        "400":
          description: Invalid request body
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/health:
    get:
      summary: Health check
      description: Returns 200 if the daemon is running. No auth required.
      operationId: healthCheck
      tags: [System]
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/info:
    get:
      summary: System information
      operationId: getInfo
      tags: [System]
      responses:
        "200":
          description: System info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InfoResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/schedule:
    get:
      summary: List scheduled commands
      description: Returns all scheduled (recurring/one-shot) commands for this host.
      operationId: listSchedule
      tags: [Schedule]
      responses:
        "200":
          description: Array of scheduled command entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduledCommand"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Add a scheduled command
      description: Schedule a new recurring or one-shot command.
      operationId: addScheduledCommand
      tags: [Schedule]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduledCommand"
      responses:
        "200":
          description: Scheduled command added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduledCommand"
        "400":
          description: Invalid schedule expression or missing fields
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      summary: Cancel a scheduled command
      description: Remove a scheduled command by ID.
      operationId: deleteScheduledCommand
      tags: [Schedule]
      parameters:
        - name: id
          in: query
          required: true
          description: Scheduled command ID
          schema:
            type: string
      responses:
        "200":
          description: Cancelled
        "404":
          description: Not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/servers:
    get:
      summary: List remote servers
      description: Returns the list of configured remote datawatch server connections.
      operationId: listServers
      tags: [System]
      responses:
        "200":
          description: Array of remote server entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RemoteServer"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/commands:
    get:
      summary: List saved commands
      description: Returns all named commands in the command library.
      operationId: listCommands
      tags: [Commands]
      responses:
        "200":
          description: Array of saved commands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedCommand"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Add a saved command
      description: Save a new named command to the command library.
      operationId: addCommand
      tags: [Commands]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedCommand"
            example:
              name: "approve"
              command: "yes"
      responses:
        "200":
          description: Command saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedCommand"
        "400":
          description: Missing name or command
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      summary: Delete a saved command
      description: Remove a named command from the command library by name.
      operationId: deleteCommand
      tags: [Commands]
      parameters:
        - name: name
          in: query
          required: true
          description: Command name to delete
          schema:
            type: string
            example: "approve"
      responses:
        "200":
          description: Deleted
        "404":
          description: Not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/filters:
    get:
      summary: List output filters
      description: Returns all configured output filter patterns.
      operationId: listFilters
      tags: [Filters]
      responses:
        "200":
          description: Array of filter patterns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FilterPattern"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Add an output filter
      description: Add a new regex-based output filter pattern.
      operationId: addFilter
      tags: [Filters]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FilterPattern"
      responses:
        "200":
          description: Filter added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilterPattern"
        "400":
          description: Invalid regex or missing fields
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      summary: Enable or disable a filter
      description: Toggle a filter pattern on or off by ID.
      operationId: patchFilter
      tags: [Filters]
      parameters:
        - name: id
          in: query
          required: true
          description: Filter ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
      responses:
        "200":
          description: Updated
        "404":
          description: Not found
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      summary: Delete an output filter
      description: Remove a filter pattern by ID.
      operationId: deleteFilter
      tags: [Filters]
      parameters:
        - name: id
          in: query
          required: true
          description: Filter ID
          schema:
            type: string
      responses:
        "200":
          description: Deleted
        "404":
          description: Not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/alerts:
    get:
      summary: List alerts
      description: Returns all system alerts and the count of unread alerts.
      operationId: listAlerts
      tags: [Alerts]
      responses:
        "200":
          description: Alerts list with unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  alerts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Alert"
                  unread_count:
                    type: integer
                    description: Number of unread alerts
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Mark alerts as read
      description: Mark one or all alerts as read.
      operationId: markAlertsRead
      tags: [Alerts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: Alert ID to mark read. Omit to mark all alerts as read.
                all:
                  type: boolean
                  description: Set true to mark all alerts as read.
      responses:
        "200":
          description: Marked as read
        "404":
          description: Alert not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /ws:
    get:
      summary: WebSocket connection
      description: |
        Upgrade to WebSocket for real-time bidirectional communication.

        ### Server to Client messages

        | type | description |
        |------|-------------|
        | `sessions` | Full session list (sent on connect and on any change) |
        | `session_state` | One session's state changed |
        | `output` | New output lines from a session |
        | `needs_input` | Session is waiting for user input |
        | `notification` | General text notification |
        | `alert` | New system alert pushed to Web UI clients |

        ### Client to Server messages

        | type | description |
        |------|-------------|
        | `command` | `{"text": "new: my task"}` — any command string |
        | `new_session` | `{"task": "...", "name": "...", "project_dir": "...", "backend": "..."}` |
        | `send_input` | `{"session_id": "a3f2", "text": "yes"}` |
        | `subscribe` | `{"session_id": "a3f2"}` — stream output for session |
        | `ping` | keepalive |

        All messages are JSON-wrapped in `{"type":"...", "data":{...}, "ts":"..."}`.
      operationId: connectWebSocket
      tags: [WebSocket]
      responses:
        "101":
          description: Switching Protocols

  # ─── Autonomous PRD decomposition (BL24+BL25, v3.10.0) ─────────
  /api/autonomous/status:
    get:
      summary: Loop status snapshot
      operationId: autonomousStatus
      tags: [Autonomous]
      responses: {"200": {description: OK}}
  /api/autonomous/config:
    get:
      summary: Read autonomous config
      operationId: autonomousConfigGet
      tags: [Autonomous]
      responses: {"200": {description: OK}}
    put:
      summary: Replace autonomous config
      operationId: autonomousConfigSet
      tags: [Autonomous]
      requestBody:
        required: true
        content:
          application/json:
            schema: {type: object}
      responses: {"200": {description: OK}, "400": {description: Bad Request}}
  /api/autonomous/prds:
    get:
      summary: List PRDs (newest first)
      operationId: autonomousPRDList
      tags: [Autonomous]
      responses: {"200": {description: OK}}
    post:
      summary: Create a draft PRD
      operationId: autonomousPRDCreate
      tags: [Autonomous]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [spec]
              properties:
                spec: {type: string}
                project_dir: {type: string}
                backend: {type: string}
                effort: {type: string}
      responses: {"200": {description: OK}}
  /api/autonomous/prds/{id}:
    parameters: [{name: id, in: path, required: true, schema: {type: string}}]
    get:
      summary: Fetch one PRD with story+task tree
      operationId: autonomousPRDGet
      tags: [Autonomous]
      responses: {"200": {description: OK}, "404": {description: Not found}}
    delete:
      summary: Cancel + archive a PRD
      operationId: autonomousPRDCancel
      tags: [Autonomous]
      responses: {"200": {description: OK}}
  /api/autonomous/prds/{id}/decompose:
    post:
      summary: Run LLM decomposition for a PRD
      operationId: autonomousPRDDecompose
      tags: [Autonomous]
      parameters: [{name: id, in: path, required: true, schema: {type: string}}]
      responses: {"200": {description: OK}}
  /api/autonomous/prds/{id}/run:
    post:
      summary: Kick the executor for a PRD
      operationId: autonomousPRDRun
      tags: [Autonomous]
      parameters: [{name: id, in: path, required: true, schema: {type: string}}]
      responses: {"200": {description: OK}}
  /api/autonomous/learnings:
    get:
      summary: List extracted post-task learnings
      operationId: autonomousLearnings
      tags: [Autonomous]
      responses: {"200": {description: OK}}

  # ─── Plugin framework (BL33, v3.11.0) ──────────────────────────
  /api/plugins:
    get:
      summary: List discovered plugins
      operationId: pluginsList
      tags: [Plugins]
      responses: {"200": {description: OK}}
  /api/plugins/reload:
    post:
      summary: Rescan the plugins directory
      operationId: pluginsReload
      tags: [Plugins]
      responses: {"200": {description: OK}}
  /api/plugins/{name}:
    parameters: [{name: name, in: path, required: true, schema: {type: string}}]
    get:
      summary: Fetch plugin manifest + invocation stats
      operationId: pluginGet
      tags: [Plugins]
      responses: {"200": {description: OK}, "404": {description: Not found}}
  /api/plugins/{name}/enable:
    post:
      summary: Enable a plugin
      operationId: pluginEnable
      tags: [Plugins]
      parameters: [{name: name, in: path, required: true, schema: {type: string}}]
      responses: {"200": {description: OK}}
  /api/plugins/{name}/disable:
    post:
      summary: Disable a plugin
      operationId: pluginDisable
      tags: [Plugins]
      parameters: [{name: name, in: path, required: true, schema: {type: string}}]
      responses: {"200": {description: OK}}
  /api/plugins/{name}/test:
    post:
      summary: Synthetic hook invocation for debugging
      operationId: pluginTest
      tags: [Plugins]
      parameters: [{name: name, in: path, required: true, schema: {type: string}}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hook]
              properties:
                hook: {type: string}
                payload: {type: object}
      responses: {"200": {description: OK}, "400": {description: Bad Request}}

  # ─── PRD-DAG orchestrator (BL117, v4.0.0) ──────────────────────
  /api/orchestrator/config:
    get:
      summary: Read orchestrator config
      operationId: orchestratorConfigGet
      tags: [Orchestrator]
      responses: {"200": {description: OK}}
    put:
      summary: Replace orchestrator config
      operationId: orchestratorConfigSet
      tags: [Orchestrator]
      requestBody:
        required: true
        content:
          application/json:
            schema: {type: object}
      responses: {"200": {description: OK}, "400": {description: Bad Request}}
  /api/orchestrator/graphs:
    get:
      summary: List all PRD-DAG graphs
      operationId: orchestratorGraphList
      tags: [Orchestrator]
      responses: {"200": {description: OK}}
    post:
      summary: Create a graph from a set of BL24 PRD IDs
      operationId: orchestratorGraphCreate
      tags: [Orchestrator]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, prd_ids]
              properties:
                title: {type: string}
                project_dir: {type: string}
                prd_ids:
                  type: array
                  items: {type: string}
                deps:
                  type: object
                  additionalProperties:
                    type: array
                    items: {type: string}
      responses: {"200": {description: OK}}
  /api/orchestrator/graphs/{id}:
    parameters: [{name: id, in: path, required: true, schema: {type: string}}]
    get:
      summary: Fetch one graph with node tree + verdicts
      operationId: orchestratorGraphGet
      tags: [Orchestrator]
      responses: {"200": {description: OK}, "404": {description: Not found}}
    delete:
      summary: Cancel + archive a graph
      operationId: orchestratorGraphCancel
      tags: [Orchestrator]
      responses: {"200": {description: OK}}
  /api/orchestrator/graphs/{id}/plan:
    post:
      summary: (Re)build the node tree for a graph
      operationId: orchestratorGraphPlan
      tags: [Orchestrator]
      parameters: [{name: id, in: path, required: true, schema: {type: string}}]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                deps:
                  type: object
                  additionalProperties:
                    type: array
                    items: {type: string}
      responses: {"200": {description: OK}}
  /api/orchestrator/graphs/{id}/run:
    post:
      summary: Fire-and-forget runner kick
      operationId: orchestratorGraphRun
      tags: [Orchestrator]
      parameters: [{name: id, in: path, required: true, schema: {type: string}}]
      responses: {"200": {description: OK}}
  /api/orchestrator/verdicts:
    get:
      summary: List guardrail verdicts across all graphs
      operationId: orchestratorVerdicts
      tags: [Orchestrator]
      responses: {"200": {description: OK}}

  # ─── Mobile-client parity endpoints (documented in v4.0.3) ────
  /api/backends/active:
    post:
      summary: Switch the default LLM backend for new sessions
      operationId: backendsActive
      tags: [Backends]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: {type: string, example: "claude-code"}
      responses:
        "200": {description: "{status: ok, active: <name>}"}
        "400": {description: unknown backend}
  /api/channels:
    get:
      summary: List messaging channel backends with enabled state
      operationId: channelsList
      tags: [Channels]
      responses: {"200": {description: OK}}
    post:
      summary: Create a new channel (deferred; returns 501 in v4.0.3)
      operationId: channelsCreate
      tags: [Channels]
      responses: {"501": {description: Use PUT /api/config with the matching backend block}}
  /api/channels/{id}:
    parameters: [{name: id, in: path, required: true, schema: {type: string}}]
    patch:
      summary: Toggle channel enabled state
      operationId: channelsPatch
      tags: [Channels]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: {type: boolean}
      responses: {"200": {description: OK}, "404": {description: unknown channel}}
    delete:
      summary: Disable a channel (config retained for re-enable)
      operationId: channelsDelete
      tags: [Channels]
      responses: {"200": {description: OK}, "404": {description: unknown channel}}
  /api/channel/send:
    post:
      summary: Send a test message through a named channel
      operationId: channelSend
      tags: [Channels]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channel: {type: string, description: "channel name or id"}
                message: {type: string}
      responses: {"200": {description: OK}, "502": {description: provider rejected}}
  /api/sessions/delete:
    post:
      summary: "Delete a session (single or bulk). Accepts {id} or {ids: [...]}"
      operationId: sessionsDelete
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id: {type: string}
                ids:
                  type: array
                  items: {type: string}
      responses: {"200": {description: OK}}
  /api/sessions/timeline:
    get:
      summary: Session event timeline (state transitions + key events)
      operationId: sessionsTimeline
      tags: [Sessions]
      parameters:
        - {name: id, in: query, required: true, schema: {type: string}}
        - {name: since, in: query, schema: {type: integer, description: "epoch ms"}}
        - {name: limit, in: query, schema: {type: integer}}
      responses: {"200": {description: OK}}
  /api/cert:
    get:
      summary: Download the server CA certificate PEM
      operationId: cert
      tags: [Security]
      responses:
        "200":
          description: PEM-encoded certificate
          content:
            application/x-pem-file: {schema: {type: string}}
        "404": {description: TLS not enabled}
  /api/interfaces:
    get:
      summary: List network interfaces the daemon sees
      operationId: interfaces
      tags: [Diagnostics]
      responses: {"200": {description: OK}}
  /api/logs:
    get:
      summary: Paged daemon log tail
      operationId: logs
      tags: [Diagnostics]
      parameters:
        - {name: level, in: query, schema: {type: string, enum: [info, warn, error]}}
        - {name: since, in: query, schema: {type: integer, description: "epoch ms"}}
        - {name: limit, in: query, schema: {type: integer}}
      responses: {"200": {description: OK}}
  /api/restart:
    post:
      summary: Restart the daemon (re-exec). Returns before the old process exits.
      operationId: restart
      tags: [Operations]
      responses: {"200": {description: "{status: restarting}"}}
  /api/ollama/models:
    get:
      summary: List installed Ollama models (name, size, modified)
      operationId: ollamaModels
      tags: [Backends]
      responses: {"200": {description: OK}}
  /api/openwebui/models:
    get:
      summary: List OpenWebUI models
      operationId: openwebuiModels
      tags: [Backends]
      responses: {"200": {description: OK}}

  # ─── Observer (BL171, v4.1.0) — unified stats / process-tree /
  # sub-process monitoring. /api/stats gained a ?v=2 param that
  # returns the structured StatsResponse v2 payload. /api/observer/*
  # exposes the envelope + tree drill-downs that mobile + PWA use.
  /api/observer/stats:
    get:
      summary: StatsResponse v2 snapshot (structured host / cpu / mem / disk / gpu / sessions / backends / envelopes / processes)
      operationId: observerStats
      tags: [Observer]
      responses: {"200": {description: OK}, "503": {description: observer disabled}}
  /api/observer/envelopes:
    get:
      summary: Envelope rollup only — per-session + per-LLM-backend CPU / mem / net / GPU totals
      operationId: observerEnvelopes
      tags: [Observer]
      responses: {"200": {description: OK}, "503": {description: observer disabled}}
  /api/observer/envelope:
    get:
      summary: Drill-down — process sub-tree for one envelope by id
      operationId: observerEnvelope
      tags: [Observer]
      parameters:
        - {name: id, in: query, required: true, schema: {type: string},
           description: "envelope id, e.g. session:ralfthewise-787e or backend:ollama"}
      responses: {"200": {description: OK}, "404": {description: envelope not found}, "503": {description: observer disabled}}
  /api/observer/config:
    get:
      summary: Read observer config
      operationId: observerConfigGet
      tags: [Observer]
      responses: {"200": {description: OK}}
    put:
      summary: Replace observer config (full body)
      operationId: observerConfigSet
      tags: [Observer]
      requestBody:
        required: true
        content: {application/json: {schema: {type: object}}}
      responses: {"200": {description: OK}, "400": {description: Bad Request}}

  # ─── Observer peers (BL172 / S11 Shape B + C) — federated peer
  # registry. 503 when observer.peers.allow_register is false.
  /api/observer/peers:
    get:
      summary: List registered Shape B / C peers (TokenHash redacted)
      operationId: observerPeersList
      tags: [Observer]
      responses: {"200": {description: OK}, "503": {description: Peer registry disabled}}
    post:
      summary: Register a Shape B / C peer; returns the minted bearer token (only opportunity)
      operationId: observerPeersRegister
      tags: [Observer]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:    {type: string, description: "Stable peer name (commonly hostname)"}
                shape:   {type: string, enum: [B, C], default: B}
                version: {type: string}
                host_info: {type: object, additionalProperties: true}
      responses:
        "200":
          description: Registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:  {type: string}
                  shape: {type: string}
                  token: {type: string, description: "Bearer token — store securely; only returned once"}
        "400": {description: Bad Request}
        "503": {description: Peer registry disabled}
  /api/observer/peers/{name}:
    parameters:
      - {name: name, in: path, required: true, schema: {type: string}}
    get:
      summary: Peer detail (TokenHash redacted)
      operationId: observerPeerGet
      tags: [Observer]
      responses: {"200": {description: OK}, "404": {description: Not found}, "503": {description: Peer registry disabled}}
    delete:
      summary: De-register a peer (rotates the token — peer auto-re-registers on next push)
      operationId: observerPeerDelete
      tags: [Observer]
      responses: {"200": {description: OK}, "404": {description: Not found}, "503": {description: Peer registry disabled}}
  /api/observer/peers/{name}/stats:
    parameters:
      - {name: name, in: path, required: true, schema: {type: string}}
    get:
      summary: Last-known StatsResponse v2 snapshot for the peer
      operationId: observerPeerLastStats
      tags: [Observer]
      responses: {"200": {description: OK}, "404": {description: No snapshot or unknown peer}, "503": {description: Peer registry disabled}}
    post:
      summary: Push a StatsResponse v2 snapshot (Bearer auth from `register`)
      description: |
        Push body wraps the StatsResponse v2 with `shape` and
        `peer_name` fields so the parent can roll up envelopes
        per-peer. peer_name in the body must match the path segment.
      operationId: observerPeerPush
      tags: [Observer]
      security:
        - BearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [snapshot]
              properties:
                shape:     {type: string, enum: [B, C]}
                peer_name: {type: string}
                snapshot:  {type: object, description: "StatsResponse v2 payload"}
      responses:
        "200": {description: Accepted}
        "400": {description: Bad payload or peer_name mismatch}
        "401": {description: Missing or invalid bearer token}
        "503": {description: Peer registry disabled}

  # ─── Memory + Knowledge Graph (BL23 episodic + BL57 KG, BL101 cross-
  # profile namespaces). All endpoints 503 when memory is not enabled.
  /api/memory/stats:
    get:
      summary: Memory backend status (provider, embedder, counts, last write)
      operationId: memoryStats
      tags: [Memory]
      responses: {"200": {description: OK}, "503": {description: Memory not enabled}}
  /api/memory/list:
    get:
      summary: List recent memories (most recent first)
      operationId: memoryList
      tags: [Memory]
      parameters:
        - {name: limit, in: query, required: false, schema: {type: integer}}
        - {name: namespace, in: query, required: false, schema: {type: string}}
      responses: {"200": {description: OK}, "503": {description: Memory not enabled}}
  /api/memory/search:
    get:
      summary: Semantic recall over the episodic store
      description: |
        Vector search across stored memories. Pass `q` for the query
        string. Optional `profile` (or `agent_id`) expands the
        namespace set per BL101 mutual-opt-in rules so workers see
        peer-profile memories without knowing raw namespace ids.
      operationId: memorySearch
      tags: [Memory]
      parameters:
        - {name: q, in: query, required: true, schema: {type: string}}
        - {name: limit, in: query, required: false, schema: {type: integer}}
        - {name: profile, in: query, required: false, schema: {type: string}}
        - {name: agent_id, in: query, required: false, schema: {type: string}}
        - {name: namespace, in: query, required: false, schema: {type: string}}
      responses: {"200": {description: OK}, "400": {description: Missing q}, "503": {description: Memory not enabled}}
  /api/memory/save:
    post:
      summary: Store a new memory (decision, pattern, finding)
      operationId: memorySave
      tags: [Memory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content: {type: string}
                kind: {type: string, description: "decision / pattern / finding / context (free-form)"}
                namespace: {type: string}
                tags: {type: array, items: {type: string}}
                metadata: {type: object}
      responses: {"200": {description: Saved}, "400": {description: Bad Request}, "503": {description: Memory not enabled}}
  /api/memory/delete:
    post:
      summary: Forget a memory by id
      operationId: memoryDelete
      tags: [Memory]
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, required: [id], properties: {id: {type: string}}}}}
      responses: {"200": {description: OK}, "404": {description: Not found}, "503": {description: Memory not enabled}}
  /api/memory/reindex:
    post:
      summary: Rebuild the vector index for a namespace (or all namespaces)
      operationId: memoryReindex
      tags: [Memory]
      requestBody:
        required: false
        content: {application/json: {schema: {type: object, properties: {namespace: {type: string}}}}}
      responses: {"200": {description: Reindex started}, "503": {description: Memory not enabled}}
  /api/memory/learnings:
    get:
      summary: Recent learnings (decisions + verifier results) feeding the autonomous loop
      operationId: memoryLearnings
      tags: [Memory]
      parameters:
        - {name: limit, in: query, required: false, schema: {type: integer}}
        - {name: since, in: query, required: false, schema: {type: string, format: date-time}}
      responses: {"200": {description: OK}, "503": {description: Memory not enabled}}
  /api/memory/research:
    get:
      summary: Cross-session research aggregator (deep search with KG context)
      operationId: memoryResearch
      tags: [Memory]
      parameters:
        - {name: q, in: query, required: true, schema: {type: string}}
        - {name: depth, in: query, required: false, schema: {type: integer}}
      responses: {"200": {description: OK}, "400": {description: Missing q}, "503": {description: Memory not enabled}}
  /api/memory/export:
    get:
      summary: Export the entire memory store as a portable JSON bundle
      operationId: memoryExport
      tags: [Memory]
      responses:
        "200":
          description: JSON bundle (memories + KG + namespaces)
          content: {application/json: {schema: {type: object}}}
        "503": {description: Memory not enabled}
  /api/memory/import:
    post:
      summary: Import a memory bundle (idempotent — existing ids are skipped)
      operationId: memoryImport
      tags: [Memory]
      requestBody:
        required: true
        content: {application/json: {schema: {type: object}}}
      responses: {"200": {description: Imported}, "400": {description: Bad bundle}, "503": {description: Memory not enabled}}
  /api/memory/wal:
    get:
      summary: Tail of the memory write-ahead audit log
      operationId: memoryWAL
      tags: [Memory]
      parameters:
        - {name: limit, in: query, required: false, schema: {type: integer}}
      responses: {"200": {description: OK}, "503": {description: Memory not enabled}}
  /api/memory/test:
    get:
      summary: Probe the configured backend before flipping the enable flag
      description: PWA Settings toggle uses this to validate Postgres + embedder reachability.
      operationId: memoryTest
      tags: [Memory]
      responses: {"200": {description: Reachable}, "502": {description: Backend unreachable}}
  /api/memory/kg/query:
    get:
      summary: Knowledge-graph query (entities + relationships)
      operationId: kgQuery
      tags: [Memory]
      parameters:
        - {name: q, in: query, required: true, schema: {type: string}}
        - {name: depth, in: query, required: false, schema: {type: integer}}
      responses: {"200": {description: OK}, "400": {description: Missing q}, "503": {description: Memory not enabled}}
  /api/memory/kg/add:
    post:
      summary: Add an entity / relationship to the knowledge graph
      operationId: kgAdd
      tags: [Memory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                subject: {type: string}
                predicate: {type: string}
                object: {type: string}
                metadata: {type: object}
      responses: {"200": {description: OK}, "400": {description: Bad Request}, "503": {description: Memory not enabled}}
  /api/memory/kg/invalidate:
    post:
      summary: Invalidate (soft-delete) a KG triple by id
      operationId: kgInvalidate
      tags: [Memory]
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, required: [id], properties: {id: {type: string}, reason: {type: string}}}}}
      responses: {"200": {description: OK}, "404": {description: Not found}, "503": {description: Memory not enabled}}
  /api/memory/kg/timeline:
    get:
      summary: Timeline view of KG changes for an entity
      operationId: kgTimeline
      tags: [Memory]
      parameters:
        - {name: entity, in: query, required: true, schema: {type: string}}
        - {name: limit, in: query, required: false, schema: {type: integer}}
      responses: {"200": {description: OK}, "400": {description: Missing entity}, "503": {description: Memory not enabled}}
  /api/memory/kg/stats:
    get:
      summary: KG counts (entities, triples, namespaces)
      operationId: kgStats
      tags: [Memory]
      responses: {"200": {description: OK}, "503": {description: Memory not enabled}}

  # ─── Voice transcription (issue #2 / F18) — Whisper-backed
  # multipart upload returning the transcript and an optional command
  # action. Used by the PWA mic button (#21, v4.2.0) and by mobile.
  /api/voice/transcribe:
    post:
      summary: Transcribe an audio blob with Whisper (returns transcript + optional action dispatch)
      description: |
        Accepts multipart/form-data with an `audio` blob (opus/ogg/webm/mp4
        preferred). When `session_id` is set the result auto-replies into
        that session; when `auto_exec` is `true` and the transcript starts
        with `new:`, `reply:`, or `status`, the corresponding action is
        returned in the `action` field.
      operationId: voiceTranscribe
      tags: [Voice]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [audio]
              properties:
                audio:
                  type: string
                  format: binary
                  description: Audio blob (opus/ogg/webm/mp4 preferred, mono 16 kHz)
                session_id:
                  type: string
                  description: When set the transcript is replied into this session
                auto_exec:
                  type: string
                  description: "true / 1 — run a recognised command prefix (new:/reply:/status)"
                ts_client:
                  type: string
                  description: unix_ms client send time, for latency telemetry
      responses:
        "200":
          description: Transcript + optional action
          content:
            application/json:
              schema:
                type: object
                properties:
                  transcript: {type: string}
                  confidence: {type: number}
                  action: {type: string, enum: [none, new, reply, status]}
                  session_id: {type: string}
                  latency_ms: {type: integer}
        "400": {description: Missing or malformed audio}
        "502": {description: Whisper backend error}
        "503": {description: Voice transcription not enabled}

  # ─── RTK auto-update (BL85, v4.0.1) — surfaces the background
  # checker to operators so they can see the available rtk version
  # and trigger an update from the PWA / Signal.
  /api/rtk/version:
    get:
      summary: Currently-installed rtk version + last-known available release
      operationId: rtkVersion
      tags: [RTK]
      responses:
        "200":
          description: Version info
          content:
            application/json:
              schema:
                type: object
                properties:
                  installed: {type: string}
                  available: {type: string}
                  update_available: {type: boolean}
                  checked_at: {type: string, format: date-time}
  /api/rtk/check:
    post:
      summary: Force a check against the rtk-ai/rtk releases endpoint now
      operationId: rtkCheck
      tags: [RTK]
      responses: {"200": {description: Check completed}, "502": {description: GitHub releases unreachable}}
  /api/rtk/update:
    post:
      summary: Download + install the available rtk binary (atomic replace + chmod)
      description: |
        Operator-triggered update. The PWA Settings → Monitor card
        surfaces the upstream install one-liner
        (`curl -fsSL https://raw.githubusercontent.com/rtk-ai/rtk/refs/heads/master/install.sh | sh`)
        as a click-to-copy chip when an upgrade is available, so the
        operator can run it manually if they prefer.
      operationId: rtkUpdate
      tags: [RTK]
      responses: {"200": {description: Updated}, "409": {description: Already up to date}, "502": {description: Download failed}}
  /api/rtk/discover:
    get:
      summary: Walk recent Claude Code sessions and report missed RTK opportunities
      operationId: rtkDiscover
      tags: [RTK]
      responses: {"200": {description: Discovery report}}

  # ─── Cost tracking (BL6) — token + USD rollups across sessions and
  # backends. Mobile + PWA Settings card both consume.
  /api/cost:
    get:
      summary: Token + USD cost rollup across all sessions
      operationId: costSummary
      tags: [Cost]
      parameters:
        - {name: since, in: query, required: false, schema: {type: string, format: date-time}}
        - {name: backend, in: query, required: false, schema: {type: string}}
      responses: {"200": {description: OK}}
  /api/cost/usage:
    get:
      summary: Per-session usage + cost detail
      operationId: costUsage
      tags: [Cost]
      parameters:
        - {name: session_id, in: query, required: false, schema: {type: string}}
        - {name: limit, in: query, required: false, schema: {type: integer}}
      responses: {"200": {description: OK}}
  /api/cost/rates:
    get:
      summary: Current per-model price-per-token rates
      operationId: costRatesGet
      tags: [Cost]
      responses: {"200": {description: OK}}
    put:
      summary: Operator override for per-model rates
      operationId: costRatesSet
      tags: [Cost]
      requestBody:
        required: true
        content: {application/json: {schema: {type: object}}}
      responses: {"200": {description: OK}, "400": {description: Bad Request}}

  # ─── Schedules — plural path the server actually serves (v4.0.7 fix for issue #16)
  /api/schedules:
    get:
      summary: List scheduled commands (plural alias of /api/schedule)
      description: |
        Returns scheduled commands. Optional query params filter
        the result set; the PWA uses both `session_id` and `state`.
      operationId: listSchedules
      tags: [Schedule]
      parameters:
        - name: session_id
          in: query
          required: false
          description: Filter to schedules attached to a specific session
          schema: {type: string}
        - name: state
          in: query
          required: false
          description: Filter by lifecycle state
          schema: {type: string, enum: [pending, fired, cancelled, failed]}
      responses:
        "200":
          description: Array of scheduled command entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduledCommand"
    post:
      summary: Add a scheduled command (plural alias of /api/schedule)
      operationId: addSchedule
      tags: [Schedule]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduledCommand"
      responses:
        "200":
          description: Scheduled command added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduledCommand"
    delete:
      summary: Cancel a scheduled command by id (plural alias of /api/schedule)
      operationId: deleteSchedule
      tags: [Schedule]
      parameters:
        - name: id
          in: query
          required: true
          schema: {type: string}
      responses:
        "200": {description: OK}
        "404": {description: schedule not found}

  # ─── Profiles — backend + project + cluster profile enumeration (issue #16)
  /api/profiles:
    get:
      summary: List all registered profiles (backend / project / cluster)
      description: |
        Returns a unified list of agent profiles used by the New
        Session form. The server splits the detailed CRUD across
        `/api/profiles/projects` and `/api/profiles/clusters`; this
        top-level list is the convenience view.
      operationId: listProfiles
      tags: [Profiles]
      responses:
        "200":
          description: Array of profile summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name: {type: string}
                    kind:
                      type: string
                      enum: [backend, project, cluster]
                    default_backend: {type: string}
  /api/profiles/projects:
    get:
      summary: List project profiles
      operationId: listProjectProfiles
      tags: [Profiles]
      responses: {"200": {description: OK}}
    post:
      summary: Create or update a project profile
      operationId: upsertProjectProfile
      tags: [Profiles]
      requestBody: {required: true, content: {application/json: {schema: {type: object}}}}
      responses: {"200": {description: OK}, "400": {description: Bad Request}}
  /api/profiles/clusters:
    get:
      summary: List cluster profiles
      operationId: listClusterProfiles
      tags: [Profiles]
      responses: {"200": {description: OK}}
    post:
      summary: Create or update a cluster profile
      operationId: upsertClusterProfile
      tags: [Profiles]
      requestBody: {required: true, content: {application/json: {schema: {type: object}}}}
      responses: {"200": {description: OK}, "400": {description: Bad Request}}

  # ─── BL170 phase 5 — long-tail backfill (operator-facing routes).
  # Worker-internal / PWA-only routes deliberately omitted: /api/proxy/*,
  # /api/test/message, /api/mcp/docs, /api/agents/peer/*,
  # /api/channel/{ready,notify}, /api/stats/kill-orphans, /api/update,
  # /api/pipeline*. See docs/plans/2026-04-25-bl170-feature-completeness-audit.md.

  # Sessions sub-routes
  /api/sessions/aggregated:
    get:
      summary: Aggregated session view across federated peers
      operationId: sessionsAggregated
      tags: [Sessions]
      responses: {"200": {description: OK}}
  /api/sessions/bind:
    post:
      summary: Bind a session to an agent worker (proxies session reads through /api/proxy/agent/...)
      operationId: sessionBind
      tags: [Sessions]
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [session_id, agent_id], properties: {session_id: {type: string}, agent_id: {type: string}}}}}}
      responses: {"200": {description: Bound}, "404": {description: Session or agent not found}}
  /api/sessions/import:
    post:
      summary: Import a single orphan session from disk (BL94)
      operationId: sessionImport
      tags: [Sessions]
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [path], properties: {path: {type: string}}}}}}
      responses: {"200": {description: Imported}, "404": {description: Session dir not found}}
  /api/sessions/kill:
    post:
      summary: Terminate a session (sends SIGTERM to the tmux process)
      operationId: sessionKill
      tags: [Sessions]
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [id], properties: {id: {type: string}}}}}}
      responses: {"200": {description: OK}, "404": {description: Not found}}
  /api/sessions/prompt:
    get:
      summary: Inspect the captured prompt waiting for input (when state=waiting_input)
      operationId: sessionPromptGet
      tags: [Sessions]
      parameters:
        - {name: id, in: query, required: true, schema: {type: string}}
      responses: {"200": {description: OK}, "404": {description: Not found}}
  /api/sessions/reconcile:
    get:
      summary: List orphan session directories on disk that are missing from the registry (BL93)
      operationId: sessionReconcile
      tags: [Sessions]
      responses: {"200": {description: List of orphans}}
  /api/sessions/response:
    get:
      summary: Last LLM response for a session (final assistant message, parsed)
      operationId: sessionResponse
      tags: [Sessions]
      parameters:
        - {name: id, in: query, required: true, schema: {type: string}}
      responses: {"200": {description: OK}, "404": {description: Not found}}
  /api/sessions/stale:
    get:
      summary: List running sessions stuck longer than session.stale_timeout_seconds (BL40)
      operationId: sessionsStale
      tags: [Sessions]
      parameters:
        - {name: seconds, in: query, required: false, schema: {type: integer}}
      responses: {"200": {description: OK}}
  /api/sessions/state:
    post:
      summary: Manual state override (operator only — bypasses idle-detection)
      operationId: sessionStateOverride
      tags: [Sessions]
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [id, state], properties: {id: {type: string}, state: {type: string, enum: [running, waiting_input, complete, killed, rate_limited]}}}}}}
      responses: {"200": {description: OK}, "400": {description: Bad state}, "404": {description: Not found}}

  # Agents
  /api/agents:
    get:
      summary: List ephemeral agent workers (F10 sprint 3+)
      operationId: agentsList
      tags: [Agents]
      responses: {"200": {description: OK}}
    post:
      summary: Spawn a new agent worker
      operationId: agentSpawn
      tags: [Agents]
      requestBody: {required: true, content: {application/json: {schema: {type: object}}}}
      responses: {"200": {description: Spawned}, "400": {description: Bad Request}}
  /api/agents/audit:
    get:
      summary: Tail of the agent-audit log (BL107) — every spawn, terminate, bootstrap event
      operationId: agentsAudit
      tags: [Agents]
      parameters:
        - {name: limit, in: query, required: false, schema: {type: integer}}
        - {name: agent_id, in: query, required: false, schema: {type: string}}
      responses: {"200": {description: OK}}

  # Channel
  /api/channel/reply:
    post:
      summary: Inbound MCP-bridge reply from Claude (used by channel.js)
      operationId: channelReply
      tags: [Channel]
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [session_id, text], properties: {session_id: {type: string}, text: {type: string}}}}}}
      responses: {"200": {description: OK}}

  # Devices
  /api/devices:
    get:
      summary: List registered devices (F17 mobile registry)
      operationId: devicesList
      tags: [Devices]
      responses: {"200": {description: OK}}
  /api/devices/register:
    post:
      summary: Register a new device for push notifications
      operationId: deviceRegister
      tags: [Devices]
      requestBody: {required: true, content: {application/json: {schema: {type: object}}}}
      responses: {"200": {description: Registered}, "400": {description: Bad Request}}
  /api/device-aliases:
    get:
      summary: "List device aliases for `new: @<alias>:` routing (BL31)"
      operationId: deviceAliasList
      tags: [Devices]
      responses: {"200": {description: OK}}
    post:
      summary: Upsert a device alias
      operationId: deviceAliasUpsert
      tags: [Devices]
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [alias, target], properties: {alias: {type: string}, target: {type: string}}}}}}
      responses: {"200": {description: OK}}
    delete:
      summary: Delete a device alias
      operationId: deviceAliasDelete
      tags: [Devices]
      parameters:
        - {name: alias, in: query, required: true, schema: {type: string}}
      responses: {"200": {description: OK}, "404": {description: Not found}}

  # Routing rules (BL20)
  /api/routing-rules:
    get:
      summary: List backend auto-selection routing rules
      operationId: routingRulesList
      tags: [Routing]
      responses: {"200": {description: OK}}
    put:
      summary: Replace the routing rules set
      operationId: routingRulesSet
      tags: [Routing]
      requestBody: {required: true, content: {application/json: {schema: {type: object}}}}
      responses: {"200": {description: OK}, "400": {description: Bad Request}}
  /api/routing-rules/test:
    post:
      summary: Test which backend a given task string would route to
      operationId: routingRulesTest
      tags: [Routing]
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [task], properties: {task: {type: string}, project_dir: {type: string}}}}}}
      responses: {"200": {description: OK}}

  # Federation (F19)
  /api/federation/sessions:
    get:
      summary: Aggregated session list across all federated peers
      operationId: federationSessions
      tags: [Federation]
      responses: {"200": {description: OK}}

  # Splash (BL69)
  /api/splash/info:
    get:
      summary: Render context for splash (logo, tagline, version)
      operationId: splashInfo
      tags: [Splash]
      responses: {"200": {description: OK}}
  /api/splash/logo:
    get:
      summary: Splash logo image
      operationId: splashLogo
      tags: [Splash]
      responses: {"200": {description: OK, content: {image/svg+xml: {}, image/png: {}}}}

  # Operator-facing singletons
  /api/ask:
    post:
      summary: Single-shot LLM ask — no session, no tmux (BL34)
      operationId: ask
      tags: [Singletons]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question: {type: string}
                backend: {type: string}
                model: {type: string}
      responses: {"200": {description: OK}, "503": {description: Backend not configured}}
  /api/assist:
    post:
      summary: Quick-response assistant (BL42) — uses the configured assistant backend
      operationId: assist
      tags: [Singletons]
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [text], properties: {text: {type: string}}}}}}
      responses: {"200": {description: OK}, "503": {description: Assistant backend not configured}}
  /api/audit:
    get:
      summary: Query the operator-action audit log (BL9)
      operationId: auditQuery
      tags: [Singletons]
      parameters:
        - {name: actor, in: query, required: false, schema: {type: string}}
        - {name: action, in: query, required: false, schema: {type: string}}
        - {name: session_id, in: query, required: false, schema: {type: string}}
        - {name: since, in: query, required: false, schema: {type: string, format: date-time}}
        - {name: until, in: query, required: false, schema: {type: string, format: date-time}}
        - {name: limit, in: query, required: false, schema: {type: integer}}
      responses: {"200": {description: OK}}
  /api/cooldown:
    get:
      summary: Current global rate-limit cooldown state (BL30)
      operationId: cooldownGet
      tags: [Singletons]
      responses: {"200": {description: OK}}
    put:
      summary: Set or clear the global cooldown
      operationId: cooldownSet
      tags: [Singletons]
      requestBody: {required: true, content: {application/json: {schema: {type: object}}}}
      responses: {"200": {description: OK}}
  /api/diagnose:
    get:
      summary: Diagnostic snapshot — backend reachability, config validity, recent errors (BL37)
      operationId: diagnose
      tags: [Singletons]
      responses: {"200": {description: OK}}
  /api/analytics:
    get:
      summary: Aggregate analytics — session counts, backend distribution, cost summary (BL12)
      operationId: analytics
      tags: [Singletons]
      responses: {"200": {description: OK}}
  /api/reload:
    post:
      summary: Hot config reload (BL17) — equivalent to SIGHUP
      operationId: reload
      tags: [Singletons]
      responses: {"200": {description: Reloaded}, "400": {description: Config invalid}}
  /api/project/summary:
    get:
      summary: Project overview — git status + sessions + stats (BL35)
      operationId: projectSummary
      tags: [Singletons]
      parameters:
        - {name: dir, in: query, required: true, schema: {type: string}}
      responses: {"200": {description: OK}, "400": {description: Missing dir}}
  /api/projects:
    get:
      summary: List project aliases (BL27)
      operationId: projectsList
      tags: [Singletons]
      responses: {"200": {description: OK}}
    post:
      summary: Upsert a project alias
      operationId: projectsUpsert
      tags: [Singletons]
      requestBody: {required: true, content: {application/json: {schema: {type: object}}}}
      responses: {"200": {description: OK}}
  /api/templates:
    get:
      summary: List session-start templates (BL5)
      operationId: templatesList
      tags: [Singletons]
      responses: {"200": {description: OK}}
    post:
      summary: Upsert a template
      operationId: templatesUpsert
      tags: [Singletons]
      requestBody: {required: true, content: {application/json: {schema: {type: object}}}}
      responses: {"200": {description: OK}}
    delete:
      summary: Delete a template
      operationId: templatesDelete
      tags: [Singletons]
      parameters:
        - {name: name, in: query, required: true, schema: {type: string}}
      responses: {"200": {description: OK}}
  /api/servers/health:
    get:
      summary: Health of every configured remote datawatch server (proxy pool)
      operationId: serversHealth
      tags: [Singletons]
      responses: {"200": {description: OK}}
  /api/stats:
    get:
      summary: Legacy v1 stats (host + cpu + mem + disk). Pass ?v=2 for the structured StatsResponse v2 (Observer)
      operationId: stats
      tags: [Singletons]
      parameters:
        - {name: v, in: query, required: false, schema: {type: string}, description: "Pass 2 for the structured v2 payload"}
      responses: {"200": {description: OK}}
  /api/ollama/stats:
    get:
      summary: Ollama-specific stats — running models, queue depth
      operationId: ollamaStats
      tags: [Singletons]
      responses: {"200": {description: OK}, "503": {description: Ollama not configured}}

components:
  securitySchemes:
    BearerToken:
      type: http
      scheme: bearer
    QueryToken:
      type: apiKey
      in: query
      name: token
    NoAuth:
      type: http
      scheme: basic
      description: No authentication (when token is not configured)

  responses:
    Unauthorized:
      description: Authentication required
      content:
        text/plain:
          schema:
            type: string
            example: "unauthorized"

  schemas:
    Session:
      type: object
      properties:
        id:
          type: string
          description: Short 4-character hex ID
          example: "a3f2"
        full_id:
          type: string
          description: Full hostname-prefixed ID
          example: "hal9000-a3f2"
        name:
          type: string
          description: Optional human-readable name (set at creation or via rename)
          example: "auth refactor"
        task:
          type: string
          description: Original task description
          example: "write a fibonacci function in Go"
        llm_backend:
          type: string
          description: LLM backend used for this session
          example: "claude-code"
        tmux_session:
          type: string
          description: tmux session name
          example: "cs-hal9000-a3f2"
        log_file:
          type: string
          description: Path to the session's output log
          example: "/home/user/.datawatch/logs/hal9000-a3f2.log"
        state:
          $ref: "#/components/schemas/SessionState"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        hostname:
          type: string
          example: "hal9000"
        group_id:
          type: string
          description: Signal group ID this session was created from
        pending_input:
          type: string
          description: Set when waiting for user input
        last_prompt:
          type: string
          description: The prompt text that triggered waiting_input state

    SessionState:
      type: string
      enum: [running, waiting_input, complete, failed, killed]
      description: |
        - `running`: claude-code is actively running
        - `waiting_input`: claude-code is waiting for user response
        - `complete`: claude-code exited successfully
        - `failed`: claude-code exited with error
        - `killed`: session was manually terminated

    StartSessionRequest:
      type: object
      required: [task]
      properties:
        task:
          type: string
          description: Task description passed to the LLM
          example: "refactor the auth module"
        name:
          type: string
          description: Optional human-readable name for the session
          example: "auth refactor"
        project_dir:
          type: string
          description: |
            Absolute path to the project directory. The LLM will be constrained to this tree.
            Defaults to session.default_project_dir from config.
          example: "/home/user/projects/myapp"
        backend:
          type: string
          description: |
            LLM backend to use for this session. Must match a registered backend name.
            Defaults to the active backend from config.
          example: "aider"

    CommandRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          description: Command string in Signal command format
          example: "new: build a REST API in Go"

    CommandResponse:
      type: object
      properties:
        result:
          type: string
          description: Human-readable result message

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: "ok"
        hostname:
          type: string
        version:
          type: string
        uptime_seconds:
          type: integer

    ConfigResponse:
      type: object
      description: Masked configuration. Sensitive fields (tokens, passwords, secrets) are replaced with "***".
      properties:
        telegram:
          type: object
          properties:
            enabled: { type: boolean }
            token: { type: string, example: "***" }
            chat_id: { type: string }
        discord:
          type: object
          properties:
            enabled: { type: boolean }
            token: { type: string, example: "***" }
            channel_id: { type: string }
        slack:
          type: object
          properties:
            enabled: { type: boolean }
            token: { type: string, example: "***" }
            channel_id: { type: string }
        matrix:
          type: object
          properties:
            enabled: { type: boolean }
            homeserver: { type: string }
            user_id: { type: string }
            access_token: { type: string, example: "***" }
            room_id: { type: string }
        twilio:
          type: object
          properties:
            enabled: { type: boolean }
            account_sid: { type: string }
            auth_token: { type: string, example: "***" }
            from_number: { type: string }
            to_number: { type: string }
        ntfy:
          type: object
          properties:
            enabled: { type: boolean }
            server_url: { type: string }
            topic: { type: string }
            token: { type: string, example: "***" }
        email:
          type: object
          properties:
            enabled: { type: boolean }
            host: { type: string }
            port: { type: integer }
            username: { type: string }
            from: { type: string }
            to: { type: string }
        webhook:
          type: object
          properties:
            enabled: { type: boolean }
            addr: { type: string }
        github_webhook:
          type: object
          properties:
            enabled: { type: boolean }
            addr: { type: string }
        server:
          type: object
          properties:
            enabled: { type: boolean }
            host: { type: string }
            port: { type: integer }
            tls_enabled: { type: boolean }
            token: { type: string, example: "***" }

    InfoResponse:
      type: object
      properties:
        hostname:
          type: string
        version:
          type: string
        llm_backend:
          type: string
          example: "claude-code"
        messaging_backend:
          type: string
          example: "signal"
        session_count:
          type: integer
        server:
          type: object
          properties:
            host:
              type: string
            port:
              type: integer

    ScheduledCommand:
      type: object
      description: |
        One scheduled command. Either `cron` (recurring) or `run_at`
        (one-shot) is present; both are optional but at least one is
        required when creating a new entry. `command` is the body
        that will be executed when the schedule fires; `task` is
        accepted as a legacy alias for the new-session variant.
      properties:
        id:
          type: string
          description: Unique identifier for this scheduled entry
        session_id:
          type: string
          description: Session the schedule is attached to (optional — omitted for new-session schedules)
        command:
          type: string
          description: Command body to send when the schedule fires
          example: "status"
        task:
          type: string
          description: "Legacy alias for the new-session variant; prefer `command`"
          example: "run nightly tests"
        cron:
          type: string
          description: Cron expression (5-field standard format) — omit for one-shot
          example: "0 2 * * *"
        run_at:
          type: string
          format: date-time
          description: RFC3339 timestamp for one-shot schedules — omit for recurring
        state:
          type: string
          description: Lifecycle state
          enum: [pending, fired, cancelled, failed]
        enabled:
          type: boolean
          default: true
        created_at:
          type: string
          format: date-time

    RemoteServer:
      type: object
      properties:
        name:
          type: string
          description: Short identifier used with --server flag
          example: "nas"
        url:
          type: string
          description: Base URL of the remote datawatch instance
          example: "http://203.0.113.10:8080"
        token:
          type: string
          description: Bearer token (masked as *** when non-empty)
          example: "***"
        enabled:
          type: boolean

    SavedCommand:
      type: object
      required: [name, command]
      properties:
        name:
          type: string
          description: Short name for the command
          example: "approve"
        command:
          type: string
          description: The command text to send
          example: "yes"

    FilterPattern:
      type: object
      properties:
        id:
          type: string
          description: Unique filter identifier
        pattern:
          type: string
          description: Regular expression to match against session output lines
          example: "^\\s*$"
        action:
          type: string
          description: Action to take on matching lines
          enum: [drop, highlight, alert]
          example: "drop"
        enabled:
          type: boolean
          default: true
        description:
          type: string
          description: Human-readable description of what this filter does
          example: "Drop blank lines"

    Alert:
      type: object
      properties:
        id:
          type: string
          description: Unique alert identifier
        message:
          type: string
          description: Alert message text
        level:
          type: string
          enum: [info, warning, error]
          example: "warning"
        read:
          type: boolean
          default: false
        created_at:
          type: string
          format: date-time
