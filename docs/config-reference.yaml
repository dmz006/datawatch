# ── Identity ──
# Machine identification and data storage paths.
# Identifies this machine in messages and session IDs. Auto-detected if empty.
hostname: ralfthewise
# Root directory for sessions.json, logs/, and state files.
data_dir: /var/lib/datawatch

# ── Session Management ──
# Controls session creation, LLM defaults, and project git integration.
session:
  # Active LLM backend. Options: claude-code, aider, goose, gemini, opencode, opencode-acp, opencode-prompt, ollama, openwebui, shell
  llm_backend: claude-code
  # Maximum concurrent active sessions (0 = unlimited)
  max_sessions: 10
  # Seconds of idle output before declaring a session is waiting for input
  input_idle_timeout: 10
  # Default number of output lines returned by tail/status commands
  tail_lines: 20
  # Number of non-empty output lines included in prompt alerts sent to messaging channels
  alert_context_lines: 10
  # Default working directory for new sessions
  default_project_dir: ~
  # Restrict file browser to this directory tree (empty = no restriction)
  root_path: ""
  # Path to the claude CLI binary
  claude_code_bin: claude
  # Enable the claude-code backend
  claude_enabled: true
  # Pass --dangerously-skip-permissions to claude
  skip_permissions: true
  # Enable per-session MCP channel for claude
  channel_enabled: true
  # Auto-initialize git repo in project directory
  auto_git_init: false
  # Auto-commit project changes after session completes
  auto_git_commit: true
  # Kill all sessions when daemon stops
  kill_sessions_on_exit: false
  # Max MCP channel restart attempts per session
  mcp_max_retries: 5
  # B30: ms to wait between text and Enter for scheduled commands.
  # 0 = legacy single send-keys (triggers 2nd-Enter bug on some TUIs).
  # 200 (default) fixes claude-code and other ink-based TUIs.
  schedule_settle_ms: 200
  # BL41: per-session effort hint applied when caller doesn't supply one.
  # One of: quick / normal / thorough. Default: normal.
  default_effort: "normal"
  # BL40: running sessions older than this are reported as stale via
  # GET /api/sessions/stale. 0 disables. Default 1800 (30 min).
  stale_timeout_seconds: 1800
  # BL30: when true, hitting a rate limit on any backend pauses new
  # session creation until the cooldown elapses or the operator clears
  # it via DELETE /api/cooldown. Default false.
  rate_limit_global_pause: false
  # BL6 (v3.7.1): per-backend USD rates (per 1K tokens). Empty entries
  # fall through to built-in defaults. Override here when your account
  # plan differs from the public price card.
  cost_rates:
    claude-code:
      in_per_k:  0.003
      out_per_k: 0.015
  # Log verbosity: info, debug, warn, error
  log_level: ""
  # Default terminal width (cols) for new sessions (0 = 80)
  console_cols: 0
  # Default terminal height (rows) for new sessions (0 = 24)
  console_rows: 0

# ── Web Server ──
# HTTP/WebSocket server for the PWA, REST API, and browser access.
server:
  # Enable the web server
  enabled: true
  # Bind interface. Use 0.0.0.0 for all interfaces, 127.0.0.1 for localhost only
  host: 0.0.0.0
  # HTTP listen port
  port: 8080
  # Bearer token for authentication (empty = no auth)
  token: ""
  # Enable HTTPS/TLS
  tls_enabled: false
  # Separate TLS port (0 = TLS replaces main port)
  tls_port: 0
  # Auto-generate self-signed cert if tls_cert/tls_key are empty
  tls_auto_generate: true
  # Path to TLS certificate PEM file
  tls_cert: ""
  # Path to TLS private key PEM file
  tls_key: ""
  # Per-session MCP channel port (0 = random)
  channel_port: 0
  # How long completed sessions show in active list (minutes)
  recent_session_minutes: 5
  # Auto-restart daemon when config is saved via web UI
  auto_restart_on_config: false
  # Hide toast notifications for the currently viewed session
  suppress_active_toasts: true

# ── MCP Server ──
# Model Context Protocol server for IDE and AI agent integrations.
mcp:
  # Enable MCP stdio transport (Cursor, Claude Desktop, VS Code)
  enabled: true
  # Enable HTTP/SSE transport for remote AI clients
  sse_enabled: false
  # SSE bind interface (127.0.0.1 for local, 0.0.0.0 for remote)
  sse_host: 127.0.0.1
  # SSE listen port
  sse_port: 8081
  # Bearer token for SSE connections (empty = no auth)
  token: ""
  # Enable TLS for SSE server
  tls_enabled: false
  # Auto-generate self-signed cert
  tls_auto_generate: true
  # Path to TLS certificate PEM file
  tls_cert: ""
  # Path to TLS private key PEM file
  tls_key: ""

# ── Signal ──
# Signal messenger integration via signal-cli subprocess.
signal:
  # Signal phone number in E.164 format (e.g. +12125551234)
  account_number: ""
  # Signal group ID in base64. Get via: signal-cli listGroups
  group_id: ""
  # signal-cli data directory
  config_dir: /var/lib/signal-cli
  # Name shown in Signal's Linked Devices list
  device_name: ralfthewise

# ── Messaging Backends ──
# Communication channels for commands and notifications.
telegram:
  # Enable Telegram bot
  enabled: false
  # Bot token from @BotFather
  token: ""
  # Chat/group ID
  chat_id: 0
  # Auto-manage group membership
  auto_manage_group: false
discord:
  # Enable Discord bot
  enabled: false
  # Bot token
  token: ""
  # Channel ID
  channel_id: ""
  # Auto-manage channel
  auto_manage_channel: false
slack:
  # Enable Slack bot
  enabled: false
  # OAuth bot token
  token: ""
  # Channel ID
  channel_id: ""
  # Auto-manage channel
  auto_manage_channel: false
matrix:
  # Enable Matrix homeserver
  enabled: false
  # Homeserver URL
  homeserver: ""
  # Bot user ID (@bot:host)
  user_id: ""
  # Access token
  access_token: ""
  # Room ID
  room_id: ""
  # Auto-manage room
  auto_manage_room: false
twilio:
  # Enable Twilio SMS
  enabled: false
  # Account SID
  account_sid: ""
  # Auth token
  auth_token: ""
  # From phone number
  from_number: ""
  # To phone number
  to_number: ""
  # Webhook listen address
  webhook_addr: "127.0.0.1:9003"
ntfy:
  # Enable ntfy push notifications
  enabled: false
  # ntfy server URL
  server_url: "https://ntfy.sh"
  # Topic name
  topic: ""
  # Auth token (optional)
  token: ""
email:
  # Enable email notifications
  enabled: false
  # SMTP host
  host: ""
  # SMTP port
  port: 587
  # SMTP username
  username: ""
  # SMTP password
  password: ""
  # From address
  from: ""
  # To address
  to: ""
github_webhook:
  # Enable GitHub webhook
  enabled: false
  # Listen address
  addr: "127.0.0.1:9001"
  # HMAC webhook secret
  secret: ""
webhook:
  # Enable generic webhook
  enabled: false
  # Listen address
  addr: "127.0.0.1:9002"
  # Bearer token (optional)
  token: ""

# ── DNS Channel ──
# Covert command channel via DNS TXT queries with HMAC-SHA256 authentication.
dns_channel:
  # Enable DNS channel
  enabled: false
  # Operating mode: server (authoritative DNS) or client (query via resolver)
  mode: ""
  # Domain name for DNS queries
  domain: ""
  # Server bind address (e.g. :53 or 0.0.0.0:53)
  listen: ""
  # Client upstream resolver (e.g. 8.8.8.8:53)
  upstream: ""
  # Shared HMAC-SHA256 secret for authentication
  secret: ""
  # Max queries per IP per minute (0 = unlimited)
  rate_limit: 0
  # DNS response TTL in seconds (0 = non-cacheable)
  ttl: 0
  # Max response bytes before truncation
  max_response_size: 0
  # Client polling interval (Go duration, e.g. 5s)
  poll_interval: ""

# ── LLM Backends ──
# AI coding assistant backend configurations. Each has optional console_cols/console_rows for terminal size.
ollama:
  # Enable Ollama backend
  enabled: false
  # Model name (e.g. llama3, codellama)
  model: llama3
  # Ollama API URL
  host: "http://localhost:11434"
  # Terminal width (0 = use session default)
  console_cols: 0
  # Terminal height (0 = use session default)
  console_rows: 0
openwebui:
  # Enable OpenWebUI backend
  enabled: false
  # OpenWebUI server URL
  url: "http://localhost:3000"
  # Model name
  model: llama3
  # API key
  api_key: ""
  # Terminal width
  console_cols: 0
  # Terminal height
  console_rows: 0
aider:
  # Enable aider backend
  enabled: false
  # Path to aider binary
  binary: aider
  # Terminal width
  console_cols: 0
  # Terminal height
  console_rows: 0
goose:
  # Enable goose backend
  enabled: false
  # Path to goose binary
  binary: goose
  # Terminal width
  console_cols: 0
  # Terminal height
  console_rows: 0
gemini:
  # Enable Gemini CLI backend
  enabled: false
  # Path to gemini binary
  binary: gemini
  # Terminal width
  console_cols: 0
  # Terminal height
  console_rows: 0
opencode:
  # Enable opencode backend
  enabled: false
  # Path to opencode binary
  binary: opencode
  # Enable ACP (Analysis Code Plugin) mode
  acp_enabled: false
  # Enable opencode-prompt mode
  prompt_enabled: false
  # ACP startup timeout (seconds)
  acp_startup_timeout: 0
  # ACP health check interval (seconds)
  acp_health_interval: 0
  # ACP message timeout (seconds)
  acp_message_timeout: 0
  # Terminal width
  console_cols: 0
  # Terminal height
  console_rows: 0
# OpenCode-ACP dedicated config (overrides opencode.acp_* when present)
opencode_acp:
  # Enable ACP backend
  enabled: false
  # Path to opencode binary (defaults to opencode.binary if empty)
  binary: ""
  # Output mode: "chat" (default, rich chat UI), "log" (raw log view), "terminal"
  output_mode: chat
  # ACP startup timeout (seconds, 0 = default 30s)
  acp_startup_timeout: 0
  # ACP health check interval (seconds, 0 = default 5s)
  acp_health_interval: 0
  # ACP message timeout (seconds, 0 = default 30s)
  acp_message_timeout: 0
  # Terminal width
  console_cols: 0
  # Terminal height
  console_rows: 0
shell_backend:
  # Enable shell script backend
  enabled: false
  # Script path (empty = interactive shell)
  script_path: ""
  # Terminal width
  console_cols: 0
  # Terminal height
  console_rows: 0

# ── Detection Filters ──
# Configurable patterns for session state detection. One pattern per line.
detection:
  # Patterns indicating LLM is waiting for input (empty = use built-in defaults)
  prompt_patterns: "[]"
  # Patterns indicating session completed
  completion_patterns: "[]"
  # Patterns indicating rate limit hit
  rate_limit_patterns: "[]"
  # Explicit protocol markers for input needed
  input_needed_patterns: "[]"
  # Seconds to wait after detecting a prompt before transitioning to waiting_input.
  # If new output arrives during this window, the timer resets.
  # Prevents false positives during LLM thinking pauses. Default: 3
  prompt_debounce: 3
  # Minimum seconds between repeated needs-input notifications per session.
  # Prevents notification floods. Default: 15
  notify_cooldown: 15

# ── RTK (Rust Token Killer) ──
# Token savings tracking via RTK proxy. See: https://github.com/rtk-ai/rtk
rtk:
  # Enable RTK integration (detection, stats, auto-init)
  enabled: false
  # Path to RTK binary (default: "rtk" from PATH)
  binary: rtk
  # Display token savings in system statistics dashboard
  show_savings: true
  # Auto-run 'rtk init -g' if hooks not installed (only for supported backends: claude-code, gemini, aider)
  auto_init: true
  # Seconds between 'rtk discover' checks for optimization opportunities (0 = disabled)
  discover_interval: 0
  # Auto-update RTK binary when a new version is available on GitHub
  auto_update: false
  # Seconds between version checks against GitHub releases (default: 86400 = daily, 0 = disabled)
  update_check_interval: 86400

# ── Pipelines (Session Chaining) ──
# Chain tasks in a DAG with parallel execution and dependency tracking.
pipeline:
  # Max tasks running simultaneously (default: 3)
  max_parallel: 3
  # Override session.llm_backend for pipeline tasks (empty = use session default)
  default_backend: ""
  # BL28 — quality gates: capture a test baseline before the pipeline runs
  # and compare with a post-pipeline run. Block completion on regression.
  quality_gates:
    enabled: false
    # Test command to run for baseline + post-pipeline comparison.
    # Examples: "go test ./...", "pytest", "npm test", "cargo test"
    test_command: ""
    # Seconds before the test command is killed (default 300).
    timeout: 300
    # When true, a regression (more failing tests than baseline) marks
    # the pipeline as failed and stops downstream work.
    block_on_regression: false

# ── Whisper Voice Transcription ──
# Transcribes voice messages from messaging backends (Telegram, Signal) into text commands.
# Requires: pip install openai-whisper in a Python venv, ffmpeg on PATH.
whisper:
  # Enable voice message transcription
  enabled: false
  # Whisper model size: tiny, base, small, medium, large (larger = more accurate, slower)
  model: base
  # ISO 639-1 language code (e.g. "en", "es", "de", "ja", "zh").
  # Set to "auto" for automatic detection. Full list: https://github.com/openai/whisper#available-models-and-languages
  # NOTE: per-user language selection planned for the multi-user access control feature.
  language: en
  # Path to the Python virtualenv containing the whisper CLI.
  # Relative paths are resolved from the datawatch working directory.
  venv_path: .venv

# ── Remote Servers (Proxy Mode) ──
# Configure remote datawatch instances for multi-machine management.
# The proxy instance forwards commands and relays WebSocket connections.
# Access methods: CLI (datawatch setup server), Web UI (Settings > Comms > Servers), YAML.
servers:
  # Each entry defines a remote datawatch instance:
  # - name: prod                  # short name — used in 'new: @prod: task' and CLI --server
  #   url: http://203.0.113.10:8080  # base URL of the remote instance
  #   token: "bearer-token"       # must match server.token on the remote
  #   enabled: true               # toggle without removing
  # - name: pi
  #   url: http://203.0.113.50:8080
  #   token: "another-token"
  #   enabled: true
# Requires daemon restart after changes. The proxy will:
# - Forward HTTP API calls via /api/proxy/{server}/*
# - Relay WebSocket connections via /api/proxy/{server}/ws
# - Aggregate sessions from all remotes in 'list' command and /api/sessions/aggregated
# - Auto-route commands (send, kill, status, tail) to the owning remote
# - Support explicit routing: 'new: @server: task'

# ── Profiles & Fallback ──
# Named backend profiles for different accounts/API keys.
# Each profile overrides the base backend config with custom env vars, binary, or model.
# Profiles are managed via web UI (Settings > Profiles & Fallback),
# REST API (GET/POST/DELETE /api/profiles), or YAML.
profiles:
  # Example profile with env var overrides:
  # claude-personal:
  #   backend: claude-code
  #   env:
  #     ANTHROPIC_API_KEY: "sk-ant-..."
  # gemini-fallback:
  #   backend: gemini
  #   env:
  #     GEMINI_API_KEY: "AIza..."

# Fallback chain — ordered list of profile names to try when primary hits rate limit.
# Configured under session.fallback_chain in the session section above.
# Example: fallback_chain: ["claude-personal", "gemini-fallback"]

# ── Autonomous PRD Decomposition (BL24+BL25 — v3.10.0) ──
# LLM-driven Product Requirements Document → Stories → Tasks
# decomposition with independent verification. Disabled by default.
# See docs/api/autonomous.md for the full contract.
autonomous:
  # Opt-in switch. When false every /api/autonomous/* returns 503.
  enabled: false
  # Background loop tick in seconds.
  poll_interval_seconds: 30
  # Per-PRD in-flight worker cap.
  max_parallel_tasks: 3
  # LLM backend used for the decomposition call (empty = inherit session.llm_backend).
  decomposition_backend: ""
  # BL25 verifier backend. Empty = inherit. Set to a different backend
  # (e.g. ollama when decomposition is claude-code) for cross-backend
  # independence.
  verification_backend: ""
  # BL41 effort hint for the decomposition LLM call.
  decomposition_effort: "thorough"
  # BL41 effort hint for the verifier.
  verification_effort: "normal"
  # 0 = inherit session.stale_timeout_seconds.
  stale_task_seconds: 0
  # Retries on verifier failure (re-prompts the same backend with the
  # verifier's findings prepended).
  auto_fix_retries: 1
  # Run the nightwire-port security pattern scan over modified files
  # before marking a task complete.
  security_scan: true

# ── Orchestrator (BL117 — v4.0.0) ──
# PRD-DAG orchestrator with guardrail sub-agents. Composes BL24
# autonomous PRDs into a graph; each PRD is attested by configured
# guardrails (rules/security/release-readiness/docs) before the DAG
# advances. See docs/api/orchestrator.md.
orchestrator:
  # Opt-in switch. When false every /api/orchestrator/* returns 503.
  enabled: false
  # Guardrails applied to each PRD by default (order does not matter;
  # block from any halts the graph).
  default_guardrails: ["rules", "security", "release-readiness", "docs-diagrams-architecture"]
  # Per-guardrail invocation timeout (ms). Default 120000 = 2 min.
  guardrail_timeout_ms: 120000
  # LLM backend for guardrail workers. Empty = inherit session.llm_backend.
  guardrail_backend: ""
  # Max concurrent PRD nodes per graph.
  max_parallel_prds: 2

# ── Plugin Framework (BL33 — v3.11.0) ──
# Subprocess plugins discovered under <data_dir>/plugins/<name>/ with
# manifest.yaml + executable entry. Line-oriented JSON-RPC over stdio.
# Security: plugins run with daemon privileges — install only reviewed
# plugins. See docs/api/plugins.md.
plugins:
  # Opt-in switch. When false every /api/plugins/* returns 503 and
  # discovery is skipped.
  enabled: false
  # Discovery root. Empty = <data_dir>/plugins.
  dir: ""
  # Per-invocation wall-clock budget (timeouts treated as pass).
  timeout_ms: 2000
  # Names to skip at discovery (manifests parsed but Enabled=false).
  disabled: []

# ── Auto-Update ──
# Automatic self-update configuration.
update:
  # Enable automatic background updates
  enabled: false
  # Check frequency: hourly, daily, weekly
  schedule: ""
  # Time of day for daily/weekly checks (HH:MM)
  time_of_day: ""
