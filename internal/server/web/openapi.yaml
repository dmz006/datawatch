openapi: 3.0.3
info:
  title: Datawatch API
  description: |
    REST and WebSocket API for the datawatch daemon.

    ## Authentication
    If a token is configured, pass it as:
    - `Authorization: Bearer <token>` header, OR
    - `?token=<token>` query parameter

    ## Network Access
    The API is designed to be accessed over Tailscale (encrypted overlay network).
    TLS is optional — Tailscale provides transport encryption.
  version: 0.4.0
  license:
    name: Polyform Noncommercial 1.0.0
    url: https://github.com/dmz006/datawatch/blob/main/LICENSE
  contact:
    url: https://github.com/dmz006/datawatch

servers:
  - url: http://localhost:8080
    description: Local development
  - url: http://{tailscale_ip}:8080
    description: Tailscale access
    variables:
      tailscale_ip:
        default: "100.x.x.x"
        description: Your machine's Tailscale IP

security:
  - BearerToken: []
  - QueryToken: []
  - NoAuth: []

paths:
  /api/sessions:
    get:
 summary: List all sessions
      description: Returns all sessions managed by this host, including completed ones.
      operationId: listSessions
      tags: [Sessions]
      responses:
        "200":
          description: Array of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/output:
    get:
 summary: Get session output
      description: Returns the last N lines of a session's log output.
      operationId: getSessionOutput
      tags: [Sessions]
      parameters:
        - name: id
          in: query
          required: true
          description: Session ID (short 4-char or full hostname-id)
          schema:
            type: string
            example: "a3f2"
        - name: n
          in: query
          required: false
          description: Number of lines to return (default 50)
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 1000
      responses:
        "200":
          description: Plain text output
          content:
            text/plain:
              schema:
                type: string
        "404":
          description: Session not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/command:
    post:
 summary: Execute a command
      description: |
        Execute any command using the same syntax as the Signal interface.

        Available commands:
        - `new: <task>` — start a new session
        - `list` — list sessions
        - `status <id>` — get recent output
        - `send <id>: <text>` — send input to waiting session
        - `kill <id>` — terminate session
        - `tail <id> [n]` — last N lines
        - `attach <id>` — get tmux attach command
        - `help` — show help
      operationId: executeCommand
      tags: [Commands]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommandRequest"
            examples:
              new_session:
 summary: Start a new session
                value:
                  text: "new: write a fibonacci function in Go"
              list_sessions:
 summary: List sessions
                value:
                  text: "list"
              send_input:
 summary: Send input to waiting session
                value:
                  text: "send a3f2: yes, proceed"
      responses:
        "200":
          description: Command result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResponse"
        "400":
          description: Bad request
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/link/start:
    post:
 summary: Start Signal device linking
      description: |
        Starts the signal-cli device linking process. Returns a stream ID.
        Use `/api/link/stream?id=<stream_id>` to receive the QR URI via SSE.

        The QR code should be scanned from Signal on your phone:
        Settings → Linked Devices → Link New Device
      operationId: startLinking
      tags: [Setup]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                device_name:
                  type: string
                  description: Name for this linked device
                  example: "hal9000"
      responses:
        "200":
          description: Linking started
          content:
            application/json:
              schema:
                type: object
                properties:
                  stream_id:
                    type: string
                    description: Use this with /api/link/stream
        "409":
          description: Already linked
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/link/stream:
    get:
 summary: Stream linking status via SSE
      description: |
        Server-Sent Events stream for the linking process.
        Events:
        - `qr`: QR URI string (sgnl://...) — render as QR code
        - `linked`: linking complete
        - `error`: error message
      operationId: streamLinking
      tags: [Setup]
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
        "404":
          description: Stream ID not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/link/status:
    get:
 summary: Check linking status
      operationId: getLinkStatus
      tags: [Setup]
      responses:
        "200":
          description: Linking status
          content:
            application/json:
              schema:
                type: object
                properties:
                  linked:
                    type: boolean
                  account_number:
                    type: string
                  device_name:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/backends:
    get:
 summary: List LLM backends
      description: Returns the list of registered LLM backends and which one is active.
      operationId: listBackends
      tags: [System]
      responses:
        "200":
          description: Backend list
          content:
            application/json:
              schema:
                type: object
                properties:
                  llm:
                    type: array
                    items:
                      type: string
                    description: Registered LLM backend names
                    example: ["claude-code", "aider"]
                  active:
                    type: string
                    description: Currently active backend name
                    example: "claude-code"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/files:
    get:
 summary: Browse directory
      description: |
        Returns the contents of a directory for use in the PWA directory picker.
        Entries are sorted: directories first, then files, both alphabetically.
      operationId: listFiles
      tags: [System]
      parameters:
        - name: path
          in: query
          required: false
          description: "Absolute path to browse (default: user home directory)"
          schema:
            type: string
            example: "/home/user/projects"
      responses:
        "200":
          description: Directory entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  path:
                    type: string
                    description: The resolved path that was listed
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        is_dir:
                          type: boolean
                        path:
                          type: string
                          description: Full absolute path (use for next request)
        "400":
          description: Path is not a directory or cannot be read
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/sessions/start:
    post:
 summary: Start a new session
      description: |
        Start a new AI coding session with optional name, project directory, and backend override.
        This endpoint provides more control than the command-based `/api/command` endpoint.
      operationId: startSession
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartSessionRequest"
            examples:
              basic:
 summary: Basic session
                value:
                  task: "refactor the auth module"
              named:
 summary: Named session with backend
                value:
                  task: "refactor the auth module"
                  name: "auth refactor"
                  project_dir: "/home/user/projects/myapp"
                  backend: "aider"
      responses:
        "200":
          description: Session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          description: Bad request (missing task, backend not found, etc.)
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/sessions/restart:
    post:
 summary: Restart a session in-place
      description: |
        Restart a completed, failed, or killed session using the same session ID,
        tmux session, and tracking directory. If the backend supports resume, the
        LLM conversation is resumed via the deterministic session UUID.
      operationId: restartSession
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  description: Session ID (short or full)
                  example: "a3f2"
      responses:
        "200":
          description: Session restarted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          description: Bad request
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          description: Session not found or not in a terminal state

  /api/sessions/rename:
    post:
 summary: Rename a session
      description: Set or update the human-readable name for a session.
      operationId: renameSession
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, name]
              properties:
                id:
                  type: string
                  description: Session ID (short or full)
                  example: "a3f2"
                name:
                  type: string
                  description: New human-readable name
                  example: "auth refactor"
      responses:
        "200":
          description: Renamed successfully
        "404":
          description: Session not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/config:
    get:
 summary: Get configuration
      description: |
        Returns the current daemon configuration with sensitive fields masked.
        Token, password, and secret fields are replaced with `"***"` when non-empty.
      operationId: getConfig
      tags: [System]
      responses:
        "200":
          description: Masked configuration object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
 summary: Update configuration
      description: |
        Apply one or more configuration changes using dot-path keys.
        Changes are written to the config file immediately.

        Supported keys: `telegram.enabled`, `discord.enabled`, `slack.enabled`,
        `matrix.enabled`, `twilio.enabled`, `ntfy.enabled`, `email.enabled`,
        `webhook.enabled`, `github_webhook.enabled`, `server.enabled`,
        `server.host`, `server.port`, `server.token`, `server.tls_enabled`.
      operationId: updateConfig
      tags: [System]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              example:
                telegram.enabled: true
                server.port: 9090
      responses:
        "200":
          description: Changes applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
        "400":
          description: Invalid request body
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/health:
    get:
 summary: Health check
      description: Returns 200 if the daemon is running. No auth required.
      operationId: healthCheck
      tags: [System]
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/info:
    get:
 summary: System information
      operationId: getInfo
      tags: [System]
      responses:
        "200":
          description: System info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InfoResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/schedule:
    get:
 summary: List scheduled commands
      description: Returns all scheduled (recurring/one-shot) commands for this host.
      operationId: listSchedule
      tags: [Schedule]
      responses:
        "200":
          description: Array of scheduled command entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduledCommand"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
 summary: Add a scheduled command
      description: Schedule a new recurring or one-shot command.
      operationId: addScheduledCommand
      tags: [Schedule]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduledCommand"
      responses:
        "200":
          description: Scheduled command added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduledCommand"
        "400":
          description: Invalid schedule expression or missing fields
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
 summary: Cancel a scheduled command
      description: Remove a scheduled command by ID.
      operationId: deleteScheduledCommand
      tags: [Schedule]
      parameters:
        - name: id
          in: query
          required: true
          description: Scheduled command ID
          schema:
            type: string
      responses:
        "200":
          description: Cancelled
        "404":
          description: Not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/servers:
    get:
      summary: List remote servers
      description: Returns the list of configured remote datawatch server connections.
      operationId: listServers
      tags: [System]
      responses:
        "200":
          description: Array of remote server entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RemoteServer"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Add a remote server
      description: Register a new remote datawatch server connection. Returns 409 if name already exists.
      operationId: addServer
      tags: [System]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemoteServer"
            example:
              name: "nas"
              url: "http://192.168.1.100:8080"
              token: "my-bearer-token"
              enabled: true
      responses:
        "200":
          description: Server created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoteServer"
        "400":
          description: Missing name or url
        "409":
          description: Server name already exists
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/servers/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        description: Server short name
        example: "nas"
    get:
      summary: Get a remote server by name
      operationId: getServer
      tags: [System]
      responses:
        "200":
          description: Server entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoteServer"
        "404":
          description: Not found
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      summary: Update a remote server
      description: Update URL, token, or enabled flag for an existing server entry.
      operationId: updateServer
      tags: [System]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemoteServer"
      responses:
        "200":
          description: Updated server entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoteServer"
        "404":
          description: Not found
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      summary: Remove a remote server
      operationId: deleteServer
      tags: [System]
      responses:
        "200":
          description: Deleted
        "404":
          description: Not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/servers/{name}/test:
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        description: Server short name
    post:
      summary: Test connectivity to a remote server
      description: Sends a GET /api/health probe to the named server. Returns {ok:true,version:"..."} on success.
      operationId: testServer
      tags: [System]
      responses:
        "200":
          description: Probe result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  version:
                    type: string
                  error:
                    type: string
        "404":
          description: Server not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/commands:
    get:
 summary: List saved commands
      description: Returns all named commands in the command library.
      operationId: listCommands
      tags: [Commands]
      responses:
        "200":
          description: Array of saved commands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedCommand"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
 summary: Add a saved command
      description: Save a new named command to the command library.
      operationId: addCommand
      tags: [Commands]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedCommand"
            example:
              name: "approve"
              command: "yes"
      responses:
        "200":
          description: Command saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedCommand"
        "400":
          description: Missing name or command
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
 summary: Delete a saved command
      description: Remove a named command from the command library by name.
      operationId: deleteCommand
      tags: [Commands]
      parameters:
        - name: name
          in: query
          required: true
          description: Command name to delete
          schema:
            type: string
            example: "approve"
      responses:
        "200":
          description: Deleted
        "404":
          description: Not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/filters:
    get:
 summary: List output filters
      description: Returns all configured output filter patterns.
      operationId: listFilters
      tags: [Filters]
      responses:
        "200":
          description: Array of filter patterns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FilterPattern"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
 summary: Add an output filter
      description: Add a new regex-based output filter pattern.
      operationId: addFilter
      tags: [Filters]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FilterPattern"
      responses:
        "200":
          description: Filter added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilterPattern"
        "400":
          description: Invalid regex or missing fields
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
 summary: Enable or disable a filter
      description: Toggle a filter pattern on or off by ID.
      operationId: patchFilter
      tags: [Filters]
      parameters:
        - name: id
          in: query
          required: true
          description: Filter ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
      responses:
        "200":
          description: Updated
        "404":
          description: Not found
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
 summary: Delete an output filter
      description: Remove a filter pattern by ID.
      operationId: deleteFilter
      tags: [Filters]
      parameters:
        - name: id
          in: query
          required: true
          description: Filter ID
          schema:
            type: string
      responses:
        "200":
          description: Deleted
        "404":
          description: Not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/alerts/aggregated:
    get:
      summary: Aggregated alerts across all runtime servers
      description: Fans out to all runtime-registered servers and merges alerts into a flat array. Each alert is tagged with a server field identifying its origin. Local alerts are tagged with "local".
      operationId: alertsAggregated
      tags: [Alerts]
      responses:
        "200":
          description: Flat array of alerts from all servers
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - $ref: "#/components/schemas/Alert"
                    - type: object
                      properties:
                        server:
                          type: string
                          description: Source server name ("local" for the local instance)
                          example: "nas"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/alerts:
    get:
 summary: List alerts
      description: Returns all system alerts and the count of unread alerts.
      operationId: listAlerts
      tags: [Alerts]
      responses:
        "200":
          description: Alerts list with unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  alerts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Alert"
                  unread_count:
                    type: integer
                    description: Number of unread alerts
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
 summary: Mark alerts as read
      description: Mark one or all alerts as read.
      operationId: markAlertsRead
      tags: [Alerts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: Alert ID to mark read. Omit to mark all alerts as read.
                all:
                  type: boolean
                  description: Set true to mark all alerts as read.
      responses:
        "200":
          description: Marked as read
        "404":
          description: Alert not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /ws:
    get:
 summary: WebSocket connection
      description: |
        Upgrade to WebSocket for real-time bidirectional communication.

        ### Server to Client messages

        | type | description |
        |------|-------------|
        | `sessions` | Full session list (sent on connect and on any change) |
        | `session_state` | One session's state changed |
        | `output` | New output lines from a session |
        | `needs_input` | Session is waiting for user input |
        | `notification` | General text notification |
        | `alert` | New system alert pushed to Web UI clients |

        ### Client to Server messages

        | type | description |
        |------|-------------|
        | `command` | `{"text": "new: my task"}` — any command string |
        | `new_session` | `{"task": "...", "name": "...", "project_dir": "...", "backend": "..."}` |
        | `send_input` | `{"session_id": "a3f2", "text": "yes"}` |
        | `subscribe` | `{"session_id": "a3f2"}` — stream output for session |
        | `ping` | keepalive |

        All messages are JSON-wrapped in `{"type":"...", "data":{...}, "ts":"..."}`.
      operationId: connectWebSocket
      tags: [WebSocket]
      responses:
        "101":
          description: Switching Protocols

  # ─── Autonomous PRD planning (BL24+BL25, v3.10.0; BL304 rename) ──
  /api/autonomous/status:
    get:
 summary: Loop status snapshot
      operationId: autonomousStatus
      tags: [Autonomous]
      responses: {"200": {description: OK}}
  /api/autonomous/config:
    get:
 summary: Read autonomous config
      operationId: autonomousConfigGet
      tags: [Autonomous]
      responses: {"200": {description: OK}}
    put:
 summary: Replace autonomous config
      operationId: autonomousConfigSet
      tags: [Autonomous]
      requestBody:
        required: true
        content:
          application/json:
            schema: {type: object}
      responses: {"200": {description: OK}, "400": {description: Bad Request}}
  /api/autonomous/prds/aggregated:
    get:
      summary: Aggregated Automata (PRDs) across all runtime servers
      description: Fans out to all runtime-registered servers and merges Automata lists into a flat array. Each entry is tagged with a server field. Local automata are tagged with "local".
      operationId: autonomousPRDsAggregated
      tags: [Autonomous]
      responses:
        "200":
          description: Flat array of Automata from all servers
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    server:
                      type: string
                      description: Source server name ("local" for the local instance)
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/autonomous/prds:
    get:
 summary: List PRDs (newest first)
      operationId: autonomousPRDList
      tags: [Autonomous]
      responses: {"200": {description: OK}}
    post:
 summary: Create a draft PRD
      operationId: autonomousPRDCreate
      tags: [Autonomous]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [spec]
              properties:
                spec: {type: string}
                project_dir: {type: string}
