      tags: [Memory]
      parameters:
        - {name: q, in: query, required: true, schema: {type: string}}
        - {name: depth, in: query, required: false, schema: {type: integer}}
      responses: {"200": {description: OK}, "400": {description: Missing q}, "503": {description: Memory not enabled}}
  /api/memory/export:
    get:
 summary: Export the entire memory store as a portable JSON bundle
      operationId: memoryExport
      tags: [Memory]
      responses:
        "200":
          description: JSON bundle (memories + KG + namespaces)
          content: {application/json: {schema: {type: object}}}
        "503": {description: Memory not enabled}
  /api/memory/import:
    post:
 summary: Import a memory bundle (idempotent — existing ids are skipped)
      operationId: memoryImport
      tags: [Memory]
      requestBody:
        required: true
        content: {application/json: {schema: {type: object}}}
      responses: {"200": {description: Imported}, "400": {description: Bad bundle}, "503": {description: Memory not enabled}}
  /api/memory/wal:
    get:
 summary: Tail of the memory write-ahead audit log
      operationId: memoryWAL
      tags: [Memory]
      parameters:
        - {name: limit, in: query, required: false, schema: {type: integer}}
      responses: {"200": {description: OK}, "503": {description: Memory not enabled}}
  /api/memory/test:
    get:
