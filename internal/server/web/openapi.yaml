  /api/memory/search:
    get:
 summary: Semantic recall over the episodic store
      description: |
        Vector search across stored memories. Pass `q` for the query
        string. Optional `profile` (or `agent_id`) expands the
        namespace set per BL101 mutual-opt-in rules so workers see
        peer-profile memories without knowing raw namespace ids.
      operationId: memorySearch
      tags: [Memory]
      parameters:
        - {name: q, in: query, required: true, schema: {type: string}}
        - {name: limit, in: query, required: false, schema: {type: integer}}
        - {name: profile, in: query, required: false, schema: {type: string}}
        - {name: agent_id, in: query, required: false, schema: {type: string}}
        - {name: namespace, in: query, required: false, schema: {type: string}}
      responses: {"200": {description: OK}, "400": {description: Missing q}, "503": {description: Memory not enabled}}
  /api/memory/save:
    post:
 summary: Store a new memory (decision, pattern, finding)
      operationId: memorySave
      tags: [Memory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content: {type: string}
                kind: {type: string, description: "decision / pattern / finding / context (free-form)"}
                namespace: {type: string}
                tags: {type: array, items: {type: string}}
                metadata: {type: object}
      responses: {"200": {description: Saved}, "400": {description: Bad Request}, "503": {description: Memory not enabled}}
  /api/memory/delete:
    post:
 summary: Forget a memory by id
      operationId: memoryDelete
      tags: [Memory]
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, required: [id], properties: {id: {type: string}}}}}
      responses: {"200": {description: OK}, "404": {description: Not found}, "503": {description: Memory not enabled}}
  /api/memory/reindex:
    post:
 summary: Rebuild the vector index for a namespace (or all namespaces)
      operationId: memoryReindex
      tags: [Memory]
      requestBody:
        required: false
        content: {application/json: {schema: {type: object, properties: {namespace: {type: string}}}}}
      responses: {"200": {description: Reindex started}, "503": {description: Memory not enabled}}
  /api/memory/learnings:
    get:
 summary: Recent learnings (decisions + verifier results) feeding the autonomous loop
      operationId: memoryLearnings
      tags: [Memory]
      parameters:
        - {name: limit, in: query, required: false, schema: {type: integer}}
        - {name: since, in: query, required: false, schema: {type: string, format: date-time}}
      responses: {"200": {description: OK}, "503": {description: Memory not enabled}}
  /api/memory/research:
    get:
 summary: Cross-session research aggregator (deep search with KG context)
