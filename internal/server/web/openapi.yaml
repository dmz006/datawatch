  /api/memory/kg/invalidate:
    post:
 summary: Invalidate (soft-delete) a KG triple by id
      operationId: kgInvalidate
      tags: [Memory]
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, required: [id], properties: {id: {type: string}, reason: {type: string}}}}}
      responses: {"200": {description: OK}, "404": {description: Not found}, "503": {description: Memory not enabled}}
  /api/memory/kg/timeline:
    get:
 summary: Timeline view of KG changes for an entity
      operationId: kgTimeline
      tags: [Memory]
      parameters:
        - {name: entity, in: query, required: true, schema: {type: string}}
