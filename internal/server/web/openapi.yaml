  /api/memory/kg/stats:
    get:
 summary: KG counts (entities, triples, namespaces)
      operationId: kgStats
      tags: [Memory]
      responses: {"200": {description: OK}, "503": {description: Memory not enabled}}

  # ─── Voice transcription (issue #2 / F18) — Whisper-backed
  # multipart upload returning the transcript and an optional command
  # action. Used by the PWA mic button (#21, v4.2.0) and by mobile.
  /api/voice/transcribe:
    post:
 summary: Transcribe an audio blob with Whisper (returns transcript + optional action dispatch)
      description: |
        Accepts multipart/form-data with an `audio` blob (opus/ogg/webm/mp4
        preferred). When `session_id` is set the result auto-replies into
        that session; when `auto_exec` is `true` and the transcript starts
        with `new:`, `reply:`, or `status`, the corresponding action is
        returned in the `action` field.
      operationId: voiceTranscribe
      tags: [Voice]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [audio]
              properties:
                audio:
                  type: string
                  format: binary
                  description: Audio blob (opus/ogg/webm/mp4 preferred, mono 16 kHz)
                session_id:
                  type: string
                  description: When set the transcript is replied into this session
                auto_exec:
                  type: string
                  description: "true / 1 — run a recognised command prefix (new:/reply:/status)"
                ts_client:
                  type: string
                  description: unix_ms client send time, for latency telemetry
      responses:
        "200":
          description: Transcript + optional action
          content:
            application/json:
              schema:
                type: object
                properties:
                  transcript: {type: string}
                  confidence: {type: number}
                  action: {type: string, enum: [none, new, reply, status]}
                  session_id: {type: string}
                  latency_ms: {type: integer}
        "400": {description: Missing or malformed audio}
        "502": {description: Whisper backend error}
        "503": {description: Voice transcription not enabled}

  # ─── RTK auto-update (BL85, v4.0.1) — surfaces the background
  # checker to operators so they can see the available rtk version
  # and trigger an update from the PWA / Signal.
  /api/rtk/version:
    get:
 summary: Currently-installed rtk version + last-known available release
      operationId: rtkVersion
      tags: [RTK]
      responses:
        "200":
          description: Version info
          content:
            application/json:
              schema:
                type: object
                properties:
                  installed: {type: string}
                  available: {type: string}
                  update_available: {type: boolean}
                  checked_at: {type: string, format: date-time}
  /api/rtk/check:
    post:
 summary: Force a check against the rtk-ai/rtk releases endpoint now
      operationId: rtkCheck
      tags: [RTK]
      responses: {"200": {description: Check completed}, "502": {description: GitHub releases unreachable}}
  /api/rtk/update:
    post:
 summary: Download + install the available rtk binary (atomic replace + chmod)
      description: |
        Operator-triggered update. The PWA Settings → Monitor card
        surfaces the resulting `rtk update` shell command so the
        operator can copy-paste alternatively.
      operationId: rtkUpdate
      tags: [RTK]
      responses: {"200": {description: Updated}, "409": {description: Already up to date}, "502": {description: Download failed}}
  /api/rtk/discover:
    get:
 summary: Walk recent Claude Code sessions and report missed RTK opportunities
      operationId: rtkDiscover
      tags: [RTK]
      responses: {"200": {description: Discovery report}}

  # ─── Cost tracking (BL6) — token + USD rollups across sessions and
  # backends. Mobile + PWA Settings card both consume.
  /api/cost:
    get:
 summary: Token + USD cost rollup across all sessions
      operationId: costSummary
      tags: [Cost]
      parameters:
        - {name: since, in: query, required: false, schema: {type: string, format: date-time}}
        - {name: backend, in: query, required: false, schema: {type: string}}
      responses: {"200": {description: OK}}
  /api/cost/usage:
    get:
 summary: Per-session usage + cost detail
      operationId: costUsage
      tags: [Cost]
      parameters:
        - {name: session_id, in: query, required: false, schema: {type: string}}
        - {name: limit, in: query, required: false, schema: {type: integer}}
      responses: {"200": {description: OK}}
  /api/cost/rates:
    get:
 summary: Current per-model price-per-token rates
      operationId: costRatesGet
      tags: [Cost]
      responses: {"200": {description: OK}}
    put:
 summary: Operator override for per-model rates
      operationId: costRatesSet
      tags: [Cost]
      requestBody:
        required: true
        content: {application/json: {schema: {type: object}}}
      responses: {"200": {description: OK}, "400": {description: Bad Request}}

  # ─── Schedules — plural path the server actually serves (v4.0.7 fix for issue #16)
  /api/schedules:
    get:
 summary: List scheduled commands (plural alias of /api/schedule)
      description: |
        Returns scheduled commands. Optional query params filter
        the result set; the PWA uses both `session_id` and `state`.
      operationId: listSchedules
      tags: [Schedule]
      parameters:
        - name: session_id
          in: query
          required: false
          description: Filter to schedules attached to a specific session
          schema: {type: string}
        - name: state
          in: query
          required: false
          description: Filter by lifecycle state
          schema: {type: string, enum: [pending, fired, cancelled, failed]}
      responses:
        "200":
          description: Array of scheduled command entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduledCommand"
    post:
 summary: Add a scheduled command (plural alias of /api/schedule)
      operationId: addSchedule
      tags: [Schedule]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduledCommand"
      responses:
        "200":
          description: Scheduled command added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduledCommand"
    delete:
 summary: Cancel a scheduled command by id (plural alias of /api/schedule)
      operationId: deleteSchedule
      tags: [Schedule]
      parameters:
        - name: id
          in: query
          required: true
          schema: {type: string}
      responses:
        "200": {description: OK}
        "404": {description: schedule not found}

  # ─── Profiles — backend + project + cluster profile enumeration (issue #16)
  /api/profiles:
    get:
 summary: List all registered profiles (backend / project / cluster)
      description: |
        Returns a unified list of agent profiles used by the New
        Session form. The server splits the detailed CRUD across
        `/api/profiles/projects` and `/api/profiles/clusters`; this
        top-level list is the convenience view.
      operationId: listProfiles
      tags: [Profiles]
      responses:
        "200":
          description: Array of profile summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name: {type: string}
                    kind:
                      type: string
                      enum: [backend, project, cluster]
                    default_backend: {type: string}
  /api/profiles/projects:
    get:
 summary: List project profiles
      operationId: listProjectProfiles
      tags: [Profiles]
      responses: {"200": {description: OK}}
    post:
 summary: Create or update a project profile
      operationId: upsertProjectProfile
      tags: [Profiles]
      requestBody: {required: true, content: {application/json: {schema: {type: object}}}}
      responses: {"200": {description: OK}, "400": {description: Bad Request}}
  /api/profiles/clusters:
    get:
 summary: List cluster profiles
      operationId: listClusterProfiles
      tags: [Profiles]
      responses: {"200": {description: OK}}
    post:
 summary: Create or update a cluster profile
      operationId: upsertClusterProfile
      tags: [Profiles]
      requestBody: {required: true, content: {application/json: {schema: {type: object}}}}
      responses: {"200": {description: OK}, "400": {description: Bad Request}}

  # ─── BL170 phase 5 — long-tail backfill (operator-facing routes).
  # Worker-internal / PWA-only routes deliberately omitted: /api/proxy/*,
  # /api/test/message, /api/mcp/docs, /api/agents/peer/*,
  # /api/channel/{ready,notify}, /api/stats/kill-orphans, /api/update,
  # /api/pipeline*. See docs/plans/2026-04-25-bl170-feature-completeness-audit.md.

  # Sessions sub-routes
  /api/sessions/aggregated:
    get:
 summary: Aggregated session view across federated peers
      operationId: sessionsAggregated
      tags: [Sessions]
      responses: {"200": {description: OK}}
  /api/sessions/bind:
    post:
 summary: Bind a session to an agent worker (proxies session reads through /api/proxy/agent/...)
      operationId: sessionBind
      tags: [Sessions]
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [session_id, agent_id], properties: {session_id: {type: string}, agent_id: {type: string}}}}}}
      responses: {"200": {description: Bound}, "404": {description: Session or agent not found}}
  /api/sessions/import:
    post:
 summary: Import a single orphan session from disk
      operationId: sessionImport
      tags: [Sessions]
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [path], properties: {path: {type: string}}}}}}
      responses: {"200": {description: Imported}, "404": {description: Session dir not found}}
  /api/sessions/kill:
    post:
 summary: Terminate a session (sends SIGTERM to the tmux process)
      operationId: sessionKill
      tags: [Sessions]
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [id], properties: {id: {type: string}}}}}}
      responses: {"200": {description: OK}, "404": {description: Not found}}
  /api/sessions/prompt:
    get:
 summary: Inspect the captured prompt waiting for input (when state=waiting_input)
      operationId: sessionPromptGet
      tags: [Sessions]
      parameters:
        - {name: id, in: query, required: true, schema: {type: string}}
      responses: {"200": {description: OK}, "404": {description: Not found}}
  /api/sessions/reconcile:
    get:
 summary: List orphan session directories on disk that are missing from the registry
      operationId: sessionReconcile
      tags: [Sessions]
      responses: {"200": {description: List of orphans}}
  /api/sessions/response:
    get:
 summary: Last LLM response for a session (final assistant message, parsed)
      operationId: sessionResponse
      tags: [Sessions]
      parameters:
        - {name: id, in: query, required: true, schema: {type: string}}
      responses: {"200": {description: OK}, "404": {description: Not found}}
  /api/sessions/stale:
    get:
 summary: List running sessions stuck longer than session.stale_timeout_seconds
      operationId: sessionsStale
      tags: [Sessions]
      parameters:
        - {name: seconds, in: query, required: false, schema: {type: integer}}
      responses: {"200": {description: OK}}
  /api/sessions/state:
    post:
 summary: Manual state override (operator only — bypasses idle-detection)
      operationId: sessionStateOverride
      tags: [Sessions]
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [id, state], properties: {id: {type: string}, state: {type: string, enum: [running, waiting_input, complete, killed, rate_limited]}}}}}}
      responses: {"200": {description: OK}, "400": {description: Bad state}, "404": {description: Not found}}

  # Agents
  /api/agents:
    get:
 summary: List ephemeral agent workers
      operationId: agentsList
      tags: [Agents]
      responses: {"200": {description: OK}}
    post:
 summary: Spawn a new agent worker
      operationId: agentSpawn
      tags: [Agents]
      requestBody: {required: true, content: {application/json: {schema: {type: object}}}}
      responses: {"200": {description: Spawned}, "400": {description: Bad Request}}
  /api/agents/audit:
    get:
 summary: Tail of the agent-audit log — every spawn, terminate, bootstrap event
      operationId: agentsAudit
      tags: [Agents]
      parameters:
        - {name: limit, in: query, required: false, schema: {type: integer}}
        - {name: agent_id, in: query, required: false, schema: {type: string}}
      responses: {"200": {description: OK}}

  # Channel
  /api/channel/reply:
    post:
 summary: Inbound MCP-bridge reply from Claude (used by channel.js)
      operationId: channelReply
      tags: [Channel]
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [session_id, text], properties: {session_id: {type: string}, text: {type: string}}}}}}
      responses: {"200": {description: OK}}

  # Devices
  /api/devices:
    get:
 summary: List registered devices
      operationId: devicesList
      tags: [Devices]
      responses: {"200": {description: OK}}
  /api/devices/register:
    post:
 summary: Register a new device for push notifications
      operationId: deviceRegister
      tags: [Devices]
      requestBody: {required: true, content: {application/json: {schema: {type: object}}}}
      responses: {"200": {description: Registered}, "400": {description: Bad Request}}
  /api/device-aliases:
    get:
 summary: "List device aliases for `new: @<alias>:` routing"
      operationId: deviceAliasList
      tags: [Devices]
      responses: {"200": {description: OK}}
    post:
 summary: Upsert a device alias
      operationId: deviceAliasUpsert
      tags: [Devices]
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [alias, target], properties: {alias: {type: string}, target: {type: string}}}}}}
      responses: {"200": {description: OK}}
    delete:
 summary: Delete a device alias
      operationId: deviceAliasDelete
      tags: [Devices]
      parameters:
        - {name: alias, in: query, required: true, schema: {type: string}}
      responses: {"200": {description: OK}, "404": {description: Not found}}

  # Routing rules (BL20)
  /api/routing-rules:
    get:
 summary: List backend auto-selection routing rules
      operationId: routingRulesList
      tags: [Routing]
      responses: {"200": {description: OK}}
    put:
 summary: Replace the routing rules set
      operationId: routingRulesSet
      tags: [Routing]
      requestBody: {required: true, content: {application/json: {schema: {type: object}}}}
      responses: {"200": {description: OK}, "400": {description: Bad Request}}
  /api/routing-rules/test:
    post:
 summary: Test which backend a given task string would route to
      operationId: routingRulesTest
      tags: [Routing]
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [task], properties: {task: {type: string}, project_dir: {type: string}}}}}}
      responses: {"200": {description: OK}}

  # Federation (F19)
  /api/federation/sessions:
    get:
 summary: Aggregated session list across all federated peers
      operationId: federationSessions
      tags: [Federation]
      responses: {"200": {description: OK}}

  # Splash (BL69)
  /api/splash/info:
    get:
 summary: Render context for splash (logo, tagline, version)
      operationId: splashInfo
      tags: [Splash]
      responses: {"200": {description: OK}}
  /api/splash/logo:
    get:
 summary: Splash logo image
      operationId: splashLogo
      tags: [Splash]
      responses: {"200": {description: OK, content: {image/svg+xml: {}, image/png: {}}}}

  # Operator-facing singletons
  /api/ask:
    post:
 summary: Single-shot LLM ask — no session, no tmux
      operationId: ask
      tags: [Singletons]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question: {type: string}
                backend: {type: string}
                model: {type: string}
      responses: {"200": {description: OK}, "503": {description: Backend not configured}}
  /api/assist:
    post:
 summary: Quick-response assistant — uses the configured assistant backend
      operationId: assist
      tags: [Singletons]
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [text], properties: {text: {type: string}}}}}}
      responses: {"200": {description: OK}, "503": {description: Assistant backend not configured}}
  /api/audit:
    get:
 summary: Query the operator-action audit log
      operationId: auditQuery
      tags: [Singletons]
      parameters:
        - {name: actor, in: query, required: false, schema: {type: string}}
        - {name: action, in: query, required: false, schema: {type: string}}
        - {name: session_id, in: query, required: false, schema: {type: string}}
        - {name: since, in: query, required: false, schema: {type: string, format: date-time}}
        - {name: until, in: query, required: false, schema: {type: string, format: date-time}}
        - {name: limit, in: query, required: false, schema: {type: integer}}
      responses: {"200": {description: OK}}
  /api/cooldown:
    get:
 summary: Current global rate-limit cooldown state
      operationId: cooldownGet
      tags: [Singletons]
      responses: {"200": {description: OK}}
    put:
 summary: Set or clear the global cooldown
      operationId: cooldownSet
      tags: [Singletons]
      requestBody: {required: true, content: {application/json: {schema: {type: object}}}}
      responses: {"200": {description: OK}}
  /api/diagnose:
    get:
 summary: Diagnostic snapshot — backend reachability, config validity, recent errors
      operationId: diagnose
      tags: [Singletons]
      responses: {"200": {description: OK}}
  /api/analytics:
    get:
 summary: Aggregate analytics — session counts, backend distribution, cost summary
      operationId: analytics
      tags: [Singletons]
      responses: {"200": {description: OK}}
  /api/reload:
    post:
 summary: Hot config reload — equivalent to SIGHUP
      operationId: reload
      tags: [Singletons]
      responses: {"200": {description: Reloaded}, "400": {description: Config invalid}}
  /api/project/summary:
    get:
 summary: Project overview — git status + sessions + stats
      operationId: projectSummary
      tags: [Singletons]
      parameters:
        - {name: dir, in: query, required: true, schema: {type: string}}
      responses: {"200": {description: OK}, "400": {description: Missing dir}}
  /api/projects:
    get:
 summary: List project aliases
      operationId: projectsList
      tags: [Singletons]
      responses: {"200": {description: OK}}
    post:
 summary: Upsert a project alias
      operationId: projectsUpsert
      tags: [Singletons]
      requestBody: {required: true, content: {application/json: {schema: {type: object}}}}
      responses: {"200": {description: OK}}
  /api/templates:
    get:
 summary: List session-start templates
      operationId: templatesList
      tags: [Singletons]
      responses: {"200": {description: OK}}
    post:
 summary: Upsert a template
      operationId: templatesUpsert
      tags: [Singletons]
      requestBody: {required: true, content: {application/json: {schema: {type: object}}}}
      responses: {"200": {description: OK}}
    delete:
 summary: Delete a template
      operationId: templatesDelete
      tags: [Singletons]
      parameters:
        - {name: name, in: query, required: true, schema: {type: string}}
      responses: {"200": {description: OK}}
  /api/servers/health:
    get:
 summary: Health of every configured remote datawatch server (proxy pool)
      operationId: serversHealth
      tags: [Singletons]
      responses: {"200": {description: OK}}
  /api/stats:
    get:
 summary: Legacy v1 stats (host + cpu + mem + disk). Pass ?v=2 for the structured StatsResponse v2 (Observer)
      operationId: stats
      tags: [Singletons]
      parameters:
        - {name: v, in: query, required: false, schema: {type: string}, description: "Pass 2 for the structured v2 payload"}
      responses: {"200": {description: OK}}
  /api/ollama/stats:
    get:
      summary: Ollama-specific stats — running models, queue depth
      operationId: ollamaStats
      tags: [Singletons]
      responses: {"200": {description: OK}, "503": {description: Ollama not configured}}

  # ─── Push notifications (v7.0.0-alpha.35) ───────────────────────────────────

  /api/push/{topic}:
    parameters:
      - {name: topic, in: path, required: true, schema: {type: string}, description: "Topic name (e.g. alerts, session-abc1)"}
    get:
      summary: Subscribe to SSE push stream (ntfy-compat)
      description: Returns a Server-Sent Events stream. Emits an open event on connect, message events on publish, and a keepalive comment every 25s.
      operationId: pushSubscribe
      tags: [Push]
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema: {type: string}
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Publish an event to a push topic
      description: Fans out to all SSE subscribers + every registered UnifiedPush mobile endpoint.
      operationId: pushPublish
      tags: [Push]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: {type: string}
                message: {type: string}
                priority: {type: integer, minimum: 1, maximum: 5, description: "1=min, 3=default, 5=max"}
                tags: {type: array, items: {type: string}}
                click: {type: string, description: "URL to open on tap"}
                extras: {type: object}
      responses:
        "200": {description: Published}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/push/register:
    post:
      summary: Register a UnifiedPush mobile endpoint
      description: Idempotent on client_id.
      operationId: pushRegister
      tags: [Push]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [endpoint, client_id]
              properties:
                endpoint: {type: string, description: UnifiedPush endpoint URL}
                client_id: {type: string, description: Stable client identifier}
                token: {type: string, description: Optional token for endpoint auth}
      responses:
        "200": {description: Registered}
        "400": {description: Missing endpoint or client_id}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /.well-known/unifiedpush:
    get:
      summary: UnifiedPush discovery document
      description: Returns the UnifiedPush spec v1 discovery document so clients can auto-discover the push URL.
      operationId: unifiedPushDiscovery
      tags: [Push]
      security: []
      responses:
        "200":
          description: Discovery document
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: {type: integer, example: 1}
                  unifiedpush: {type: object}

  # ─── LLM Registry (v7.0.0) ──────────────────────────────────────────────────

  /api/llms:
    get:
      summary: List named LLMs in the inference registry
      operationId: llmList
      tags: [LLM]
      responses:
        "200":
          description: LLM list
          content:
            application/json:
              schema:
                type: object
                properties:
                  llms:
                    type: array
                    items:
                      $ref: "#/components/schemas/LLMEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Add a named LLM to the registry
      operationId: llmAdd
      tags: [LLM]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LLMEntry"
      responses:
        "200": {description: Created}
        "409": {description: Name already exists}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/llms/{name}:
    parameters:
      - {name: name, in: path, required: true, schema: {type: string}}
    get:
      summary: Get a named LLM by name
      operationId: llmGet
      tags: [LLM]
      responses:
        "200":
          description: LLM entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LLMEntry"
        "404": {description: Not found}
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      summary: Replace a named LLM entry
      operationId: llmUpdate
      tags: [LLM]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LLMEntry"
      responses:
        "200": {description: Updated}
        "404": {description: Not found}
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      summary: Delete a named LLM (409 if active bindings exist)
      operationId: llmDelete
      tags: [LLM]
      responses:
        "200": {description: Deleted}
        "404": {description: Not found}
        "409": {description: Active bindings exist — use reassign or force_delete}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/llms/{name}/enabled:
    parameters:
      - {name: name, in: path, required: true, schema: {type: string}}
    patch:
      summary: Enable or disable a named LLM
      operationId: llmSetEnabled
      tags: [LLM]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: {type: boolean}
                pretest: {type: boolean, description: "Run connectivity probe before enabling"}
      responses:
        "200": {description: Updated}
        "404": {description: Not found}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/llms/{name}/in_use:
    parameters:
      - {name: name, in: path, required: true, schema: {type: string}}
    get:
      summary: List active bindings for a named LLM
      operationId: llmInUse
      tags: [LLM]
      parameters:
        - {name: filter, in: query, required: false, schema: {type: string}}
        - {name: page, in: query, required: false, schema: {type: integer}}
        - {name: size, in: query, required: false, schema: {type: integer}}
      responses:
        "200":
          description: Bindings list
          content:
            application/json:
              schema:
                type: object
                properties:
                  bindings: {type: array, items: {type: object}}
                  total: {type: integer}
        "404": {description: Not found}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/llms/{name}/refresh_models:
    parameters:
      - {name: name, in: path, required: true, schema: {type: string}}
    post:
      summary: Trigger model list refresh from compute nodes
      operationId: llmRefreshModels
      tags: [LLM]
      responses:
        "200": {description: Refresh triggered}
        "404": {description: Not found}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/llms/{name}/reassign:
    parameters:
      - {name: name, in: path, required: true, schema: {type: string}}
    post:
      summary: Reassign all active bindings to another LLM then delete this one
      operationId: llmReassign
      tags: [LLM]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to_llm]
              properties:
                to_llm: {type: string}
                to_model: {type: string}
      responses:
        "200": {description: Reassigned and deleted}
        "404": {description: Not found}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/llms/{name}/force_delete:
    parameters:
      - {name: name, in: path, required: true, schema: {type: string}}
    post:
      summary: Cancel all active bindings then delete this LLM
      operationId: llmForceDelete
      tags: [LLM]
      responses:
        "200": {description: Deleted}
        "404": {description: Not found}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/sessions/set_llm_ref:
    post:
      summary: Surgically update a running session's LLM registry binding
      operationId: sessionSetLLMRef
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, llm_ref]
              properties:
                id: {type: string}
                llm_ref: {type: string}
      responses:
        "200": {description: Updated}
        "404": {description: Session not found}
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Compute Nodes (v7.0.0) ─────────────────────────────────────────────────

  /api/compute/nodes:
    get:
      summary: List compute nodes
      operationId: computeNodeList
      tags: [Compute]
      responses:
        "200":
          description: Node list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ComputeNode"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Add a compute node (runs save-time probe unless ?probe=skip)
      operationId: computeNodeAdd
      tags: [Compute]
      parameters:
        - {name: probe, in: query, required: false, schema: {type: string, enum: [skip]}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComputeNode"
      responses:
        "200": {description: Created}
        "400": {description: Validation error}
        "502": {description: Probe failed — node unreachable}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/compute/nodes/{name}:
    parameters:
      - {name: name, in: path, required: true, schema: {type: string}}
    get:
      summary: Get a compute node by name
      operationId: computeNodeGet
      tags: [Compute]
      responses:
        "200":
          description: Node detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComputeNode"
        "404": {description: Not found}
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      summary: Update a compute node
      operationId: computeNodeUpdate
      tags: [Compute]
      parameters:
        - {name: probe, in: query, required: false, schema: {type: string, enum: [skip]}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComputeNode"
      responses:
        "200": {description: Updated}
        "404": {description: Not found}
        "502": {description: Probe failed}
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      summary: Delete a compute node
      operationId: computeNodeDelete
      tags: [Compute]
      responses:
        "200": {description: Deleted}
        "404": {description: Not found}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/compute/nodes/{name}/enabled:
    parameters:
      - {name: name, in: path, required: true, schema: {type: string}}
    patch:
      summary: Enable or disable a compute node
      operationId: computeNodeSetEnabled
      tags: [Compute]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: {type: boolean}
      responses:
        "200": {description: Updated}
        "404": {description: Not found}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/compute/nodes/{name}/models:
    parameters:
      - {name: name, in: path, required: true, schema: {type: string}}
    get:
      summary: Kind-aware model list from this compute node
      operationId: computeNodeModels
      tags: [Compute]
      parameters:
        - {name: kind, in: query, required: false, schema: {type: string}, description: "ollama | openai-compat"}
      responses:
        "200":
          description: Model list
          content:
            application/json:
              schema:
                type: object
                properties:
                  models: {type: array, items: {type: string}}
                  kind: {type: string}
                  node: {type: string}
        "404": {description: Not found}
        "502": {description: Probe to node failed}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/compute/nodes/{name}/models/pull:
    parameters:
      - {name: name, in: path, required: true, schema: {type: string}}
    post:
      summary: Pull a model to this compute node in the background
      operationId: computeNodePullModel
      tags: [Compute]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model]
              properties:
                model: {type: string, example: "llama3.1:8b"}
      responses:
        "200":
          description: Task descriptor
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id: {type: string}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/compute/nodes/{name}/models/{model}:
    parameters:
      - {name: name, in: path, required: true, schema: {type: string}}
      - {name: model, in: path, required: true, schema: {type: string}}
    delete:
      summary: Remove a model from this compute node
      operationId: computeNodeRemoveModel
      tags: [Compute]
      responses:
        "200": {description: Removed}
        "404": {description: Not found}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/compute/nodes/{name}/observer-peer:
    parameters:
      - {name: name, in: path, required: true, schema: {type: string}}
    put:
      summary: Bind a compute node to an observer peer
      operationId: computeNodeAttachObserver
      tags: [Compute]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [peer]
              properties:
                peer: {type: string, description: "Observer peer name from /api/observer/peers"}
      responses:
        "200": {description: Bound}
        "404": {description: Node or peer not found}
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      summary: Remove observer peer binding from a compute node
      operationId: computeNodeDetachObserver
      tags: [Compute]
      responses:
        "200": {description: Cleared}
        "404": {description: Not found}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/observer/peers/free:
    get:
      summary: List observer peers with no bound compute node
      operationId: observerPeersFree
      tags: [Observer]
      responses:
        "200":
          description: Free peer list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/observer/peers/by-node:
    get:
      summary: Observer peers grouped by bound compute node
      operationId: observerPeersByNode
      tags: [Observer]
      responses:
        "200":
          description: Grouped peers
          content:
            application/json:
              schema:
                type: object
                properties:
                  by_node: {type: object, additionalProperties: {type: array, items: {type: object}}}
                  unbound: {type: array, items: {type: object}}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/federation/meta-peers:
    get:
      summary: Federation meta-peers aggregator (peers grouped per compute node across all primaries)
      operationId: federationMetaPeers
      tags: [Observer]
      responses:
        "200": {description: Meta-peer map}
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Marketplace (v7.0.0-alpha.33) ──────────────────────────────────────────

  /api/marketplace/ollama/catalog:
    get:
      summary: Embedded Ollama model catalog with size and RAM estimates
      operationId: marketplaceOllamaCatalog
      tags: [Marketplace]
      responses:
        "200":
          description: Catalog array
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name: {type: string}
                    description: {type: string}
                    tags: {type: array, items: {type: object}}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/marketplace/ollama/tasks/{task_id}:
    parameters:
      - {name: task_id, in: path, required: true, schema: {type: string}}
    get:
      summary: Poll background model pull progress
      operationId: marketplacePullTask
      tags: [Marketplace]
      responses:
        "200":
          description: Task status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string, enum: [running, done, error]}
                  progress: {type: number}
                  error: {type: string}
        "404": {description: Task not found}
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Migration (v7.0.0-alpha.23) ────────────────────────────────────────────

  /api/migration/compute-kinds:
    get:
      summary: List compute nodes with deprecated kinds needing migration
      operationId: migrationComputeKindsCheck
      tags: [Migration]
      responses:
        "200":
          description: Migration status
          content:
            application/json:
              schema:
                type: object
                properties:
                  nodes: {type: array, items: {type: object}}
                  supported: {type: array, items: {type: string}}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/migration/compute-kinds/{name}:
    parameters:
      - {name: name, in: path, required: true, schema: {type: string}}
    put:
      summary: Update a compute node's kind to a supported value
      operationId: migrationComputeKindUpdate
      tags: [Migration]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind]
              properties:
                kind: {type: string, enum: [ollama, openai-compat]}
      responses:
        "200": {description: Updated}
        "400": {description: Unsupported kind}
        "404": {description: Not found}
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Dashboard (BL303 v7.0.0) ───────────────────────────────────────────────

  /api/dashboard/layout:
    get:
      summary: Get the saved dashboard card layout
      operationId: dashboardLayoutGet
      tags: [Dashboard]
      responses:
        "200":
          description: Layout JSON
          content:
            application/json:
              schema:
                type: object
                properties:
                  cards: {type: array, items: {type: object}}
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      summary: Save the dashboard card layout
      operationId: dashboardLayoutPut
      tags: [Dashboard]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cards]
              properties:
                cards: {type: array, items: {type: object}}
      responses:
        "200": {description: Saved}
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Session hook events + status board (v7.0.0-alpha.34) ───────────────────

  /api/sessions/{id}/hook-event:
    parameters:
      - {name: id, in: path, required: true, schema: {type: string}}
    post:
      summary: Ingest a hook event for a session (called by hook scripts)
      operationId: sessionHookEvent
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                event: {type: string, enum: [Stop, PostToolUse, UserPromptSubmit, SubagentStop, Activity, Start]}
                current_focus: {type: string}
                sprint: {type: object}
                tests: {type: object}
                git: {type: object}
      responses:
        "200": {description: Ingested}
        "404": {description: Session not found}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/sessions/{id}/status:
    parameters:
      - {name: id, in: path, required: true, schema: {type: string}}
    get:
      summary: Get the derived session status board (hook health, sprint, tests, git)
      operationId: sessionStatus
      tags: [Sessions]
      responses:
        "200":
          description: Status board
          content:
            application/json:
              schema:
                type: object
                properties:
                  state: {type: string}
                  last_event: {type: string}
                  idle_since: {type: string, format: date-time}
                  hook_health: {type: string, enum: [alive, stale, missing]}
                  sprint: {type: object}
                  tests: {type: object}
                  git: {type: object}
                  current_focus: {type: string}
        "404": {description: Session not found}
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── MCP Resources + Prompts + Sampling + Elicitation (BL302 v7.1.0) ────────

  /api/mcp/resources:
    get:
      summary: List all MCP resources (static + live + templates)
      operationId: mcpResourcesList
      tags: [MCP]
      responses:
        "200":
          description: Resource list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    uri: {type: string}
                    name: {type: string}
                    description: {type: string}
                    mimeType: {type: string}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/mcp/resources/read:
    get:
      summary: Read the content of an MCP resource by URI
      operationId: mcpResourcesRead
      tags: [MCP]
      parameters:
        - {name: uri, in: query, required: true, schema: {type: string}, description: "datawatch:// URI"}
      responses:
        "200":
          description: Resource content
          content:
            application/json:
              schema:
                type: object
                properties:
                  contents: {type: array, items: {type: object}}
        "404": {description: URI not found}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/mcp/resources/templates:
    get:
      summary: List MCP URI templates (parameterised resources)
      operationId: mcpResourcesTemplates
      tags: [MCP]
      responses:
        "200":
          description: Template list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    uriTemplate: {type: string}
                    name: {type: string}
                    description: {type: string}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/mcp/sample:
    post:
      summary: Fire an MCP sampling request through the connected MCP host
      description: Blocks until the host returns a completion or the timeout expires. Returns {error} when no host is connected.
      operationId: mcpSample
      tags: [MCP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                trigger: {type: string, description: "Built-in trigger name (e.g. alert_triage)"}
                prompt: {type: string, description: "Custom prompt (used when trigger is omitted)"}
                context: {type: object, description: "Extra context passed to the trigger template"}
                max_tokens: {type: integer}
      responses:
        "200":
          description: Sampling result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: {type: boolean}
                  response: {type: string}
                  error: {type: string}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/mcp/sampling-log:
    get:
      summary: Browse the last 50 sampling results
      operationId: mcpSamplingLog
      tags: [MCP]
      responses:
        "200":
          description: Sampling log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    trigger: {type: string}
                    prompt_excerpt: {type: string}
                    response_excerpt: {type: string}
                    status: {type: string}
                    timestamp: {type: string, format: date-time}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/mcp/elicit:
    post:
      summary: Prompt the operator for structured input via the connected MCP host
      description: Blocks until the operator responds or the timeout expires.
      operationId: mcpElicit
      tags: [MCP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [schema]
              properties:
                schema:
                  type: string
                  enum: [approval, text_input, choice]
                prompt: {type: string}
                options: {type: array, items: {type: string}, description: "Required for schema=choice"}
                placeholder: {type: string, description: "Hint for schema=text_input"}
                context: {type: object}
      responses:
        "200":
          description: Elicitation response
          content:
            application/json:
              schema:
                type: object
                properties:
                  approved: {type: boolean, description: "schema=approval only"}
                  value: {type: string, description: "schema=text_input only"}
                  choice: {type: string, description: "schema=choice only"}
                  index: {type: integer, description: "schema=choice only"}
                  error: {type: string}
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Smoke progress (v7.0.0) ────────────────────────────────────────────────

  /api/smoke/progress:
    get:
      summary: Current smoke run progress (used by Dashboard smoke-run card)
      operationId: smokeProgressGet
      tags: [Singletons]
      responses:
        "200":
          description: Progress JSON
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: {type: string}
                  started_at: {type: string, format: date-time}
                  active: {type: boolean}
                  sections: {type: array, items: {type: object}}
        "204": {description: No active smoke run}
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      summary: Clear the smoke run progress file
      operationId: smokeProgressDelete
      tags: [Singletons]
      responses:
        "204": {description: Cleared}
        "404": {description: No progress file}
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Evals (v7.0.0) ─────────────────────────────────────────────────────────

  /api/evals:
    get:
      summary: List eval run history
      operationId: evalListRuns
      tags: [Evals]
      responses:
        "200":
          description: Runs list
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items:
                      type: object
                      properties:
                        id: {type: string}
                        name: {type: string}
                        status: {type: string}
                        score: {type: number}
                        created_at: {type: string, format: date-time}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/evals/run:
    post:
      summary: Run an eval suite
      operationId: evalRun
      tags: [Evals]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [suite]
              properties:
                suite: {type: string, description: "Suite name from ~/.datawatch/evals/"}
                session_id: {type: string, description: "Session to evaluate (optional)"}
      responses:
        "200":
          description: Run result
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: {type: string}
                  status: {type: string}
                  score: {type: number}
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    BearerToken:
      type: http
      scheme: bearer
    QueryToken:
      type: apiKey
      in: query
      name: token
    NoAuth:
      type: http
      scheme: basic
      description: No authentication (when token is not configured)

  responses:
    Unauthorized:
      description: Authentication required
      content:
        text/plain:
          schema:
            type: string
            example: "unauthorized"

  schemas:
    Session:
      type: object
      properties:
        id:
          type: string
          description: Short 4-character hex ID
          example: "a3f2"
        full_id:
          type: string
          description: Full hostname-prefixed ID
          example: "hal9000-a3f2"
        name:
          type: string
          description: Optional human-readable name (set at creation or via rename)
          example: "auth refactor"
        task:
          type: string
          description: Original task description
          example: "write a fibonacci function in Go"
        backend_family:
          type: string
          description: LLM backend used for this session
          example: "claude-code"
        tmux_session:
          type: string
          description: tmux session name
          example: "cs-hal9000-a3f2"
        log_file:
          type: string
          description: Path to the session's output log
          example: "/home/user/.datawatch/logs/hal9000-a3f2.log"
        state:
          $ref: "#/components/schemas/SessionState"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        hostname:
          type: string
          example: "hal9000"
        group_id:
          type: string
          description: Signal group ID this session was created from
        pending_input:
          type: string
          description: Set when waiting for user input
        last_prompt:
          type: string
          description: The prompt text that triggered waiting_input state

    SessionState:
      type: string
      enum: [running, waiting_input, complete, failed, killed]
      description: |
        - `running`: claude-code is actively running
        - `waiting_input`: claude-code is waiting for user response
        - `complete`: claude-code exited successfully
        - `failed`: claude-code exited with error
        - `killed`: session was manually terminated

    StartSessionRequest:
      type: object
      required: [task]
      properties:
        task:
          type: string
          description: Task description passed to the LLM
          example: "refactor the auth module"
        name:
          type: string
          description: Optional human-readable name for the session
          example: "auth refactor"
        project_dir:
          type: string
          description: |
            Absolute path to the project directory. The LLM will be constrained to this tree.
            Defaults to session.default_project_dir from config.
          example: "/home/user/projects/myapp"
        backend:
          type: string
          description: |
            LLM backend to use for this session. Must match a registered backend name.
            Defaults to the active backend from config.
          example: "aider"

    CommandRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          description: Command string in Signal command format
          example: "new: build a REST API in Go"

    CommandResponse:
      type: object
      properties:
        result:
          type: string
          description: Human-readable result message

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: "ok"
        hostname:
          type: string
        version:
          type: string
        uptime_seconds:
          type: integer

    ConfigResponse:
      type: object
      description: Masked configuration. Sensitive fields (tokens, passwords, secrets) are replaced with "***".
      properties:
        telegram:
          type: object
          properties:
            enabled: { type: boolean }
            token: { type: string, example: "***" }
            chat_id: { type: string }
        discord:
          type: object
          properties:
            enabled: { type: boolean }
            token: { type: string, example: "***" }
            channel_id: { type: string }
        slack:
          type: object
          properties:
            enabled: { type: boolean }
            token: { type: string, example: "***" }
            channel_id: { type: string }
        matrix:
          type: object
          properties:
            enabled: { type: boolean }
            homeserver: { type: string }
            user_id: { type: string }
            access_token: { type: string, example: "***" }
            room_id: { type: string }
        twilio:
          type: object
          properties:
            enabled: { type: boolean }
            account_sid: { type: string }
            auth_token: { type: string, example: "***" }
            from_number: { type: string }
            to_number: { type: string }
        ntfy:
          type: object
          properties:
            enabled: { type: boolean }
            server_url: { type: string }
            topic: { type: string }
            token: { type: string, example: "***" }
        email:
          type: object
          properties:
            enabled: { type: boolean }
            host: { type: string }
            port: { type: integer }
            username: { type: string }
            from: { type: string }
            to: { type: string }
        webhook:
          type: object
          properties:
            enabled: { type: boolean }
            addr: { type: string }
        github_webhook:
          type: object
          properties:
            enabled: { type: boolean }
            addr: { type: string }
        server:
          type: object
          properties:
            enabled: { type: boolean }
            host: { type: string }
            port: { type: integer }
            tls_enabled: { type: boolean }
            token: { type: string, example: "***" }

    InfoResponse:
      type: object
      properties:
        hostname:
          type: string
        version:
          type: string
        backend_family:
          type: string
          example: "claude-code"
        messaging_backend:
          type: string
          example: "signal"
        session_count:
          type: integer
        server:
          type: object
          properties:
            host:
              type: string
            port:
              type: integer

    ScheduledCommand:
      type: object
      description: |
        One scheduled command. Either `cron` (recurring) or `run_at`
        (one-shot) is present; both are optional but at least one is
        required when creating a new entry. `command` is the body
        that will be executed when the schedule fires; `task` is
        accepted as a legacy alias for the new-session variant.
      properties:
        id:
          type: string
          description: Unique identifier for this scheduled entry
        session_id:
          type: string
          description: Session the schedule is attached to (optional — omitted for new-session schedules)
        command:
          type: string
          description: Command body to send when the schedule fires
          example: "status"
        task:
          type: string
          description: "Legacy alias for the new-session variant; prefer `command`"
          example: "run nightly tests"
        cron:
          type: string
          description: Cron expression (5-field standard format) — omit for one-shot
          example: "0 2 * * *"
        run_at:
          type: string
          format: date-time
          description: RFC3339 timestamp for one-shot schedules — omit for recurring
        state:
          type: string
          description: Lifecycle state
          enum: [pending, fired, cancelled, failed]
        enabled:
          type: boolean
          default: true
        created_at:
          type: string
          format: date-time

    RemoteServer:
      type: object
      properties:
        name:
          type: string
          description: Short identifier used with --server flag
          example: "nas"
        url:
          type: string
          description: Base URL of the remote datawatch instance
          example: "http://203.0.113.10:8080"
        token:
          type: string
          description: Bearer token (masked as *** when non-empty)
          example: "***"
        enabled:
          type: boolean

    SavedCommand:
      type: object
      required: [name, command]
      properties:
        name:
          type: string
          description: Short name for the command
          example: "approve"
        command:
          type: string
          description: The command text to send
          example: "yes"

    FilterPattern:
      type: object
      properties:
        id:
          type: string
          description: Unique filter identifier
        pattern:
          type: string
          description: Regular expression to match against session output lines
          example: "^\\s*$"
        action:
          type: string
          description: Action to take on matching lines
          enum: [drop, highlight, alert]
          example: "drop"
        enabled:
          type: boolean
          default: true
        description:
          type: string
          description: Human-readable description of what this filter does
          example: "Drop blank lines"

    Alert:
      type: object
      properties:
        id:
          type: string
          description: Unique alert identifier
        message:
          type: string
          description: Alert message text
        level:
          type: string
          enum: [info, warning, error]
          example: "warning"
        read:
          type: boolean
          default: false
        created_at:
          type: string
          format: date-time

    LLMEntry:
      type: object
      description: A named LLM registry entry
      properties:
        name:
          type: string
          description: Unique name for this LLM entry
          example: "claude-sonnet"
        kind:
          type: string
          description: LLM backend kind
          enum: [claude-code, openwebui, ollama, session-backend]
          example: "claude-code"
        model:
          type: string
          description: Model identifier within the backend
          example: "claude-sonnet-4-6"
        compute_nodes:
          type: array
          items:
            type: string
          description: Compute node names this LLM can use
          example: ["gpu-node-1"]
        enabled_models:
          type: array
          items:
            type: string
          description: Models enabled for use (subset of available)
        enabled:
          type: boolean
          description: Whether this LLM entry is active
          default: true
        llm_ref:
          type: string
          description: Reference alias for use in session start and automata config
          example: "claude-sonnet"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ComputeNode:
      type: object
      description: A compute node that can run LLM inference
      properties:
        name:
          type: string
          description: Unique name for this compute node
          example: "gpu-node-1"
        kind:
          type: string
          description: Compute node kind
          enum: [ollama, openai-compat]
          example: "ollama"
        endpoint:
          type: string
          description: Base URL for the compute node API
          example: "http://gpu-box:11434"
        enabled:
          type: boolean
          description: Whether this node is available for routing
          default: true
        models:
          type: array
          items:
            type: string
          description: Models currently available on this node
        observer_peer:
          type: string
          description: Observer peer name bound to this node for metrics
        health:
          type: string
          description: Last health check result
          enum: [ok, degraded, unreachable, unknown]
          example: "ok"
        last_probe_ms:
          type: integer
          description: Last save-time probe latency in milliseconds
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ServerEntry:
      type: object
      description: A remote datawatch server entry
      properties:
        name:
          type: string
          description: Unique name for this server
          example: "prod-eu"
        url:
          type: string
          description: Base URL of the remote datawatch server
          example: "https://eu.example.com:8443"
        token:
          type: string
          description: Bearer token for the remote server (write-only on create/update)
          example: "***"
        enabled:
          type: boolean
          description: Whether this server is included in aggregated queries
          default: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    DashboardLayout:
      type: object
      description: Persisted dashboard card layout configuration
      properties:
        cards:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: Unique card identifier
              type:
                type: string
                description: Card type
                enum: [task_tree, orbital, ekg, gantt, heatmap, guardrails, smoke_run, event_feed, sparklines]
              col:
                type: integer
                description: Column position (0-based)
              row:
                type: integer
                description: Row position (0-based)
              w:
                type: integer
                description: Card width in columns
              h:
                type: integer
                description: Card height in rows
              config:
                type: object
                description: Card-specific configuration
                additionalProperties: true
        updated_at:
          type: string
          format: date-time

    SamplingRequest:
      type: object
      description: MCP sampling request
      properties:
        trigger:
          type: string
          description: Built-in trigger name
          enum: [alert_triage, anomaly_analysis, morning_briefing, council_deliberation, automaton_decision]
          example: "alert_triage"
        prompt:
          type: string
          description: Custom prompt (used when trigger is omitted)
          example: "Summarise my open sessions"
        context:
          type: object
          description: Additional context passed to the trigger template
          additionalProperties: true
        max_tokens:
          type: integer
          description: Max tokens for the completion
          example: 512

    SamplingResult:
      type: object
      description: A sampling result entry from the ring buffer
      properties:
        id:
          type: string
          description: Unique result identifier
        trigger:
          type: string
          description: Trigger name or "custom"
        prompt_excerpt:
          type: string
          description: First 200 chars of the prompt
        response_excerpt:
          type: string
          description: First 200 chars of the response
        status:
          type: string
          enum: [ok, error, unsupported]
        created_at:
          type: string
          format: date-time

    ElicitationRequest:
      type: object
      description: MCP elicitation request
      required: [schema, prompt]
      properties:
        schema:
          type: string
          description: Elicitation schema type
          enum: [approval, text_input, choice]
          example: "approval"
        prompt:
          type: string
          description: Prompt shown to the operator
          example: "Approve deletion of 12 stale sessions?"
        context:
          type: object
          description: Additional context (shown alongside approval prompts)
          additionalProperties: true
        placeholder:
          type: string
          description: Placeholder text for text_input schema
          example: "e.g. refactor-auth-module"
        options:
          type: array
          items:
            type: string
          description: Choice options for choice schema
          example: ["quick", "normal", "thorough"]

    ElicitationResponse:
      type: object
      description: Operator response to an elicitation
      properties:
        approved:
          type: boolean
          description: Present for approval schema
        reason:
          type: string
          description: Optional reason text (approval schema)
        value:
          type: string
          description: Operator-entered text (text_input schema)
        choice:
          type: string
          description: Selected option (choice schema)
        index:
          type: integer
          description: Zero-based index of selected option (choice schema)
