      tags: [Memory]
      responses: {"200": {description: Reachable}, "502": {description: Backend unreachable}}
  /api/memory/kg/query:
    get:
 summary: Knowledge-graph query (entities + relationships)
      operationId: kgQuery
      tags: [Memory]
      parameters:
        - {name: q, in: query, required: true, schema: {type: string}}
        - {name: depth, in: query, required: false, schema: {type: integer}}
      responses: {"200": {description: OK}, "400": {description: Missing q}, "503": {description: Memory not enabled}}
  /api/memory/kg/add:
    post:
 summary: Add an entity / relationship to the knowledge graph
      operationId: kgAdd
      tags: [Memory]
