<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Datawatch">
  <title>Datawatch</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/xterm.css">
</head>
<body>
  <script src="/xterm.min.js"></script>
  <script src="/xterm-addon-fit.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <!-- Splash screen — fades out when WebSocket connects -->
  <div id="splash" class="splash-overlay">
    <div class="splash-content">
      <div class="splash-logo">
        <img src="/favicon.svg" alt="Datawatch" class="splash-icon" />
        <div class="splash-ring"></div>
      </div>
      <div class="splash-title">datawatch</div>
      <div class="splash-subtitle">AI Session Monitor</div>
      <div class="splash-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <div class="app">
    <header class="header">
      <button class="back-btn" id="backBtn" style="display:none"><span class="back-chevron"></span></button>
      <span class="header-title" id="headerTitle">Datawatch</span>
      <!-- BL257 P2 v6.8.1 — Identity Wizard entry-point. Robot icon opens
           a 6-step modal that walks the operator through filling in their
           identity (role, goals, projects, values, focus, notes).
           v6.11.4 — display:none by default; navigate() shows it only on
           the Automata page (operator: "robot icon should only be on
           automation page, not all pages").
           v6.11.5 — placed BEFORE the search button (left of it) per
           operator: "The robot icon in the header in automation tab
           should be to the left of the search button". -->
      <button class="header-identity-btn" id="headerIdentityBtn" onclick="openIdentityWizard()" title="Operator Identity Wizard" aria-label="Identity wizard" style="background:transparent;border:none;color:inherit;font-size:18px;cursor:pointer;padding:4px 8px;display:none;">&#129302;</button>
      <!-- v6.12.0 — operator-directed: ? help icon left of search button.
           Sessions list opens datawatch-definitions.md anchor for the
           Sessions section; in-session view opens the in-session anchor.
           Visible state + target href set in app.js navigate(). -->
      <a id="headerHelpLink" href="https://github.com/dmz006/datawatch/blob/main/docs/datawatch-definitions.md" target="_blank" rel="noopener" style="display:none;color:inherit;text-decoration:none;font-size:18px;padding:4px 8px;cursor:pointer;" title="Open documentation for this view" aria-label="Help">?</a>
      <button class="header-search-btn" id="headerSearchBtn" style="display:none" title="Toggle search &amp; filters" aria-label="Toggle search">&#128269;</button>
      <span class="status-dot" id="statusDot" title="Long-press to refresh server connection"></span>
    </header>

    <main class="view" id="view"></main>

    <nav class="nav" id="nav">
      <button class="nav-btn active" data-view="sessions" onclick="navigate('sessions')">
        <!-- v5.27.2 — speech balloon to match the datawatch-app
             Android shell. Was lightning ⚡ which carried no
             session-specific semantic; chat icon is what every
             other comm/control plane uses for a conversation list. -->
        <span class="nav-icon">&#128172;</span>
        <span class="nav-label" data-i18n="nav_sessions">Sessions</span>
      </button>
      <!-- v5.26.8 — display:none until /api/autonomous/config returns
           enabled:true. JS unhides the button on boot when the feature
           is configured. Operator-reported: tabs for disabled
           subsystems shouldn't render at all. -->
      <button id="navBtnAutonomous" class="nav-btn" data-view="autonomous" onclick="navigate('autonomous')" style="display:none;">
        <span class="nav-icon">&#129302;</span>
        <span class="nav-label" data-i18n="nav_automata">Automata</span>
      </button>
      <button class="nav-btn" data-view="alerts" onclick="navigate('alerts')">
        <span class="nav-icon" style="position:relative;">
          &#9888;
          <span id="alertBadge" style="display:none;position:absolute;top:-6px;right:-8px;background:var(--error,#ef4444);color:#fff;font-size:9px;border-radius:8px;padding:1px 4px;line-height:1.4;"></span>
        </span>
        <span class="nav-label" data-i18n="nav_alerts">Alerts</span>
      </button>
      <!-- BL247-followup v6.7.3 — Observer is a real top-level nav item.
           Hosts the (former) Settings → Monitor cards + Federated Peers
           at the bottom. -->
      <button class="nav-btn" data-view="observer" onclick="navigate('observer')">
        <span class="nav-icon">&#128225;</span>
        <span class="nav-label" data-i18n="nav_observer">Observer</span>
      </button>
      <!-- BL238 — Plugins, Routing, Orchestrator moved to Settings sub-tabs. Nav buttons removed. -->
      <button class="nav-btn" data-view="settings" onclick="navigate('settings')">
        <span class="nav-icon" style="position:relative;">
          &#9881;
          <!-- BL172 + v6.12.0 — count of stale (>60s push age) federated peers,
               hidden when 0. Click navigates to Observer → Federated Peers and
               flashes the stale card so the operator can find it without
               hunting (operator 2026-05-05 Option A). -->
          <span id="peerStaleBadge" style="display:none;position:absolute;top:-6px;right:-8px;background:var(--error,#ef4444);color:#fff;font-size:9px;border-radius:8px;padding:1px 4px;line-height:1.4;cursor:pointer;" title="Federated peers stale — click to view" onclick="event.stopPropagation();navigateToStalePeer();">0</span>
        </span>
        <span class="nav-label" data-i18n="nav_settings">Settings</span>
      </button>
    </nav>
    <button id="newSessionFab" class="new-session-fab" onclick="openNewSessionModal()" title="Start a new session" aria-label="New session">+</button>
  </div>
  <script src="/app.js"></script>
</body>
</html>
