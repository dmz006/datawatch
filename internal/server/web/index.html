<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Datawatch">
  <title>Datawatch</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/xterm.css">
</head>
<body>
  <script src="/xterm.min.js"></script>
  <script src="/xterm-addon-fit.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <!-- Splash screen — fades out when WebSocket connects -->
  <div id="splash" class="splash-overlay">
    <div class="splash-content">
      <div class="splash-logo">
        <img src="/favicon.svg" alt="Datawatch" class="splash-icon" />
        <div class="splash-ring"></div>
      </div>
      <div class="splash-title">datawatch</div>
      <div class="splash-subtitle">AI Session Monitor</div>
      <div class="splash-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <div class="app">
    <header class="header">
      <button class="back-btn" id="backBtn" style="display:none"><span class="back-chevron"></span></button>
      <span class="header-title" id="headerTitle">Datawatch</span>
      <span class="status-dot" id="statusDot"></span>
    </header>

    <main class="view" id="view"></main>

    <nav class="nav" id="nav">
      <button class="nav-btn active" data-view="sessions" onclick="navigate('sessions')">
        <span class="nav-icon">&#9889;</span>
        <span class="nav-label">Sessions</span>
      </button>
      <button class="nav-btn" data-view="new" onclick="navigate('new')">
        <span class="nav-icon">+</span>
        <span class="nav-label">New</span>
      </button>
      <button class="nav-btn" data-view="alerts" onclick="navigate('alerts')">
        <span class="nav-icon" style="position:relative;">
          &#9888;
          <span id="alertBadge" style="display:none;position:absolute;top:-6px;right:-8px;background:var(--error,#ef4444);color:#fff;font-size:9px;border-radius:8px;padding:1px 4px;line-height:1.4;"></span>
        </span>
        <span class="nav-label">Alerts</span>
      </button>
      <button class="nav-btn" data-view="settings" onclick="navigate('settings')">
        <span class="nav-icon">&#9881;</span>
        <span class="nav-label">Settings</span>
      </button>
    </nav>
  </div>
  <script src="/app.js"></script>
</body>
</html>
