<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>datawatch — Documentation</title>
<style>
  :root {
    --bg: #0e1013;
    --bg2: #161a1f;
    --bg3: #1e232a;
    --text: #e6e6e6;
    --text2: #9aa0a6;
    --border: #2a2f36;
    --accent: #60a5fa;
    --accent2: #7c3aed;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }
  .app { display: grid; grid-template-rows: auto 1fr; height: 100vh; height: 100dvh; }
  header { padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--bg2); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  header h1 { margin: 0; font-size: 17px; font-weight: 600; flex: 1; }
  header .links a { color: var(--accent); text-decoration: none; font-size: 13px; margin-left: 12px; }
  header .links a:hover { text-decoration: underline; }
  header button.toggle {
    background: var(--bg3); color: var(--text); border: 1px solid var(--border);
    border-radius: 4px; padding: 6px 10px; cursor: pointer; font-size: 14px;
  }
  header button.toggle:hover { border-color: var(--accent); }
  .body { display: grid; grid-template-columns: 320px 1fr; overflow: hidden; transition: grid-template-columns 0.18s ease; }
  .body.aside-collapsed { grid-template-columns: 0px 1fr; }
  .body.aside-collapsed aside {
    /* Desktop collapse — fully hide aside so the 1px border-right
       doesn't leak as a visible strip at x=-1/0 on Chrome. */
    transform: translateX(-100%);
    visibility: hidden;
    border-right: none;
    width: 0;
    overflow: hidden;
  }
  aside {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0;
  }
  aside .filter {
    padding: 0 12px 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  aside .filter input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 8px;
    border-radius: 4px;
    font-size: 13px;
  }
  aside .group {
    padding: 6px 12px 2px;
    font-size: 11px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 10px;
  }
  aside button.doc {
    display: block; width: 100%; text-align: left;
    background: transparent; color: var(--text); border: none;
    padding: 6px 14px; font-size: 13px; cursor: pointer; line-height: 1.4;
  }
  aside button.doc:hover { background: var(--bg3); }
  aside button.doc.active { background: var(--accent); color: #111; }
  aside button.doc .count { color: var(--text2); font-size: 11px; margin-left: 6px; }
  aside button.doc.active .count { color: #1a1a1a; }
  main { overflow-y: auto; padding: 20px; }
  .doc-header {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }
  .doc-header h2 { margin: 0; font-size: 18px; }
  .doc-header .path { color: var(--text2); font-size: 12px; font-family: monospace; }
  .diagram-shell {
    position: relative;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 48px 16px 16px;
    margin-bottom: 20px;
    overflow: auto;
    min-height: 200px;
  }
  .diagram-shell .title {
    position: absolute; top: 14px; left: 16px;
    font-size: 13px; color: var(--text2); font-weight: 500;
  }
  .diagram-shell .controls {
    position: absolute; top: 10px; right: 12px;
    display: flex; gap: 6px;
  }
  .diagram-shell .controls button {
    background: rgba(255,255,255,0.06); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 4px 8px; font-size: 12px; cursor: pointer; min-width: 28px;
  }
  .diagram-shell .controls button:hover { border-color: var(--accent); }
  .diagram-canvas {
    transform-origin: top left;
    transition: transform 0.12s ease-out;
    cursor: grab;
    min-height: 100px;
  }
  .diagram-canvas:active { cursor: grabbing; }
  .diagram-shell.fullscreen {
    position: fixed; inset: 0;
    z-index: 9999;
    border-radius: 0; border: none;
    padding-top: 56px;
    background: var(--bg);
  }
  .diagram-shell.fullscreen .controls { top: 16px; right: 20px; }
  .loading, .empty { color: var(--text2); padding: 30px 0; text-align: center; }
  .prose {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 20px;
    color: var(--text2);
    font-size: 13px;
    line-height: 1.55;
    white-space: pre-wrap;
  }
  .prose h1, .prose h2, .prose h3 { color: var(--text); margin: 14px 0 8px; }
  .prose code { background: var(--bg3); padding: 1px 5px; border-radius: 3px; font-size: 12px; }
  .prose ul, .prose ol { padding-left: 22px; }
  .prose pre { background: var(--bg3); padding: 10px 12px; border-radius: 4px; overflow: auto; font-size: 12px; white-space: pre; }
  .prose a { color: var(--accent); }
  .prose blockquote { border-left: 3px solid var(--accent2); margin: 8px 0; padding-left: 12px; color: var(--text); }
  .prose table { border-collapse: collapse; margin: 8px 0; }
  .prose th, .prose td { border: 1px solid var(--border); padding: 4px 8px; text-align: left; }

  /* Mobile / portrait — stack the layout, allow rotation, collapse aside by default. */
  @media (max-width: 820px), (orientation: portrait) {
    .body { grid-template-columns: 1fr; grid-template-rows: 1fr; }
    /* When the drawer is collapsed in mobile, the aside is position:fixed
       (out of grid flow). The desktop "0px 1fr" two-column template would
       otherwise win by specificity and auto-place main into the 0px first
       cell — leaving main rendered at ~28 px (its padding) and the user
       seeing a blank screen. Pin the layout to a single 1fr column so
       main always claims the full viewport. */
    .body.aside-collapsed { grid-template-columns: 1fr; }
    aside {
      position: fixed; top: 52px; left: 0; bottom: 0;
      width: 280px; max-width: 80vw; z-index: 50;
      transform: translateX(0);
      transition: transform 0.18s ease, visibility 0.18s ease;
      box-shadow: 4px 0 12px rgba(0,0,0,0.4);
    }
    .body.aside-collapsed aside {
      /* Translate fully off-screen AND hide visibility so nothing
         (shadow, border, scrollbar) leaks into the viewport on
         Chrome mobile / installed PWA, and pointer-events drop so
         the hidden drawer can't intercept taps on the diagram. */
      transform: translateX(-100%);
      visibility: hidden;
      pointer-events: none;
      box-shadow: none;
    }
    main {
      padding: 14px;
      /* Belt + suspenders: when aside is fixed-position, main needs
         to claim the full grid cell so the diagram always has room. */
      width: 100%;
      min-width: 0;
      overflow-x: auto;
    }
    .doc-header { flex-direction: column; align-items: flex-start; gap: 6px; }
    .diagram-shell { padding: 56px 8px 12px; min-height: 240px; }
  }
</style>
</head>
<body>
<div class="app">
<header>
  <a href="/" class="toggle" title="Back to PWA" aria-label="Back to PWA" style="text-decoration:none;display:inline-flex;align-items:center;gap:4px;">&#8592; PWA</a>
  <button class="toggle" id="asideToggle" title="Toggle file list" aria-label="Toggle file list">&#9776;</button>
  <h1>datawatch — Documentation</h1>
  <div class="links">
    <a href="/api/docs">API spec</a>
    <a href="/api/mcp/docs">MCP tools</a>
  </div>
</header>
<div class="body" id="bodyEl">
  <aside>
    <div class="filter"><input id="filter" placeholder="Filter files…" /></div>
    <div id="list"><div class="loading">Loading index…</div></div>
  </aside>
  <main id="main">
    <div class="loading">Pick a file from the left.</div>
  </main>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
  mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose', maxTextSize: 200000 });

  // Sidebar toggle. On wide screens this collapses to give the
  // diagram more room; on mobile it doubles as a slide-out drawer.
  const bodyEl = document.getElementById('bodyEl');
  document.getElementById('asideToggle').addEventListener('click', () => {
    bodyEl.classList.toggle('aside-collapsed');
  });
  // On narrow viewports, start with the drawer hidden so the diagram
  // takes the full width.
  if (window.matchMedia('(max-width: 820px), (orientation: portrait)').matches) {
    bodyEl.classList.add('aside-collapsed');
  }

  // Known entry points — the daemon ships the docs/ tree embedded in
  // the web FS, so everything under /docs/ is reachable as static
  // files. We don't have a list endpoint yet, so the sidebar is a
  // curated index of the high-value files. This is easy to extend.
  // v5.25.0 — operator-reported: drop the Plans group (operator-internal,
  // also gitignored from the embedded docs viewer per docs/_embed_skip.txt
  // since v5.3.0); add the Howtos group so operator walkthroughs are
  // browsable from the same viewer the diagrams come through. App-docs
  // (datawatch-app mobile companion) live in the datawatch-app repo;
  // a future cut may proxy them in via /api/datawatch-app/docs.
  const INDEX = [
    // v6.12.1 (BL273) — central definitions doc is the default landing
    // and the first sidebar entry. Operator-directed: this is the manual.
    { group: 'Manual', files: [
      'docs/datawatch-definitions.md',
    ]},
    { group: 'How-tos', files: [
      'docs/howto/README.md',
      'docs/howto/setup-and-install.md',
      'docs/howto/chat-and-llm-quickstart.md',
      'docs/howto/comm-channels.md',
      'docs/howto/voice-input.md',
      'docs/howto/mcp-tools.md',
      'docs/howto/autonomous-planning.md',
      'docs/howto/autonomous-review-approve.md',
      'docs/howto/prd-dag-orchestrator.md',
      'docs/howto/container-workers.md',
      'docs/howto/pipeline-chaining.md',
      'docs/howto/cross-agent-memory.md',
      'docs/howto/federated-observer.md',
      'docs/howto/daemon-operations.md',
    ]},
    { group: 'Architecture', files: [
      'docs/architecture-overview.md',
      'docs/architecture.md',
      'docs/data-flow.md',
      'docs/app-flow.md',
      'docs/design.md',
      'docs/implementation.md',
    ]},
    { group: 'Flow diagrams', files: [
      'docs/flow/system-data-flow.md',
      'docs/flow/new-session-flow.md',
      'docs/flow/input-required-flow.md',
      'docs/flow/multi-machine-flow.md',
      'docs/flow/multi-source-flow.md',
      'docs/flow/persistence-flow.md',
      'docs/flow/proxy-flow.md',
      'docs/flow/websocket-flow.md',
      'docs/flow/signal-flow.md',
      'docs/flow/signal-rpc-flow.md',
      'docs/flow/dns-channel-flow.md',
      'docs/flow/agent-spawn-flow.md',
      'docs/flow/orchestrator-flow.md',
      'docs/flow/prd-phase3-phase4-flow.md',
    ]},
    { group: 'Subsystems', files: [
      'docs/agents.md',
      'docs/memory.md',
      'docs/messaging-backends.md',
      'docs/llm-backends.md',
      'docs/encryption.md',
      'docs/covert-channels.md',
      'docs/multi-session.md',
      'docs/mcp.md',
      'docs/cursor-mcp.md',
      'docs/container-hygiene.md',
      'docs/security-review.md',
    ]},
    { group: 'API', files: [
      'docs/api/autonomous.md',
      'docs/api/observer.md',
      'docs/api/orchestrator.md',
      'docs/api/plugins.md',
      'docs/api/cost.md',
      'docs/api/memory.md',
      'docs/api/routing-rules.md',
      'docs/api/ask.md',
      'docs/api/project-summary.md',
      'docs/api/mobile-surface.md',
      'docs/api/sessions-productivity.md',
      'docs/api/chat-mode-backends.md',
      'docs/api/sessions.md',
      'docs/api/devices.md',
      'docs/api/voice.md',
      'docs/api/channel.md',
    ]},
  ];

  const listEl = document.getElementById('list');
  const mainEl = document.getElementById('main');
  const filterEl = document.getElementById('filter');

  function renderIndex(filter) {
    const f = (filter || '').toLowerCase();
    listEl.innerHTML = '';
    for (const grp of INDEX) {
      const matches = grp.files.filter(p => !f || p.toLowerCase().includes(f));
      if (!matches.length) continue;
      const g = document.createElement('div');
      g.className = 'group';
      g.textContent = grp.group;
      listEl.appendChild(g);
      for (const path of matches) {
        const b = document.createElement('button');
        b.className = 'doc';
        b.dataset.path = path;
        b.innerHTML = `<span>${path.replace(/^docs\//, '')}</span>`;
        b.onclick = () => openDoc(path);
        listEl.appendChild(b);
      }
    }
  }

  filterEl.addEventListener('input', e => renderIndex(e.target.value));
  renderIndex('');

  async function openDoc(path) {
    Array.from(document.querySelectorAll('aside button.doc')).forEach(b =>
      b.classList.toggle('active', b.dataset.path === path));
    mainEl.innerHTML = '<div class="loading">Loading ' + path + '…</div>';
    try {
      const resp = await fetch('/' + path);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const md = await resp.text();
      renderDoc(path, md);
    } catch (e) {
      mainEl.innerHTML = '<div class="empty">Failed to load <code>' + path + '</code>: ' + (e.message || e) + '</div>';
    }
  }

  // Extract ```mermaid blocks from markdown source. Returns an array
  // of {index, source}. Index matches the block position in the doc.
  function extractMermaid(md) {
    const re = /```mermaid\s*\n([\s\S]*?)```/g;
    const out = [];
    let m, i = 0;
    while ((m = re.exec(md)) !== null) {
      out.push({ index: i++, src: m[1].trim() });
    }
    return out;
  }

  async function renderDoc(path, md) {
    const blocks = extractMermaid(md);
    const title = path.replace(/^docs\//, '').replace(/\.md$/, '');
    const diagramCount = blocks.length;
    let html = `<div class="doc-header">
      <h2>${title}</h2>
      <span class="path">${path} · ${diagramCount} diagram${diagramCount === 1 ? '' : 's'}</span>
    </div>`;
    blocks.forEach(b => {
      html += `
        <div class="diagram-shell" data-idx="${b.index}">
          <div class="title">Diagram ${b.index + 1} of ${diagramCount}</div>
          <div class="controls">
            <button onclick="zoomShell(this, 0.2)" title="Zoom in">+</button>
            <button onclick="zoomShell(this, -0.2)" title="Zoom out">-</button>
            <button onclick="zoomShell(this, 0, true)" title="Reset">&#8634;</button>
            <button onclick="toggleFull(this)" title="Fullscreen (Esc to exit)">&#9634;</button>
          </div>
          <div class="diagram-canvas" id="canvas-${b.index}"><div class="loading">Rendering…</div></div>
        </div>
      `;
    });
    // Always render the full markdown prose below the diagrams. Strip
    // mermaid blocks first so they don't appear twice. Falls back to
    // pre-wrap when marked.js isn't loaded.
    const proseMd = md.replace(/```mermaid\s*\n[\s\S]*?```/g, '').trim();
    if (proseMd) {
      // marked 12 removed `mangle` and `headerIds` as direct options
      // (they're now extensions). Calling parse with unknown options
      // logs warnings; the docs render fine without them.
      let proseHtml;
      try {
        proseHtml = (typeof marked !== 'undefined')
          ? marked.parse(proseMd)
          : ('<pre>' + proseMd.replace(/</g, '&lt;') + '</pre>');
      } catch (err) {
        proseHtml = '<pre style="color:#f66;">marked.parse failed: ' + (err.message || err) +
          '</pre><pre>' + proseMd.replace(/</g, '&lt;') + '</pre>';
      }
      html += `<div class="prose">${proseHtml}
        <div style="margin-top:14px;font-size:11px;color:var(--text2);">
          <a href="https://github.com/dmz006/datawatch/blob/main/${path}" target="_blank" style="color:var(--accent);">View on GitHub</a>
        </div>
      </div>`;
    }
    mainEl.innerHTML = html;
    rewriteRelativeMdLinks(path);
    if (!diagramCount) return;

    // Async render each mermaid block. Isolate failures so one bad
    // diagram doesn't block the rest of the file.
    for (const b of blocks) {
      const canvas = document.getElementById('canvas-' + b.index);
      try {
        const { svg } = await mermaid.render('mm_' + Math.random().toString(36).slice(2), b.src);
        canvas.innerHTML = svg;
        wirePan(canvas);
      } catch (e) {
        canvas.innerHTML = '<pre style="color:#f66;font-size:11px;overflow:auto;">' +
          (e.message || String(e)) +
          '\n\n--- source ---\n' + b.src.replace(/</g, '&lt;') + '</pre>';
      }
    }
  }

  // Rewrite relative .md links in the rendered prose so they re-open
  // through this viewer instead of hitting the daemon at the wrong
  // path. Without this, a link like [setup](setup-and-install.md)
  // inside docs/howto/README.md resolves against /diagrams.html and
  // 404s. We walk the prose anchors, resolve the href against the
  // current doc's directory, and rewrite to a viewer hash.
  //
  // v5.26.51 — operator-asked extension: rewrite <img src="..."> too,
  // and add slugified ids to headings so #anchor links work end-to-
  // end. Also scrolls to the anchor after the rewrite pass.
  function rewriteRelativeMdLinks(path) {
    const proseRoot = mainEl.querySelector('.prose');
    if (!proseRoot) return;
    const baseDir = path.replace(/[^/]*$/, ''); // e.g. "docs/howto/"

    // ── <a> links ─────────────────────────────────────────────────
    const anchors = proseRoot.querySelectorAll('a[href]');
    anchors.forEach(a => {
      const href = a.getAttribute('href');
      if (!href) return;
      // Skip absolute URLs, anchors, mailtos, and the GitHub footer link.
      if (/^(?:[a-z]+:)?\/\//i.test(href)) return;
      if (href.startsWith('#') || href.startsWith('mailto:')) return;
      // Split off any in-page hash fragment.
      const hashIdx = href.indexOf('#');
      const linkPath = hashIdx >= 0 ? href.slice(0, hashIdx) : href;
      const linkHash = hashIdx >= 0 ? href.slice(hashIdx) : '';
      if (!linkPath.endsWith('.md')) return;
      // Resolve relative to the current doc's directory.
      const resolved = resolvePath(baseDir, linkPath);
      if (!resolved.startsWith('docs/')) return;
      a.setAttribute('href', '#' + resolved + linkHash);
      a.addEventListener('click', e => {
        e.preventDefault();
        location.hash = resolved + linkHash;
      });
    });

    // ── <img> sources (v5.26.51) ──────────────────────────────────
    // marked.js renders ![alt](path) → <img src="path">. The src is
    // relative to the markdown file, but the browser resolves it
    // against /diagrams.html — so it 404s. Rewrite to an absolute
    // /<resolved-path>. Skips already-absolute / data: / http(s):
    // sources.
    const imgs = proseRoot.querySelectorAll('img[src]');
    imgs.forEach(img => {
      const src = img.getAttribute('src');
      if (!src) return;
      if (/^(?:[a-z]+:)?\/\//i.test(src)) return;
      if (src.startsWith('data:') || src.startsWith('/')) return;
      const resolved = resolvePath(baseDir, src);
      img.setAttribute('src', '/' + resolved);
    });

    // ── Heading anchor ids (v5.26.51) ─────────────────────────────
    // marked.js doesn't emit slug ids by default. Add them so a
    // hash like #docs/howto/foo.md#walkthrough scrolls to the
    // matching <h?> element. Keep it deterministic (lowercase
    // alphanumerics + dashes) and dedupe with a counter suffix on
    // collision.
    const seen = Object.create(null);
    proseRoot.querySelectorAll('h1,h2,h3,h4,h5,h6').forEach(h => {
      if (h.id) return;
      const slug = h.textContent.toLowerCase()
        .replace(/[^\p{L}\p{N}]+/gu, '-')
        .replace(/^-+|-+$/g, '');
      if (!slug) return;
      let id = slug, n = 1;
      while (seen[id]) { id = slug + '-' + (++n); }
      seen[id] = true;
      h.id = id;
    });

    // ── Scroll to in-page anchor if the hash carries one ──────────
    const hashIdx = (location.hash || '').indexOf('#', 1);
    if (hashIdx > 0) {
      const anchorId = decodeURIComponent(location.hash.slice(hashIdx + 1));
      // Defer one frame so the heading-id pass above lands first.
      requestAnimationFrame(() => {
        const el = document.getElementById(anchorId);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    }
  }

  function resolvePath(baseDir, rel) {
    const parts = (baseDir + rel).split('/');
    const out = [];
    for (const p of parts) {
      if (p === '' || p === '.') continue;
      if (p === '..') { out.pop(); continue; }
      out.push(p);
    }
    return out.join('/');
  }

  // Per-shell zoom/pan state stored on the DOM element itself.
  function zoomShell(btn, delta, reset) {
    const shell = btn.closest('.diagram-shell');
    const canvas = shell.querySelector('.diagram-canvas');
    let z = parseFloat(canvas.dataset.z || '1');
    let x = parseFloat(canvas.dataset.x || '0');
    let y = parseFloat(canvas.dataset.y || '0');
    if (reset) { z = 1; x = 0; y = 0; }
    else { z = Math.max(0.2, Math.min(5, z + delta)); }
    canvas.dataset.z = z; canvas.dataset.x = x; canvas.dataset.y = y;
    canvas.style.transform = `translate(${x}px, ${y}px) scale(${z})`;
  }
  function toggleFull(btn) {
    const shell = btn.closest('.diagram-shell');
    shell.classList.toggle('fullscreen');
  }
  function wirePan(canvas) {
    let dragging = false, sx = 0, sy = 0, ox = 0, oy = 0;
    canvas.addEventListener('mousedown', e => {
      dragging = true; sx = e.clientX; sy = e.clientY;
      ox = parseFloat(canvas.dataset.x || '0');
      oy = parseFloat(canvas.dataset.y || '0');
      e.preventDefault();
    });
    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      const x = ox + (e.clientX - sx);
      const y = oy + (e.clientY - sy);
      const z = parseFloat(canvas.dataset.z || '1');
      canvas.dataset.x = x; canvas.dataset.y = y;
      canvas.style.transform = `translate(${x}px, ${y}px) scale(${z})`;
    });
    window.addEventListener('mouseup', () => { dragging = false; });
    canvas.addEventListener('wheel', e => {
      if (!e.ctrlKey && !e.metaKey) return; // scroll normally otherwise
      e.preventDefault();
      const z = parseFloat(canvas.dataset.z || '1');
      const delta = e.deltaY < 0 ? 0.1 : -0.1;
      const nz = Math.max(0.2, Math.min(5, z + delta));
      canvas.dataset.z = nz;
      const x = parseFloat(canvas.dataset.x || '0');
      const y = parseFloat(canvas.dataset.y || '0');
      canvas.style.transform = `translate(${x}px, ${y}px) scale(${nz})`;
    }, { passive: false });
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.diagram-shell.fullscreen').forEach(s => s.classList.remove('fullscreen'));
    }
  });

  // Auto-open: honor #docs/... in the URL fragment so external
  // pages (Settings → … "docs" links) can deep-link a specific
  // file. Falls back to the howtos index (operator-asked v5.26.50:
  // "Howto readme should be default page" — supersedes the prior
  // architecture-overview default).
  //
  // v5.26.50 — operator-asked: "Not all docs links work in the
  // diagrams." Cause: the previous matcher gated on
  // `h.endsWith('.md')`, which rejects hashes with in-page anchors
  // like `#docs/howto/profiles.md#walkthrough` and silently
  // redirected to the default doc. Strip the anchor BEFORE the
  // .md check; pass the path-without-anchor to openDoc.
  function openFromHash() {
    const h = decodeURIComponent((location.hash || '').slice(1));
    const hashIdx = h.indexOf('#');
    const pathPart = hashIdx >= 0 ? h.slice(0, hashIdx) : h;
    if (pathPart && pathPart.startsWith('docs/') && pathPart.endsWith('.md')) {
      openDoc(pathPart);
    } else {
      // v6.12.1 (BL273+) — operator: docs viewer should land on the
      // central definitions manual by default (was howto/README).
      openDoc('docs/datawatch-definitions.md');
    }
  }
  window.addEventListener('hashchange', openFromHash);
  openFromHash();
</script>
</body>
</html>
