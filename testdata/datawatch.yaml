# v8.0 E2E test configuration.
# Loaded by docs/testing/docker-compose.test.yml for the primary datawatch service.
# Template vars replaced by run-tests.sh / write_test_config:
#   port: 8080      → TEST_PORT
#   tls_port: 8443  → TEST_TLS_PORT
#   sse_port: 9090  → TEST_MCP_PORT

hostname: dw-e2e-test
data_dir: /data

session:
  llm_backend: shell
  max_sessions: 50
  input_idle_timeout: 10
  tail_lines: 20
  alert_context_lines: 5
  skip_permissions: false
  channel_enabled: true
  auto_git_init: false
  auto_git_commit: false
  kill_sessions_on_exit: true

server:
  enabled: true
  host: 0.0.0.0
  port: 8080
  token: ""
  tls_enabled: true
  tls_auto_generate: true
  tls_port: 8443

mcp:
  enabled: true
  sse_enabled: true
  sse_host: 0.0.0.0
  sse_port: 9090
  token: ""

memory:
  enabled: true
  backend: sqlite
  embedder: ollama
  embedder_model: nomic-embed-text
  embedder_host: http://localhost:11434

autonomous:
  enabled: true
  planning_backend: ollama

council:
  enabled: true
  llm_ref: ollama

ollama:
  enabled: true
  model: qwen3:1.7b
  host: http://localhost:11434

openwebui:
  enabled: true
  url: http://datawatch:3000
  api_key: sk-11ef286387204367945339a85728622f
  model: qwen3:1.7b

shell_backend:
  enabled: true

whisper:
  enabled: false
  model: medium
  language: en
  venv_path: /home/dmz/.datawatch/.venv

# Lightweight webhook backend: provides a comm responder so pipeline,
# channel-responder tests, and routing-rules tests run without Signal/Slack.
webhook:
  enabled: true
  addr: 127.0.0.1:0
  token: ""

compute_nodes:
  - name: datawatch-ollama
    kind: ollama
    address: http://localhost:11434
    scheduling_priority: 90
    declared_capacity:
      gpus: 1
      max_concurrent_models: 3

observer:
  peers:
    allow_register: true

update:
  enabled: false
