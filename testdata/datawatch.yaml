# v8.0 E2E test configuration.
# Loaded by docs/testing/docker-compose.test.yml for the primary datawatch service.

hostname: dw-e2e-test
data_dir: /data

session:
  llm_backend: shell
  max_sessions: 10
  input_idle_timeout: 10
  tail_lines: 20
  alert_context_lines: 5
  skip_permissions: false
  channel_enabled: false
  auto_git_init: false
  auto_git_commit: false
  kill_sessions_on_exit: true

server:
  enabled: true
  host: 0.0.0.0
  port: 8080
  token: "dw-test-token-12345"
  tls_enabled: false

mcp:
  enabled: true
  sse_enabled: true
  sse_host: 0.0.0.0
  sse_port: 9090
  token: "dw-test-token-12345"

memory:
  enabled: false

update:
  enabled: false
