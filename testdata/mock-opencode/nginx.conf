server {
    listen 80;
    root /usr/share/nginx/html;

    # Mock for: POST /v1/chat/completions (OpenAI-compat endpoint)
    # Returns canned chat.completion response regardless of model or request body.
    location = /v1/chat/completions {
        add_header Content-Type "application/json" always;
        # nginx rejects POST on static files with 405 — intercept and serve JSON
        error_page 405 =200 /response.json;
        try_files /response.json =500;
    }

    # Default: 404 for anything else
    location / {
        return 404 '{"error":"mock-opencode: path not found"}';
        add_header Content-Type "application/json";
    }
}
