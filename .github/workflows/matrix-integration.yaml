name: Matrix Integration

# BL241 P1 — Spins up a local Synapse via Docker Compose and runs
# scripts/test-matrix-synapse.sh against a real datawatch binary.
#
# Triggers on PRs / pushes that touch Matrix code or the test harness itself.
# NOT triggered on tag pushes (release CI is separate).

on:
  push:
    branches: [main]
    paths:
      - 'internal/messaging/backends/matrix/**'
      - 'internal/config/config.go'
      - 'cmd/datawatch/main.go'
      - 'scripts/test-matrix-synapse.sh'
      - 'scripts/matrix-stack.yml'
      - 'scripts/test-matrix-nio-client.py'
      - '.github/workflows/matrix-integration.yaml'
  pull_request:
    paths:
      - 'internal/messaging/backends/matrix/**'
      - 'internal/config/config.go'
      - 'cmd/datawatch/main.go'
      - 'scripts/test-matrix-synapse.sh'
      - 'scripts/matrix-stack.yml'
      - 'scripts/test-matrix-nio-client.py'
      - '.github/workflows/matrix-integration.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  matrix-integration:
    name: Synapse integration
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate docs-bm25 stub
        run: mkdir -p internal/docsindex/assets && echo '{}' > internal/docsindex/assets/docs-bm25-index.json

      - name: Build datawatch binary
        run: go build -o datawatch-test ./cmd/datawatch/

      - name: Pull Synapse image
        run: docker pull matrixdotorg/synapse:v1.127.1

      - name: Run Matrix integration tests
        env:
          DW_BIN: ./datawatch-test
        run: bash scripts/test-matrix-synapse.sh --datawatch-bin ./datawatch-test

      - name: Upload daemon log on failure
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5
        with:
          name: matrix-daemon-log
          path: /tmp/tmp*/daemon*.log
          if-no-files-found: ignore
