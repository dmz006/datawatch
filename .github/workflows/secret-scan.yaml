# v5.26.58 — operator-asked CI parity with datawatch-app: secret
# scanning. gitleaks scans the repo on every PR + scheduled weekly
# pass on main. Baseline is `clean` — any net-new committed secret
# fails the workflow.
#
# Action SHAs pinned per the v5.26.38 fleet-wide convention.

name: secret-scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly Monday 03:17 UTC (off-peak, doesn't collide with the
    # tag-push containers workflow).
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4 (v5.26.38 SHA pin)
        with:
          # gitleaks needs the full history to scan past commits on
          # scheduled / push runs. PR runs only need the diff.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE only needed for org-scope SaaS — for
          # personal/community use the action runs without it. Set
          # the secret if datawatch-app's parent org adopts the
          # paid tier.
