name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test + lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod
          cache: true

      # Generate the docs BM25 index so //go:embed is satisfied
      - name: sync-docs + docs-index
        run: |
          mkdir -p internal/docsindex/assets
          echo '{}' > internal/docsindex/assets/docs-bm25-index.json
          make sync-docs docs-index

      - name: go test
        run: go test ./... -count=1 -timeout 5m

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m

      - name: build (compile check)
        run: make build
        env:
          # Stamp CI build number into the binary version for traceability
          # e.g. 7.2.2-build0 in code → 7.2.2-build42 in CI artifact
          BUILD_NUMBER: ${{ github.run_number }}

  build-stamp:
    name: stamp build number
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: sync-docs + docs-index
        run: |
          mkdir -p internal/docsindex/assets
          echo '{}' > internal/docsindex/assets/docs-bm25-index.json
          make sync-docs docs-index

      - name: build with stamped version
        run: |
          # Replace -build0 suffix with the real run number for this artifact
          BASE_VER=$(grep 'var Version' cmd/datawatch/main.go | sed 's/.*"\(.*\)".*/\1/' | sed 's/-build[0-9]*//')
          STAMPED="${BASE_VER}-build${{ github.run_number }}"
          go build \
            -ldflags="-X main.Version=${STAMPED} -X github.com/dmz006/datawatch/internal/server.Version=${STAMPED}" \
            -o bin/datawatch-linux-amd64-${STAMPED} \
            ./cmd/datawatch/
          echo "Built: bin/datawatch-linux-amd64-${STAMPED}"

      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5
        with:
          name: datawatch-build-${{ github.run_number }}
          path: bin/datawatch-linux-amd64-*
          retention-days: 14
