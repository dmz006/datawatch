# BL195 — public container image distribution.
#
# Operator-approved scope: push every operator-facing image to GHCR
# (free, integrated with GH releases) and additionally attach a
# `docker save` tarball of stats-cluster (the smallest at ~11 MB) to
# the release so air-gapped operators can `docker load` directly.
#
# Triggers on every tag push (vX.Y.Z). The local `make container-*`
# targets remain the primary path for dev iteration; this is the
# online-release pipeline.
#
# Per AGENT.md container-maintenance rule: every release should audit
# whether this list still matches docker/dockerfiles/. Add a row
# below when a new operator-facing image is added to the build set.

name: containers

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write    # for upload-release-asset
  packages: write    # for ghcr.io push

jobs:
  # Stage 1 — leaf images that don't FROM agent-base. agent-base itself
  # lands here so the dependent agent-* images in stage 2 can pull it.
  build-base:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent-base
            file: docker/dockerfiles/Dockerfile.agent-base
            platforms: linux/amd64,linux/arm64
          - name: validator
            file: docker/dockerfiles/Dockerfile.validator
            platforms: linux/amd64,linux/arm64
          - name: stats-cluster
            file: docker/dockerfiles/Dockerfile.stats-cluster
            platforms: linux/amd64,linux/arm64
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - name: Build + push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platforms }}
          build-args: VERSION=${{ steps.ver.outputs.version }}
          # v5.22.0 fix: also tag agent-base under the slash-namespaced
          # path `ghcr.io/dmz006/datawatch/agent-base` so Stage 2's
          # `REGISTRY=ghcr.io/dmz006/datawatch + FROM ${REGISTRY}/agent-base`
          # resolves. The hyphen-namespaced tag stays primary (operator-
          # facing pulls + the public GHCR display); the slash-namespaced
          # tag is internal plumbing for the agent-* layer chain.
          # Without this, every tag push since v5.21.0 hit:
          # `failed to solve: ghcr.io/dmz006/datawatch/agent-base:VERSION: not found`.
          tags: |
            ghcr.io/dmz006/datawatch-${{ matrix.name }}:${{ steps.ver.outputs.version }}
            ghcr.io/dmz006/datawatch-${{ matrix.name }}:latest
            ${{ matrix.name == 'agent-base' && format('ghcr.io/dmz006/datawatch/agent-base:{0}', steps.ver.outputs.version) || '' }}
            ${{ matrix.name == 'agent-base' && 'ghcr.io/dmz006/datawatch/agent-base:latest' || '' }}
          push: true

  # Stage 2 — agent-* images that `FROM ${REGISTRY}/agent-base:${BASE_TAG}`.
  # Override REGISTRY + BASE_TAG so they pull the just-pushed GHCR copy
  # instead of the local-mirror default (`localhost:5000/datawatch`).
  build-agents:
    needs: build-base
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent-claude
            file: docker/dockerfiles/Dockerfile.agent-claude
            platforms: linux/amd64,linux/arm64
          - name: agent-opencode
            file: docker/dockerfiles/Dockerfile.agent-opencode
            platforms: linux/amd64,linux/arm64
          - name: agent-aider
            file: docker/dockerfiles/Dockerfile.agent-aider
            platforms: linux/amd64,linux/arm64
          - name: agent-gemini
            file: docker/dockerfiles/Dockerfile.agent-gemini
            platforms: linux/amd64,linux/arm64
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - name: Build + push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platforms }}
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
            REGISTRY=ghcr.io/dmz006/datawatch
            BASE_TAG=${{ steps.ver.outputs.version }}
          tags: |
            ghcr.io/dmz006/datawatch-${{ matrix.name }}:${{ steps.ver.outputs.version }}
            ghcr.io/dmz006/datawatch-${{ matrix.name }}:latest
          push: true

  # Operator approved (c) for stats-cluster only: also attach a
  # docker-save tarball to the GH release so air-gapped installs
  # can `docker load -i datawatch-stats-cluster-<version>.tar.gz`
  # without needing GHCR access.
  attach-stats-cluster-tarball:
    needs: [build-base, build-agents]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - name: Pull stats-cluster (linux/amd64) and save as tarball
        run: |
          docker pull ghcr.io/dmz006/datawatch-stats-cluster:${{ steps.ver.outputs.version }}
          docker save ghcr.io/dmz006/datawatch-stats-cluster:${{ steps.ver.outputs.version }} \
            | gzip > datawatch-stats-cluster-${{ steps.ver.outputs.version }}-linux-amd64.tar.gz
      - name: Upload tarball as release asset
        uses: softprops/action-gh-release@v2
        with:
          files: datawatch-stats-cluster-${{ steps.ver.outputs.version }}-linux-amd64.tar.gz
          fail_on_unmatched_files: true
