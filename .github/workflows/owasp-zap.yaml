# v5.26.58 — operator-asked CI parity with datawatch-app: OWASP ZAP
# baseline scan. Runs against the daemon deployed in a kind cluster
# (re-uses the kind-smoke pattern from v5.26.43). The "baseline"
# scan is passive — no active attacks; just spider + analyse —
# safe to run against any environment.
#
# Trigger: workflow_dispatch only (the daemon takes a bit to bring
# up; not worth running on every PR). Operator runs ad-hoc before
# minor/major cuts; results land as a PR-attached HTML report.

name: owasp-zap

# v5.26.59 — operator-asked: "Are zap audits customized to api, pwa
# and other interfaces?" Now five passes target each interface
# class with the appropriate ZAP scan type:
#
#   1. pwa-baseline    — passive spider against the PWA root
#                         (zaproxy/action-baseline)
#   2. api-scan        — schema-driven scan against /api/ using the
#                         daemon's OpenAPI spec at docs/api/openapi.yaml
#                         (zaproxy/action-api-scan)
#   3. diagrams-scan   — separate baseline run focused on /diagrams.html
#                         so static-surface findings don't get drowned
#                         out by the PWA's bigger surface area
#   4. pwa-active      — full active scan (SQLi/XSS/cmd-injection
#                         payloads) against the PWA root (v5.26.70)
#   5. api-active      — full active scan (-t) against /api/, schema-
#                         constrained so JSON-typed bodies don't trip
#                         spurious findings (v5.26.70)
#
# v5.26.70 — operator confirmed "zap didn't need auth" so passes 4+5
# can hit the kind-deployed daemon directly. Active scans send real
# attack payloads — only safe against an ephemeral test daemon, not
# any shared environment.
#
# Per-job tear-up of kind would multiply runtime; instead we
# share one kind setup and run all five scans against the same
# port-forwarded daemon.

on:
  workflow_dispatch:
    inputs:
      target_host:
        description: 'Target host:port for in-cluster scans (default: localhost:18080 from port-forward)'
        required: false
        default: 'localhost:18080'

permissions:
  contents: read
  issues: write   # ZAP creates issues for findings above thresholds

jobs:
  zap-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4 (v5.26.38 SHA pin)

      - name: Install kind + kubectl + helm
        run: |
          set -euxo pipefail
          curl -fsSL -o ./kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
          chmod +x ./kind && sudo mv ./kind /usr/local/bin/kind
          curl -fsSL -o ./kubectl "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x ./kubectl && sudo mv ./kubectl /usr/local/bin/kubectl
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Spin up kind + deploy chart
        run: |
          set -euxo pipefail
          kind create cluster --name dw-zap --wait 60s
          docker build --build-arg VERSION=zap-baseline \
            -f docker/dockerfiles/Dockerfile.agent-base \
            -t datawatch-zap:test .
          kind load docker-image datawatch-zap:test --name dw-zap
          helm install dw-zap ./charts/datawatch \
            --set image.registry=docker.io/library \
            --set image.repository=datawatch-zap \
            --set image.tag=test \
            --set image.pullPolicy=Never \
            --set persistence.enabled=false \
            --wait --timeout=5m

      - name: Port-forward to the daemon
        run: |
          kubectl port-forward svc/dw-zap-datawatch 18080:8080 >/tmp/pf.log 2>&1 &
          echo "PF_PID=$!" >> "$GITHUB_ENV"
          sleep 3
          for i in $(seq 1 60); do
            curl -sf http://localhost:18080/api/health >/dev/null && break
            sleep 1
          done

      # ── Pass 1: PWA baseline (passive spider + analyse) ──────────
      - name: ZAP PWA baseline scan
        uses: zaproxy/action-baseline@6c5a007541891231cd9e0ddec25d4f25c59c9874  # v0.15.0
        with:
          target: 'http://${{ inputs.target_host }}/'
          cmd_options: '-a -j -m 5'
          fail_action: true
          allow_issue_writing: true
          issue_title: 'OWASP ZAP — PWA baseline'

      # ── Pass 2: API scan against the OpenAPI spec ────────────────
      - name: ZAP API scan (OpenAPI-driven)
        uses: zaproxy/action-api-scan@bd24b11e76da11ab60302c8ae87f091cbb11f034  # v0.10.0
        with:
          target: 'http://${{ inputs.target_host }}/api/'
          format: openapi
          # The daemon embeds the OpenAPI spec at docs/api/openapi.yaml;
          # checkout has the raw file. Pass the local path so ZAP
          # doesn't have to fetch it from the daemon.
          api_definition: 'docs/api/openapi.yaml'
          fail_action: true
          allow_issue_writing: true
          issue_title: 'OWASP ZAP — API scan'

      # ── Pass 3: diagrams.html baseline (separate so its findings
      #            don't get masked by the bigger PWA surface) ─────
      - name: ZAP diagrams.html baseline scan
        uses: zaproxy/action-baseline@6c5a007541891231cd9e0ddec25d4f25c59c9874  # v0.15.0
        with:
          target: 'http://${{ inputs.target_host }}/diagrams.html'
          cmd_options: '-a -j -m 3'
          fail_action: false  # diagrams is largely static; advisory
          allow_issue_writing: true
          issue_title: 'OWASP ZAP — diagrams.html baseline'

      # ── Pass 4: PWA full active scan (v5.26.70) ─────────────────
      # Operator-asked: zap didn't need auth. The kind-deployed
      # daemon runs without a bearer token in this CI flow, so the
      # active scanner can hit every endpoint directly. Active scans
      # send real attack payloads (SQLi, XSS, command-injection
      # probes) — only safe against an ephemeral test daemon.
      - name: ZAP PWA full active scan
        uses: zaproxy/action-full-scan@76dd255b6b889d4d61a9c2a7aab83bbcb4d4f1ce  # v0.10.0
        with:
          target: 'http://${{ inputs.target_host }}/'
          cmd_options: '-a -j -m 10'
          fail_action: false  # advisory until the active baseline is set
          allow_issue_writing: true
          issue_title: 'OWASP ZAP — PWA full active scan'

      # ── Pass 5: API full active scan (v5.26.70) ─────────────────
      # OpenAPI-driven active scan. Same payload set as Pass 4 but
      # constrained to /api/ endpoints with the schema's parameter
      # types — fewer false positives on JSON-typed bodies.
      - name: ZAP API full active scan
        uses: zaproxy/action-api-scan@bd24b11e76da11ab60302c8ae87f091cbb11f034  # v0.10.0
        with:
          target: 'http://${{ inputs.target_host }}/api/'
          format: openapi
          api_definition: 'docs/api/openapi.yaml'
          # -t turns active rules on (api-scan defaults to passive).
          cmd_options: '-a -j -m 10 -t'
          fail_action: false
          allow_issue_writing: true
          issue_title: 'OWASP ZAP — API full active scan'

      - name: Stop port-forward + tear down
        if: always()
        run: |
          kill "${PF_PID:-0}" 2>/dev/null || true
          kind delete cluster --name dw-zap
