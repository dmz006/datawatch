name: Release CI Summary

# Appends (or refreshes) a CI status table on the GitHub release page each time
# a tracked workflow completes for a tagged commit. Also available as a manual
# dispatch so operators can force-refresh after re-runs.
#
# The table appears at the bottom of the release body under "## CI Status".
# It is replaced in-place on every update, so re-runs keep the section current.

on:
  workflow_run:
    workflows:
      - CI
      - Release
      - secret-scan
      - security-scan
      - docs-sync
      - dependency-review
      - kind-smoke
      - owasp-zap
    types: [completed]

  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to update (e.g. v8.0.0)"
        required: true

permissions:
  contents: write   # gh release edit
  actions: read     # gh api /actions/runs

jobs:
  update-release-status:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag from triggering run or manual input
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
            # Resolve the commit SHA the tag points to (dereference annotated tags)
            SHA=$(gh api "repos/$REPO/git/ref/tags/$TAG" --jq '
              if .object.type == "tag"
              then .object.sha
              else .object.sha
              end' 2>/dev/null || echo "")
            if [[ "$SHA" =~ ^[0-9a-f]{40}$ ]]; then
              # Dereference annotated tag: the tag object points to a commit
              OBJ_TYPE=$(gh api "repos/$REPO/git/ref/tags/$TAG" --jq '.object.type' 2>/dev/null)
              if [[ "$OBJ_TYPE" == "tag" ]]; then
                TAG_SHA="$SHA"
                SHA=$(gh api "repos/$REPO/git/tags/$TAG_SHA" --jq '.object.sha' 2>/dev/null || echo "$SHA")
              fi
            fi
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
            TAG=""
          fi

          # Find a release tag whose commit matches SHA
          if [[ -z "$TAG" ]]; then
            TAG=$(gh api "repos/$REPO/releases?per_page=30" --jq --arg sha "$SHA" '
              .[] | select(.target_commitish == $sha or .tag_name != null) | .tag_name
            ' 2>/dev/null | head -1 || echo "")

            # Fallback: walk recent tags and dereference each
            if [[ -z "$TAG" ]]; then
              TAG=$(gh api "repos/$REPO/git/refs/tags?per_page=30" --jq '.[].ref | ltrimstr("refs/tags/")' 2>/dev/null | \
              while read t; do
                OBJ=$(gh api "repos/$REPO/git/ref/tags/$t" --jq '[.object.type, .object.sha] | @tsv' 2>/dev/null || continue)
                OBJ_TYPE=$(echo "$OBJ" | cut -f1)
                OBJ_SHA=$(echo "$OBJ" | cut -f2)
                if [[ "$OBJ_TYPE" == "tag" ]]; then
                  COMMIT_SHA=$(gh api "repos/$REPO/git/tags/$OBJ_SHA" --jq '.object.sha' 2>/dev/null || echo "")
                else
                  COMMIT_SHA="$OBJ_SHA"
                fi
                if [[ "$COMMIT_SHA" == "$SHA" ]]; then echo "$t"; fi
              done | head -1)
            fi
          fi

          if [[ -z "$TAG" ]]; then
            echo "No release tag found for SHA $SHA — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$TAG"  >> "$GITHUB_OUTPUT"
            echo "sha=$SHA"  >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build CI status table and update release
        if: steps.resolve.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.resolve.outputs.tag }}
          SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          python3 - <<'PYEOF'
          import os, json, subprocess, re
          from datetime import datetime, timezone

          repo = os.environ["REPO"]
          tag  = os.environ["TAG"]
          sha  = os.environ["SHA"]

          def gh(*args):
              r = subprocess.run(["gh", "api"] + list(args), capture_output=True, text=True)
              if r.returncode != 0:
                  return None
              return json.loads(r.stdout)

          # Fetch all workflow runs for this commit SHA (up to 100)
          runs_data = gh(f"repos/{repo}/actions/runs?head_sha={sha}&per_page=100")
          runs = runs_data.get("workflow_runs", []) if runs_data else []

          # Deduplicate: keep the most-recent run per workflow name
          seen = {}
          for run in sorted(runs, key=lambda r: r.get("run_started_at", ""), reverse=True):
              name = run["name"]
              if name not in seen:
                  seen[name] = run

          ICON = {
              "success":   "✅",
              "failure":   "❌",
              "cancelled": "⛔",
              "skipped":   "⏭️",
              "timed_out": "⏱️",
          }

          rows = []
          for run in sorted(seen.values(), key=lambda r: r["name"]):
              name       = run["name"]
              status     = run["status"]          # queued / in_progress / completed
              conclusion = run.get("conclusion")  # success / failure / cancelled / …
              url        = run["html_url"]

              # Duration
              dur_str = "—"
              start = run.get("run_started_at") or run.get("created_at")
              end   = run.get("updated_at")
              if start and end and conclusion:
                  try:
                      fmt = "%Y-%m-%dT%H:%M:%SZ"
                      s = datetime.strptime(start, fmt)
                      e = datetime.strptime(end,   fmt)
                      secs = int((e - s).total_seconds())
                      dur_str = f"{secs // 60}m {secs % 60}s" if secs >= 60 else f"{secs}s"
                  except Exception:
                      pass

              if conclusion:
                  icon  = ICON.get(conclusion, "❓")
                  label = conclusion
              else:
                  icon  = "🔄"
                  label = status  # in_progress / queued

              rows.append(f"| [{name}]({url}) | {icon} {label} | {dur_str} |")

          now = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          table = "\n".join([
              "## CI Status",
              "",
              "| Workflow | Result | Duration |",
              "|---|---|---|",
              *rows,
              "",
              f"_Updated: {now}_",
          ])

          # Fetch current release body
          rel = gh(f"repos/{repo}/releases/tags/{tag}")
          if not rel:
              print(f"Release {tag} not found — cannot update.")
              raise SystemExit(1)

          body = rel.get("body") or ""

          # Replace existing CI Status section (from ## CI Status to next ## or EOF)
          body = re.sub(r"\n## CI Status\n.*?(?=\n## |\Z)", "", body, flags=re.DOTALL)
          body = body.rstrip()

          new_body = body + "\n\n" + table

          # Update release
          r = subprocess.run(
              ["gh", "release", "edit", tag, "--notes", new_body],
              capture_output=True, text=True
          )
          if r.returncode != 0:
              print("gh release edit failed:", r.stderr)
              raise SystemExit(1)

          print(f"✅  Updated release {tag} with {len(rows)} workflow rows.")
          PYEOF
